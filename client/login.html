<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/i18n-dashboard.js"></script>
    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <style>
        .form-box { max-width: 420px; }
        .register-link { text-align: center; margin-top: 24px; color: #666; font-size: 0.95rem; }
        [data-theme="dark"] .register-link { color: #98989d; }

        /* ── Hamburger: hidden on desktop ── */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            border: none;
            background: transparent;
        }
        .nav-hamburger span {
            display: block;
            width: 22px; height: 2px;
            background: var(--text-main, #1d1d1f);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* ── Close button: always hidden until mobile ── */
        .mobile-close-btn { display: none !important; }

        /* ══════════ DESKTOP ══════════ */
        @media (min-width: 769px) {
            .navbar .links {
                display: flex !important;
                position: static;
                height: auto; width: auto;
                background: transparent;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                flex-direction: row;
                justify-content: flex-end;
                align-items: center;
                gap: 6px;
                padding: 0;
                z-index: auto;
                overflow: visible;
            }
            .navbar .links a,
            .navbar .links button:not(.nav-hamburger) {
                width: auto; max-width: none;
                padding: 10px 18px;
                font-size: 0.95rem;
                border: none;
                background: transparent;
            }
            .navbar .links .lang-switch { margin: 0 0 0 8px; }
        }

        /* ══════════ MOBILE ══════════ */
        @media (max-width: 768px) {
            /* show hamburger */
            .nav-hamburger { display: flex; }

            /* show close button only in mobile context */
            .mobile-close-btn {
                display: flex !important;
                position: absolute;
                top: 18px; right: 18px;
                width: 42px; height: 42px;
                border-radius: 50%;
                background: rgba(0,0,0,0.06);
                border: none;
                font-size: 1.1rem;
                cursor: pointer;
                color: var(--text-muted, #8e8e93);
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
                z-index: 10;
            }
            .mobile-close-btn:hover { background: rgba(255,59,48,0.12); color: #ff3b30; }

            /* full-screen overlay menu */
            .navbar .links {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100vh;
                background: var(--glass-bg, rgba(255,255,255,0.97));
                backdrop-filter: saturate(180%) blur(28px);
                -webkit-backdrop-filter: saturate(180%) blur(28px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 10px;
                z-index: 1050;
                padding: 80px 28px 40px;
                overflow-y: auto;
            }
            .navbar .links.mobile-open { display: flex; }

            /* individual link pills */
            .navbar .links a {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%; max-width: 320px;
                padding: 15px 24px;
                font-size: 1.05rem;
                font-weight: 600;
                border-radius: 16px;
                border: 1px solid rgba(0,0,0,0.07);
                background: rgba(255,255,255,0.7);
                color: var(--text-main, #1d1d1f);
                text-decoration: none;
                transition: all 0.2s;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            }
            .navbar .links a:hover {
                background: rgba(10,132,255,0.08);
                color: var(--primary, #0A84FF);
                border-color: rgba(10,132,255,0.2);
                transform: translateY(-1px);
            }
            .navbar .links a.primary {
                background: var(--primary, #0A84FF);
                color: white;
                border-color: transparent;
                box-shadow: 0 4px 16px rgba(10,132,255,0.35);
            }
            .navbar .links a.primary:hover { background: var(--primary-dark, #0062D1); transform: translateY(-1px); }

            /* theme button on mobile */
            .navbar .links button.theme-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                width: 100%; max-width: 320px;
                padding: 15px 24px;
                font-size: 1.05rem;
                font-weight: 600;
                border-radius: 16px;
                border: 1px solid rgba(0,0,0,0.07);
                background: rgba(255,255,255,0.7);
                color: var(--text-main, #1d1d1f);
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                cursor: pointer;
                transition: all 0.2s;
            }
            .navbar .links button.theme-btn:hover { background: rgba(0,0,0,0.05); }

            /* lang switch */
            .navbar .links .lang-switch {
                display: flex;
                gap: 10px;
                margin-top: 4px;
            }
            .navbar .links .lang-switch .lang-btn {
                padding: 12px 28px;
                border-radius: 14px;
                font-size: 0.95rem;
                font-weight: 700;
            }

            /* form */
            .form-page { padding: 16px; align-items: flex-start; padding-top: 30px; }
            .form-box { padding: 24px 16px; }
            .form-box h1 { font-size: 1.4rem; margin-bottom: 20px; }
            .form-box input, .form-box select { font-size: 16px; }
        }

        /* dark mode overrides */
        [data-theme="dark"] .navbar .links { background: rgba(20,20,22,0.97); }
        [data-theme="dark"] .navbar .links a {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.08);
            color: #f5f5f7;
        }
        [data-theme="dark"] .navbar .links a:hover { background: rgba(255,255,255,0.12); color: #fff; }
        [data-theme="dark"] .navbar .links a.primary { background: #0A84FF; color: white; }
        [data-theme="dark"] .navbar .links button.theme-btn {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.08);
            color: #f5f5f7;
        }
        [data-theme="dark"] .mobile-close-btn { background: rgba(255,255,255,0.08); color: #8e8e93; }
                [data-theme="dark"] .mobile-close-btn:hover { background: rgba(255,59,48,0.2); color: #ff453a; }
        [dir="rtl"] .navbar { flex-direction: row-reverse; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="darlink-logo blue small" href="index.html" style="display:flex; flex-direction:row; align-items:center; gap:8px; text-decoration:none;">
  <svg width="36" height="32" viewBox="0 0 110 100" fill="none">
    <path d="M55 8 L98 42 L98 92 L12 92 L12 42 Z" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linejoin="round"/>
    <rect x="72" y="10" width="10" height="18" fill="none" stroke="#00d4ff" stroke-width="5.5"/>
    <path d="M55 22 L88 50 L88 88 L22 88 L22 50 Z" fill="none" stroke="#5aa8c0" stroke-width="5" stroke-linejoin="round"/>
    <path d="M32 88 L32 52 Q32 30 52 30 Q72 30 72 52 Q72 68 58 72 Q44 76 32 72" fill="none" stroke="#5aa8c0" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="32" y1="88" x2="75" y2="88" stroke="#5aa8c0" stroke-width="5.5" stroke-linecap="round"/>
  </svg>
  <span style="color:#00d4ff; font-size:22px; font-weight:700;">DarLink</span>
</a>
        <button class="nav-hamburger" id="navHamburger" aria-label="Open menu" onclick="toggleMobileNav()">
            <span></span><span></span><span></span>
        </button>
        <div class="links" id="navLinks">
            <button class="mobile-close-btn" onclick="toggleMobileNav()" aria-label="Close menu">
                <i class="fa-solid fa-times"></i>
            </button>
           <button class="theme-btn" onclick="toggleTheme()" aria-label="Theme">
            <i class="fa-regular fa-moon" id="themeIcon"></i>
            </button>
            <a href="index.html" data-i18n="nav_home" onclick="closeMobileNav()">
                <i class="fa-solid fa-house" style="margin-right:8px;"></i> Home
            </a>
            <a href="login.html" class="primary" data-i18n="nav_login" onclick="closeMobileNav()">
                <i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i> Login
            </a>
            <a href="Register.html" data-i18n="nav_register" onclick="closeMobileNav()">
                <i class="fa-solid fa-user-plus" style="margin-right:8px;"></i> Register
            </a>
            <div class="lang-switch">
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="ar">عربي</button>
            </div>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-box">
            <h1 data-i18n="login_title">Login</h1>
            <div id="message"></div>
            <form id="loginForm">
                <label for="Email" data-i18n="login_email_label">Email</label>
                <input type="email" id="Email" placeholder="Enter your email" data-i18n-placeholder="login_email_placeholder" required>

                <label for="Password" data-i18n="login_password_label">Password</label>
                <div class="password-container">
                    <input type="password" id="Password" placeholder="Enter your password" data-i18n-placeholder="login_password_placeholder" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility()">
                        <i id="passwordToggleIcon" class="fa fa-eye" aria-hidden="true"></i>
                    </span>
                </div>


                <button type="submit" id="submitBtn" data-i18n="login_submit">Login</button>
            </form>
            <div class="register-link">
                <span data-i18n="login_no_account">Don't have an account?</span>
                <a href="Register.html" data-i18n="nav_register">Register</a>
            </div>
        </div>
    </div>

    <script>
        function toggleMobileNav() {
            document.getElementById('navLinks').classList.toggle('mobile-open');
        }
        function closeMobileNav() {
            document.getElementById('navLinks').classList.remove('mobile-open');
        }

        window.I18N_MESSAGES = {
            nav_logo_text: { en: "DarLink", ar: "إيجار العطلات" },
            nav_home: { en: "Home", ar: "الرئيسية" },
            nav_login: { en: "Login", ar: "تسجيل الدخول" },
            nav_register: { en: "Register", ar: "إنشاء حساب" },
            login_title: { en: "Login", ar: "تسجيل الدخول" },
            login_email_label: { en: "Email", ar: "البريد الإلكتروني" },
            login_email_placeholder: { en: "Enter your email", ar: "أدخل بريدك الإلكتروني" },
            login_password_label: { en: "Password", ar: "كلمة المرور" },
            login_password_placeholder: { en: "Enter your password", ar: "أدخل كلمة المرور" },
            login_who_label: { en: "Who are you", ar: "من أنت" },
            login_user_type_placeholder: { en: "Select User Type", ar: "اختر نوع المستخدم" },
            login_renter_option: { en: "Renter", ar: "مستأجر" },
            login_owner_option: { en: "Owner", ar: "مالك" },
            login_submit: { en: "Login", ar: "تسجيل الدخول" },
            login_no_account: { en: "Don't have an account?", ar: "ليس لديك حساب؟" },
            login_select_user_type_error: { en: "⚠️ Please select user type", ar: "⚠️ يرجى اختيار نوع المستخدم" },
            login_logging_in: { en: "Logging in...", ar: "جاري تسجيل الدخول..." },
            login_failed_fallback: { en: "Login failed", ar: "فشل تسجيل الدخول" },
            login_network_error: { en: "Network error. Check if server is running.", ar: "خطأ في الشبكة. تأكد من أن الخادم يعمل." }
        };

        const API_URL = 'https://darlink-production.up.railway.app/api';
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        const initialTheme = window.getTheme ? window.getTheme() : (localStorage.getItem('site_theme') || 'light');
        document.documentElement.setAttribute('data-theme', initialTheme);
        const initialIcon = document.getElementById('themeIcon');
        if (initialIcon) initialIcon.className = initialTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
        }

        function togglePasswordVisibility() {
            const pwd = document.getElementById('Password');
            const icon = document.getElementById('passwordToggleIcon');
            if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'fa fa-eye-slash'; }
            else { pwd.type = 'password'; icon.className = 'fa fa-eye'; }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginData = { Email: Email.value.trim(), Password: Password.value };
            submitBtn.disabled = true;
            const lang = window.I18N ? window.I18N.getCurrentLang() : 'en';
            const dict = window.I18N_MESSAGES || {};
            submitBtn.textContent = (dict.login_logging_in && dict.login_logging_in[lang]) || 'Logging in...';
            try {
                let attemptData = { ...loginData, UserType: 'Renter' };
                let response = await fetch(`${API_URL}/users/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(attemptData) });
                let data = await response.json();

                if (!response.ok && data.error && (data.error.includes("Invalid") || data.error.includes("Not Found"))) {
                    attemptData.UserType = 'Owner';
                    response = await fetch(`${API_URL}/users/login`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(attemptData) });
                    data = await response.json();
                }

                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    messageDiv.innerHTML = `<div class="message success">✔️ ${data.message}</div>`;
                    setTimeout(() => { window.location.href = 'index.html'; }, 1500);
                } else {
                    messageDiv.innerHTML = `<div class="message error">❌ ${data.error || (dict.login_failed_fallback && dict.login_failed_fallback[lang]) || 'Login failed'}</div>`;
                }
            } catch (error) {
                const dict2 = window.I18N_MESSAGES || {};
                const lang2 = window.I18N ? window.I18N.getCurrentLang() : 'en';
                messageDiv.innerHTML = `<div class="message error">${(dict2.login_network_error && dict2.login_network_error[lang2]) || '❌ Network error.'}</div>`;
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                const currentLang = window.I18N ? window.I18N.getCurrentLang() : 'en';
                submitBtn.textContent = (window.I18N_MESSAGES.login_submit && window.I18N_MESSAGES.login_submit[currentLang]) || 'Login';
            }
        });
    </script>
</body>
</html>
