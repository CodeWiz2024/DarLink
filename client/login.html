<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/i18n-dashboard.js"></script>
    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <style>
        .form-box { max-width: 420px; }
        .register-link { text-align: center; margin-top: 24px; color: #666; font-size: 0.95rem; }
        [data-theme="dark"] .register-link { color: #98989d; }

        /* ===== HAMBURGER ===== */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            border: none;
            background: transparent;
        }
        .nav-hamburger span {
            display: block;
            width: 22px;
            height: 2px;
            background: var(--text-main, #1d1d1f);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .nav-hamburger { display: flex; }
            .navbar .links {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100vh;
                background: var(--glass-bg, rgba(255,255,255,0.97));
                backdrop-filter: blur(24px);
                -webkit-backdrop-filter: blur(24px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 16px;
                z-index: 1050;
                padding: 40px 24px;
            }
            .navbar .links.mobile-open { display: flex; }
            .navbar .links a,
            .navbar .links button:not(.nav-hamburger) {
                width: 100%;
                max-width: 280px;
                text-align: center;
                padding: 14px 20px;
                font-size: 1rem;
                border-radius: 12px;
            }
            .navbar .links .lang-switch { margin: 8px 0 0; }

            .mobile-close-btn {
                position: absolute;
                top: 20px;
                right: 20px;
                background: none;
                border: none;
                font-size: 1.6rem;
                cursor: pointer;
                color: var(--text-muted, #8e8e93);
            }

            /* Form */
            .form-page { padding: 16px; align-items: flex-start; padding-top: 30px; }
            .form-box { padding: 24px 16px; }
            .form-box h1 { font-size: 1.4rem; margin-bottom: 20px; }

            /* prevent iOS zoom on inputs */
            .form-box input,
            .form-box select { font-size: 16px; }
        }

        [data-theme="dark"] .navbar .links { background: rgba(28,28,30,0.97); }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="logo">
            <i class="fa-solid fa-house logo-icon"></i>
            <span class="logo-text" data-i18n="nav_logo_text">DarLink</span>
        </span>
        <!-- Hamburger button -->
        <button class="nav-hamburger" id="navHamburger" aria-label="Open menu" onclick="toggleMobileNav()">
            <span></span><span></span><span></span>
        </button>
        <div class="links" id="navLinks">
            <button class="mobile-close-btn" onclick="toggleMobileNav()" aria-label="Close menu">
                <i class="fa-solid fa-times"></i>
            </button>
            <button class="theme-btn" onclick="toggleTheme()" id="themeToggle">
                <i class="fa-regular fa-moon" id="themeIcon"></i>
            </button>
            <a href="index.html" data-i18n="nav_home" onclick="closeMobileNav()">Home</a>
            <a href="login.html" class="primary" data-i18n="nav_login" onclick="closeMobileNav()">Login</a>
            <a href="Register.html" data-i18n="nav_register" onclick="closeMobileNav()">Register</a>
            <div class="lang-switch">
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="ar">عربي</button>
            </div>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-box">
            <h1 data-i18n="login_title">Login</h1>
            
            <div id="message"></div>

            <form id="loginForm">
                <label for="Email" data-i18n="login_email_label">Email</label>
                <input type="email" id="Email" placeholder="Enter your email" data-i18n-placeholder="login_email_placeholder" required>

                <label for="Password" data-i18n="login_password_label">Password</label>
                <div class="password-container">
                    <input type="password" id="Password" placeholder="Enter your password" data-i18n-placeholder="login_password_placeholder" required>
                    <span class="toggle-password" onclick="togglePasswordVisibility()">
                        <i id="passwordToggleIcon" class="fa fa-eye" aria-hidden="true"></i>
                    </span>
                </div>

                <label for="UserType" data-i18n="login_who_label">Who are you</label>
                <select id="UserType" required>
                    <option value="" data-i18n="login_user_type_placeholder">Select User Type</option>
                    <option value="Renter" data-i18n="login_renter_option">Renter</option>
                    <option value="Owner" data-i18n="login_owner_option">Owner</option>
                </select>

                <button type="submit" id="submitBtn" data-i18n="login_submit">Login</button>
            </form>

            <div class="register-link">
                <span data-i18n="login_no_account">Don't have an account?</span>
                <a href="Register.html" data-i18n="nav_register">Register</a>
            </div>
        </div>
    </div>

    <script>
        // Mobile nav toggle
        function toggleMobileNav() {
            document.getElementById('navLinks').classList.toggle('mobile-open');
        }
        function closeMobileNav() {
            document.getElementById('navLinks').classList.remove('mobile-open');
        }

        // Page translation strings
        window.I18N_MESSAGES = {
            nav_logo_text: { en: "DarLink", ar: "إيجار العطلات" },
            nav_home: { en: "Home", ar: "الرئيسية" },
            nav_login: { en: "Login", ar: "تسجيل الدخول" },
            nav_register: { en: "Register", ar: "إنشاء حساب" },
            login_title: { en: "Login", ar: "تسجيل الدخول" },
            login_email_label: { en: "Email", ar: "البريد الإلكتروني" },
            login_email_placeholder: { en: "Enter your email", ar: "أدخل بريدك الإلكتروني" },
            login_password_label: { en: "Password", ar: "كلمة المرور" },
            login_password_placeholder: { en: "Enter your password", ar: "أدخل كلمة المرور" },
            login_who_label: { en: "Who are you", ar: "من أنت" },
            login_user_type_placeholder: { en: "Select User Type", ar: "اختر نوع المستخدم" },
            login_renter_option: { en: "Renter", ar: "مستأجر" },
            login_owner_option: { en: "Owner", ar: "مالك" },
            login_submit: { en: "Login", ar: "تسجيل الدخول" },
            login_no_account: { en: "Don't have an account?", ar: "ليس لديك حساب؟" },
            login_select_user_type_error: { en: "⚠️ Please select user type", ar: "⚠️ يرجى اختيار نوع المستخدم" },
            login_logging_in: { en: "Logging in...", ar: "جاري تسجيل الدخول..." },
            login_failed_fallback: { en: "Login failed", ar: "فشل تسجيل الدخول" },
            login_network_error: { en: "R Network error. Check if server is running.", ar: "R خطأ في الشبكة. تأكد من أن الخادم يعمل." }
        };

        const API_URL = 'https://darlink-production.up.railway.app/api';
        const form = document.getElementById('loginForm');
        const messageDiv = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');

        const initialTheme = window.getTheme ? window.getTheme() : (localStorage.getItem('site_theme') || 'light');
        document.documentElement.setAttribute('data-theme', initialTheme);
        const initialIcon = document.getElementById('themeIcon');
        if (initialIcon) {
            initialIcon.className = initialTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
        }

        function togglePasswordVisibility() {
            const pwd = document.getElementById('Password');
            const icon = document.getElementById('passwordToggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.className = 'fa fa-eye-slash';
            } else {
                pwd.type = 'password';
                icon.className = 'fa fa-eye';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginData = {
                Email: Email.value.trim(),
                Password: Password.value,
                UserType: UserType.value
            };
            if (!loginData.UserType) {
                const lang = window.I18N ? window.I18N.getCurrentLang() : 'en';
                const dict = window.I18N_MESSAGES || {};
                const msg = (dict.login_select_user_type_error && dict.login_select_user_type_error[lang]) || '❌ Please select user type';
                messageDiv.innerHTML = `<div class="message error">${msg}</div>`;
                return;
            }
            submitBtn.disabled = true;
            const lang = window.I18N ? window.I18N.getCurrentLang() : 'en';
            const dict = window.I18N_MESSAGES || {};
            submitBtn.textContent = (dict.login_logging_in && dict.login_logging_in[lang]) || 'Logging in...';
            try {
                const response = await fetch(`${API_URL}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(loginData)
                });
                const data = await response.json();
                if (response.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    messageDiv.innerHTML = `<div class="message success">✔️ ${data.message}</div>`;
                    setTimeout(() => {
                        if (data.user.UserType === 'Owner') { window.location.href = 'AddHome.html'; }
                        else { window.location.href = 'Rent.html'; }
                    }, 1500);
                } else {
                    const fallback = (dict.login_failed_fallback && dict.login_failed_fallback[lang]) || 'Login failed';
                    messageDiv.innerHTML = `<div class="message error">❌ ${data.error || fallback}</div>`;
                }
            } catch (error) {
                const net = (dict.login_network_error && dict.login_network_error[lang]) || '❌ Network error.';
                messageDiv.innerHTML = `<div class="message error">${net}</div>`;
                console.error('Error:', error);
            } finally {
                submitBtn.disabled = false;
                const currentLang = window.I18N ? window.I18N.getCurrentLang() : 'en';
                const label = (window.I18N_MESSAGES.login_submit && window.I18N_MESSAGES.login_submit[currentLang]) || 'Login';
                submitBtn.textContent = label;
            }
        });
    </script>
</body>
</html>
