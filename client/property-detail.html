<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details - DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- ✅ FIX: Single script includes, correct path for theme.js -->
    <script src="js/i18n-dashboard.js"></script>
    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }
        [data-theme="dark"] {
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            margin: 0; padding: 0;
        }
        .details-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            padding: 30px;
            margin-bottom: 30px;
        }
        /* Gallery */
        .gallery-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 15px;
            height: 500px;
            margin-bottom: 30px;
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        .main-img-container { height: 100%; position: relative; }
        .main-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .side-imgs-container { display: grid; grid-template-rows: 1fr 1fr; gap: 15px; height: 100%; }
        .side-imgs-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Layout */
        .property-layout {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 30px;
        }
        @media (max-width: 900px) {
            .property-layout { grid-template-columns: 1fr; }
            .gallery-grid { grid-template-columns: 1fr; height: 350px; }
            .side-imgs-container { display: none; }
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .property-badge {
            display: inline-block;
            padding: 6px 12px;
            background: var(--accent);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }
        .price-tag { font-size: 1.8rem; font-weight: 700; color: var(--primary); }
        .feature-icon {
            width: 40px; height: 40px;
            background: rgba(10, 132, 255, 0.1);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: var(--primary); margin-right: 12px;
        }

        /* Booking Card */
        .booking-card { position: sticky; top: 100px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 8px; }
        .input-group input {
            width: 100%; padding: 14px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--bg); color: var(--text); font-family: inherit;
        }

        .price-breakdown {
            background: rgba(10,132,255,0.05);
            border: 1px solid rgba(10,132,255,0.15);
            padding: 16px; border-radius: 12px; margin-bottom: 20px;
            display: none;
        }
        .price-breakdown .row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 0.9rem; }
        .price-breakdown .row.total { font-weight: 700; font-size: 1rem; border-top: 1px solid rgba(10,132,255,0.2); margin-top: 8px; padding-top: 10px; color: var(--primary); }

        .book-btn {
            width: 100%; padding: 16px;
            background: var(--primary); color: white;
            border: none; border-radius: 14px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .book-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4); }
        .book-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; box-shadow: none; }

        /* Promo badge on price */
        .promo-price-wrap { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .original-price { text-decoration: line-through; color: var(--text-muted); font-size: 1.1rem; font-weight: 500; }
        .discounted-price { color: #00C851; font-size: 1.8rem; font-weight: 800; }
        .promo-label { background: #FF4757; color: white; padding: 3px 10px; border-radius: 10px; font-size: 0.8rem; font-weight: 700; }

        /* Reviews */
        .reviews-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .review-card {
            padding: 24px; border-radius: 16px;
            background: var(--bg); border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }
        .review-meta { display: flex; align-items: center; margin-bottom: 15px; }
        .reviewer-avatar {
            width: 45px; height: 45px; border-radius: 50%;
            background: var(--primary); color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; margin-right: 15px;
        }
        .stars { color: #FFCC00; }

        /* Review Form */
        .review-form-container { margin-top: 40px; padding-top: 30px; border-top: 1px solid var(--glass-border); }
        .star-rating { display: flex; gap: 10px; margin: 15px 0; }
        .star-rating i { font-size: 2rem; cursor: pointer; color: #ddd; transition: color 0.2s; }
        .star-rating i.active { color: #FFCC00; }
        .review-textarea {
            width: 100%; padding: 15px;
            border: 1px solid var(--glass-border);
            border-radius: 15px; background: var(--bg); color: var(--text);
            min-height: 120px; margin-bottom: 20px; font-family: inherit; box-sizing: border-box;
        }

        /* Chat button inside booking card */
        .chat-owner-btn {
            width: 100%; margin-top: 12px; padding: 13px;
            background: rgba(10,132,255,0.1); color: var(--primary);
            border: 1px solid rgba(10,132,255,0.2); border-radius: 14px;
            font-size: 1rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .chat-owner-btn:hover { background: var(--primary); color: white; }

        /* Error / success messages inside page */
        .inline-msg {
            padding: 14px 18px; border-radius: 12px;
            font-weight: 500; margin-bottom: 16px; display: none;
        }
        .inline-msg.error   { background: rgba(255,59,48,0.1); color: #c00; border: 1px solid rgba(255,59,48,0.25); }
        .inline-msg.success { background: rgba(52,199,89,0.1); color: #1a6b2e; border: 1px solid rgba(52,199,89,0.25); }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="logo">
            <i class="fa-solid fa-house logo-icon"></i>
            <span class="logo-text" data-i18n="nav_logo_text">DarLink</span>
        </span>
        <div class="links">
            <button type="button" class="theme-btn" onclick="toggleTheme()">
                <i class="fa-regular fa-moon" id="themeIcon"></i>
            </button>
            <a href="index.html" data-i18n="nav_home">Home</a>
            <div class="lang-switch">
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="ar">عربي</button>
            </div>
            <span id="userGreeting"></span>
        </div>
    </nav>

    <main class="details-container">
        <div id="loading" style="text-align: center; padding: 50px; color: var(--text-muted);">
            <i class="fa-solid fa-spinner fa-spin" style="font-size:2.5rem;color:var(--primary);display:block;margin-bottom:14px;"></i>
            Loading property details...
        </div>

        <div id="propertyContent" style="display: none;">

            <!-- GALLERY -->
            <div id="gallery" class="gallery-grid"></div>

            <div class="property-layout">
                <!-- ── LEFT COLUMN ── -->
                <div class="main-info">
                    <div class="glass-card">
                        <div class="info-header">
                            <div>
                                <span class="property-badge" id="propTypeBadge">Apartment</span>
                                <h1 id="propTitle" style="margin:0;font-size:2.2rem;"></h1>
                                <p id="propLocation" style="color:var(--text-muted);font-size:1.1rem;margin:10px 0;"></p>
                            </div>
                            <div id="propPriceWrap" class="price-tag"></div>
                        </div>

                        <div style="display:flex;gap:30px;margin:25px 0;padding:20px 0;border-top:1px solid var(--glass-border);border-bottom:1px solid var(--glass-border);">
                            <div style="display:flex;align-items:center;">
                                <div class="feature-icon"><i class="fa-solid fa-door-open"></i></div>
                                <div><b id="propRooms"></b> Rooms</div>
                            </div>
                            <div style="display:flex;align-items:center;">
                                <div class="feature-icon"><i class="fa-solid fa-star"></i></div>
                                <div><b id="propRating"></b> <span id="propReviewsCount"></span></div>
                            </div>
                        </div>

                        <h3>📝 Description</h3>
                        <p id="propDescription" style="line-height:1.7;color:var(--text);opacity:0.9;margin-top:10px;"></p>

                        <div style="margin-top:30px;">
                            <h3>✨ Features</h3>
                            <div id="propFeatures" style="display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;"></div>
                        </div>
                    </div>

                    <!-- REVIEWS -->
                    <div class="glass-card">
                        <div class="reviews-header">
                            <h2>⭐ Guest Reviews</h2>
                            <div id="summaryStars" class="stars"></div>
                        </div>
                        <div id="reviewsList"></div>
                        <div id="reviewFormArea" class="review-form-container"></div>
                    </div>
                </div>

                <!-- ── RIGHT COLUMN (Booking Card) ── -->
                <div class="sidebar">
                    <div class="glass-card booking-card">
                        <h2>📅 Book This Stay</h2>

                        <div class="inline-msg" id="bookingMsg"></div>

                        <form id="bookingForm" onsubmit="handleBookingSubmit(event)">
                            <div class="input-group">
                                <label>📅 Check-in</label>
                                <input type="date" id="startDate" required>
                            </div>
                            <div class="input-group">
                                <label>📅 Check-out</label>
                                <input type="date" id="endDate" required>
                            </div>
                            <div class="input-group">
                                <label>📞 Phone Number</label>
                                <input type="tel" id="phoneNumber" placeholder="06XXXXXXXX" required>
                            </div>

                            <!-- Price breakdown box -->
                            <div class="price-breakdown" id="priceBreakdown">
                                <div class="row"><span id="bdNights">0 nights</span><span id="bdNightRate"></span></div>
                                <div class="row total"><span>Total</span><span id="bdTotal"></span></div>
                            </div>

                            <button type="submit" class="book-btn" id="bookBtn">
                                <i class="fa-solid fa-credit-card"></i> Confirm &amp; Pay
                            </button>
                        </form>

                        <!-- Owner info + chat — rendered dynamically -->
                        <div id="ownerSection" style="margin-top:25px;padding-top:20px;border-top:1px solid var(--glass-border);"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ── i18n stub ────────────────────────────────────────────
        window.I18N_MESSAGES = {
            nav_home: { en: 'Home', ar: 'الرئيسية' },
            nav_logo_text: { en: 'DarLink', ar: 'دارلينك' }
        };

        // ── Config ───────────────────────────────────────────────
        const SERVER_URL = 'https://darlink-production.up.railway.app';
        const API_URL    = `${SERVER_URL}/api`;

        const user       = JSON.parse(localStorage.getItem('user') || 'null');
        const urlParams  = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('id');

        let property     = null;
        let selectedStars = 0;
        let pendingBookingId = null; // track booking created before payment

        if (!propertyId) window.location.href = 'index.html';

        // ── Nav greeting ─────────────────────────────────────────
        if (user) {
            const firstName = user.FirstName || 'User';
            const initial   = firstName.charAt(0).toUpperCase();
            document.getElementById('userGreeting').innerHTML = `
                <span style="display:flex;align-items:center;gap:8px;padding:5px 12px;
                             background:rgba(10,132,255,0.08);border-radius:999px;cursor:pointer;"
                      onclick="window.location.href='${user.UserType==='Owner'?'AddHome':'Rent'}.html'">
                    <span style="width:28px;height:28px;border-radius:50%;background:var(--primary);
                                 color:white;display:flex;align-items:center;justify-content:center;
                                 font-weight:700;font-size:.8rem;">${initial}</span>
                    <span style="font-size:.85rem;font-weight:600;">${firstName}</span>
                </span>`;
        }

        // ── Price calculation helpers ────────────────────────────
        /**
         * Returns { displayPrice, originalPrice, promoLabel, ownerBasePrice }
         * displayPrice   = what the renter pays (includes 10% markup, minus promo)
         * originalPrice  = full price without promo (for strikethrough)
         * ownerBasePrice = displayPrice / 1.1  (what goes to owner before markup)
         */
        function calcPricing(prop) {
            const priceInDB = parseFloat(prop.PricePerNight); // already has 10% markup

            if (!prop.HasPromotion) {
                return {
                    displayPrice:   priceInDB,
                    originalPrice:  null,
                    promoLabel:     null,
                    ownerBasePrice: priceInDB / 1.1
                };
            }

            // Remove markup → get owner's base price
            const ownerBase = priceInDB / 1.1;
            let ownerAfterDiscount = ownerBase;
            let promoLabel = '';

            if (prop.DiscountType === 'Percentage' && parseFloat(prop.DiscountPercentage) > 0) {
                const pct = parseFloat(prop.DiscountPercentage);
                ownerAfterDiscount = ownerBase * (1 - pct / 100);
                promoLabel = `${pct}% OFF`;
            } else if (prop.DiscountType === 'FixedAmount' && parseFloat(prop.DiscountAmount) > 0) {
                const amt = parseFloat(prop.DiscountAmount);
                ownerAfterDiscount = Math.max(0, ownerBase - amt);
                promoLabel = `${Math.round(amt).toLocaleString()} DZD OFF`;
            }

            // Re-apply 10% markup on discounted price
            const displayPrice = ownerAfterDiscount * 1.1;

            return {
                displayPrice,
                originalPrice:  priceInDB,
                promoLabel,
                ownerBasePrice: ownerAfterDiscount
            };
        }

        // ── Render property details ──────────────────────────────
        function renderDetails() {
            const { displayPrice, originalPrice, promoLabel, ownerBasePrice } = calcPricing(property);

            // Store on property for booking
            property._displayPrice   = displayPrice;
            property._ownerBasePrice = ownerBasePrice;

            // Title / location
            document.getElementById('propTitle').textContent     = property.Title;
            document.getElementById('propLocation').textContent  = `📍 ${property.Address}, ${property.City}, ${property.Wilaya}`;
            document.getElementById('propTypeBadge').textContent = property.PropertyType;
            document.getElementById('propRooms').textContent     = property.NumofRooms;
            document.getElementById('propRating').textContent    = property.AverageRating ? Number(property.AverageRating).toFixed(1) : 'New';
            document.getElementById('propReviewsCount').textContent = `(${property.TotalReviews || 0} reviews)`;
            document.getElementById('propDescription').textContent  = property.Description || 'No description available.';

            // Price display
            const priceWrap = document.getElementById('propPriceWrap');
            if (originalPrice && promoLabel) {
                priceWrap.innerHTML = `
                    <div class="promo-price-wrap">
                        <span class="promo-label">🔥 ${promoLabel}</span>
                        <span class="original-price">${Math.round(originalPrice).toLocaleString()} DZD</span>
                        <span class="discounted-price">${Math.round(displayPrice).toLocaleString()} DZD</span>
                        <small style="color:var(--text-muted);font-size:0.85rem;">/ night</small>
                    </div>`;
            } else {
                priceWrap.innerHTML = `<div>${Math.round(displayPrice).toLocaleString()} DZD <small style="font-size:.9rem;font-weight:400;color:var(--text-muted);">/ night</small></div>`;
            }

            // Gallery
            const gallery = document.getElementById('gallery');
            if (property.Images && property.Images.length > 0) {
                const fullUrl = url => url.startsWith('http') ? url : `${SERVER_URL}${url}`;
                let html = `<div class="main-img-container"><img src="${fullUrl(property.Images[0].ImageURL)}" alt="${property.Title}"></div>`;
                if (property.Images.length > 1) {
                    const img2 = fullUrl(property.Images[1].ImageURL);
                    const img3 = property.Images[2] ? fullUrl(property.Images[2].ImageURL) : img2;
                    html += `<div class="side-imgs-container"><img src="${img2}" alt=""><img src="${img3}" alt=""></div>`;
                }
                gallery.innerHTML = html;
            } else {
                gallery.innerHTML = `<div style="background:rgba(0,0,0,0.06);border-radius:var(--radius-lg);display:flex;align-items:center;justify-content:center;font-size:4rem;grid-column:1/-1;height:300px;">🏠</div>`;
            }

            // Features
            document.getElementById('propFeatures').innerHTML = (property.Features || []).map(f => `
                <div style="background:rgba(128,128,128,0.1);padding:8px 15px;border-radius:10px;font-size:.9rem;">
                    <i class="fa-solid fa-check" style="color:var(--primary);margin-right:8px;"></i>${f.FeatureName}
                </div>`).join('');

            // ── Owner section (chat button rendered here, NOT in onclick attr) ──
            // ✅ FIX: build owner section dynamically so property values are embedded correctly
            const ownerInitial = (property.OwnerName || 'O').charAt(0);
            const ownerId      = property.OwnerId;
            const ownerName    = (property.OwnerName || 'Owner').replace(/'/g, "\\'");
            const propId       = property.PropertyId;

            document.getElementById('ownerSection').innerHTML = `
                <div style="display:flex;align-items:center;gap:15px;margin-bottom:14px;">
                    <div style="width:46px;height:46px;border-radius:50%;background:var(--primary);
                                color:white;display:flex;align-items:center;justify-content:center;
                                font-size:1.2rem;font-weight:700;flex-shrink:0;">${ownerInitial}</div>
                    <div>
                        <div style="font-size:0.78rem;color:var(--text-muted);">🏠 Hosted by</div>
                        <b>${property.OwnerName || 'Owner'}</b>
                    </div>
                </div>
                <button class="chat-owner-btn" id="chatOwnerBtn">
                    <i class="fa-solid fa-message"></i> Message Owner
                </button>`;

            // Attach click handler directly (no inline eval)
            document.getElementById('chatOwnerBtn').addEventListener('click', () => {
                openChat(ownerId, ownerName, propId);
            });

            // Date constraints
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('startDate').min = today;
            document.getElementById('endDate').min   = today;

            // Update price breakdown on date change
            ['startDate', 'endDate'].forEach(id => {
                document.getElementById(id).addEventListener('change', updatePriceBreakdown);
            });
        }

        // ── Price breakdown updater ──────────────────────────────
        function updatePriceBreakdown() {
            const s = new Date(document.getElementById('startDate').value);
            const e = new Date(document.getElementById('endDate').value);
            const box = document.getElementById('priceBreakdown');

            if (!s || !e || e <= s) { box.style.display = 'none'; return; }

            const nights = Math.ceil((e - s) / 86400000);
            const total  = nights * property._displayPrice;

            document.getElementById('bdNights').textContent   = `${nights} night${nights > 1 ? 's' : ''}`;
            document.getElementById('bdNightRate').textContent = `${Math.round(property._displayPrice).toLocaleString()} DZD × ${nights}`;
            document.getElementById('bdTotal').textContent    = `${Math.round(total).toLocaleString()} DZD`;
            box.style.display = 'block';
        }

        // ── Booking submit ────────────────────────────────────────
        async function handleBookingSubmit(e) {
            e.preventDefault();

            if (!user) { window.location.href = 'login.html'; return; }

            const sDate = document.getElementById('startDate').value;
            const eDate = document.getElementById('endDate').value;
            const phone = document.getElementById('phoneNumber').value.trim();

            if (!sDate || !eDate || new Date(eDate) <= new Date(sDate)) {
                showBookingMsg('Please select valid check-in and check-out dates.', 'error');
                return;
            }

            const btn = document.getElementById('bookBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';
            hideBookingMsg();

            const nights = Math.ceil((new Date(eDate) - new Date(sDate)) / 86400000);

            // ✅ FIX: Correct price separation
            // displayPrice includes 10% platform markup
            // ownerBasePrice is the amount owner receives (before markup)
            const displayPrice   = property._displayPrice;
            const ownerBasePrice = property._ownerBasePrice;
            const totalPrice     = Math.round(nights * displayPrice * 100) / 100;      // renter pays
            const basePrice      = Math.round(nights * ownerBasePrice * 100) / 100;    // owner receives

            try {
                // Step 1: Create booking (Pending)
                const bookingRes = await fetch(`${API_URL}/bookings`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({
                        UserId:        user.UserId,
                        PropertyId:    property.PropertyId,
                        StartDate:     sDate,
                        EndDate:       eDate,
                        LengthOfStay:  nights,
                        TotalPrice:    totalPrice,    // ✅ what renter pays (with 10%)
                        BasePrice:     basePrice,     // ✅ what owner gets (without 10%)
                        DiscountAmount: Math.max(0, Math.round((property._displayPrice - displayPrice) * nights * 100) / 100),
                        PhoneNumber:   phone,
                        BookingStatus: 'Pending'
                    })
                });

                const bookingData = await bookingRes.json();
                if (!bookingRes.ok) throw new Error(bookingData.error || 'Failed to create booking');

                pendingBookingId = bookingData.bookingId;

                // Step 2: Create Chargily payment session
                const payRes = await fetch(`${API_URL}/payment/create-booking-payment`, {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ bookingId: pendingBookingId })
                });

                const payData = await payRes.json();
                if (!payRes.ok || !payData.checkoutUrl) {
                    // ✅ FIX: Clean up the orphaned pending booking if payment setup fails
                    await cancelPendingBooking(pendingBookingId);
                    throw new Error(payData.error || 'Could not create payment session');
                }

                // Step 3: Redirect to payment page
                window.location.href = payData.checkoutUrl;

            } catch (err) {
                showBookingMsg('Booking failed: ' + err.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-credit-card"></i> Confirm & Pay';
            }
        }

        // ✅ FIX: Cancel orphaned pending booking on payment failure
        async function cancelPendingBooking(bookingId) {
            if (!bookingId) return;
            try {
                await fetch(`${API_URL}/bookings/cancel/${bookingId}`, { method: 'DELETE' });
            } catch (_) {
                // Best-effort; user can still cancel from My Bookings
            }
        }

        function showBookingMsg(text, type = 'error') {
            const el = document.getElementById('bookingMsg');
            el.textContent = text;
            el.className   = `inline-msg ${type}`;
            el.style.display = 'block';
        }
        function hideBookingMsg() {
            document.getElementById('bookingMsg').style.display = 'none';
        }

        // ── Reviews ──────────────────────────────────────────────
        async function loadReviews() {
            const res  = await fetch(`${API_URL}/reviews/property/${propertyId}`);
            const data = await res.json();

            document.getElementById('summaryStars').innerHTML = getStarHtml(property.AverageRating || 0);

            const list = document.getElementById('reviewsList');
            if (!data.reviews || !data.reviews.length) {
                list.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted);">📝 No reviews yet.</div>`;
                return;
            }

            list.innerHTML = data.reviews.map(r => `
                <div class="review-card">
                    <div class="review-meta">
                        <div class="reviewer-avatar">${r.ReviewerName.charAt(0)}</div>
                        <div>
                            <div style="font-weight:600;">${r.ReviewerName}</div>
                            <div class="stars">${getStarHtml(r.Rating)}</div>
                        </div>
                        <div style="margin-left:auto;font-size:.85rem;color:var(--text-muted);">
                            ${new Date(r.ReviewDate).toLocaleDateString()}
                        </div>
                    </div>
                    <p style="margin:0;opacity:.85;">💬 ${r.Comment || ''}</p>
                </div>`).join('');
        }

        function getStarHtml(rating) {
            let html = '';
            for (let i = 1; i <= 5; i++) {
                if (i <= Math.floor(rating))                         html += '<i class="fa-solid fa-star"></i>';
                else if (i === Math.ceil(rating) && rating % 1 !== 0) html += '<i class="fa-solid fa-star-half-stroke"></i>';
                else                                                  html += '<i class="fa-regular fa-star"></i>';
            }
            return html;
        }

        // ── Review permission ─────────────────────────────────────
        async function checkReviewPermission() {
            const area = document.getElementById('reviewFormArea');
            if (!user) {
                area.innerHTML = `<p style="text-align:center;color:var(--primary);">🔒 Login to leave a review.</p>`;
                return;
            }
            try {
                const res      = await fetch(`${API_URL}/bookings/user/${user.UserId}`);
                const bookings = await res.json();
                const valid    = bookings.find(b =>
                    b.PropertyId == propertyId &&
                    (b.BookingStatus === 'Completed' || new Date(b.EndDate) < new Date())
                );
                if (!valid) {
                    area.innerHTML = `<p style="text-align:center;color:var(--text-muted);font-size:.9rem;">📋 Complete a stay to leave a review.</p>`;
                    return;
                }
                const checkRes = await fetch(`${API_URL}/bookings/${valid.BookingId}/can-review?userId=${user.UserId}`);
                const check    = await checkRes.json();
                if (check.canReviewProperty) {
                    renderReviewForm(valid.BookingId);
                } else {
                    area.innerHTML = `<p style="text-align:center;color:#28a745;"><i class="fa-solid fa-circle-check"></i> ✅ Thank you for your review!</p>`;
                }
            } catch (_) {}
        }

        function renderReviewForm(bookingId) {
            const area = document.getElementById('reviewFormArea');
            area.innerHTML = `
                <h3>✍️ Share your experience</h3>
                <div class="star-rating" id="starInput">
                    ${[1,2,3,4,5].map(v => `<i class="fa-regular fa-star" data-val="${v}"></i>`).join('')}
                </div>
                <textarea class="review-textarea" id="reviewComment" placeholder="Tell others about your stay..."></textarea>
                <button class="book-btn" onclick="submitReview(${bookingId})" style="max-width:220px;">📝 Submit Review</button>`;

            area.querySelectorAll('.star-rating i').forEach(star => {
                star.onclick = () => {
                    selectedStars = parseInt(star.dataset.val);
                    area.querySelectorAll('.star-rating i').forEach(s => {
                        const active = parseInt(s.dataset.val) <= selectedStars;
                        s.classList.toggle('fa-solid',  active);
                        s.classList.toggle('fa-regular', !active);
                        s.classList.toggle('active',     active);
                    });
                };
            });
        }

        async function submitReview(bookingId) {
            const comment = document.getElementById('reviewComment').value.trim();
            if (!selectedStars || !comment) { alert('Please provide a rating and comment.'); return; }

            const res = await fetch(`${API_URL}/reviews`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    reviewerId:     user.UserId,
                    reviewedUserId: property.OwnerId,
                    propertyId:     property.PropertyId,
                    bookingId,
                    rating:         selectedStars,
                    comment,
                    reviewerType:   user.UserType,
                    reviewedRole:   'Property'
                })
            });

            if (res.ok) { alert('✅ Review saved!'); location.reload(); }
            else        { alert('Failed to save review.'); }
        }

        // ── Chat ─────────────────────────────────────────────────
        // ✅ FIX: openChat is called from a proper event listener, not an inline onclick
        function openChat(ownerId, ownerName, propId) {
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.UserId === ownerId) { alert("You can't message yourself."); return; }
            sessionStorage.setItem('openChatIntent', JSON.stringify({ ownerId, ownerName, propId }));
            window.location.href = 'index.html';
        }

        // ── Init ─────────────────────────────────────────────────
        async function init() {
            try {
                const res = await fetch(`${API_URL}/properties/${propertyId}`);
                if (!res.ok) throw new Error('Not found');
                property = await res.json();

                renderDetails();
                loadReviews();
                checkReviewPermission();

                document.getElementById('loading').style.display        = 'none';
                document.getElementById('propertyContent').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').innerHTML =
                    `<h2 style="color:red;">Property Not Found</h2><p>${err.message}</p><a href="index.html">Back Home</a>`;
            }
        }

        init();
    </script>
</body>
</html>
