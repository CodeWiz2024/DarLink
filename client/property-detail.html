<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details - DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="js/i18n-dashboard.js"></script>
    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <style>
        :root {
            --primary: #0A84FF;
            --primary-dark: #0062D1;
            --accent: #34C759;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255,255,255,0.5);
            --nav-h: 60px;
            --text: #111827;
            --muted: #6B7280;
            --bg: #F0F2F5;
        }
        [data-theme="dark"] {
            --glass-bg: rgba(20, 20, 25, 0.85);
            --glass-border: rgba(255,255,255,0.1);
            --text: #F1F5F9;
            --muted: #94A3B8;
            --bg: #0D0F12;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { overflow-x:hidden; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ══════════════ NAVBAR ══════════════ */
        .navbar {
            position: sticky; top:0; z-index:1000;
            height: var(--nav-h);
            padding: 0 16px;
            display: flex; align-items:center; justify-content:space-between; gap:10px;
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 1px 0 rgba(0,0,0,.04);
        }
        .nav-logo {
            display:flex; align-items:center; gap:7px;
            font-size:1.2rem; font-weight:800; color:var(--primary);
            text-decoration:none; flex-shrink:0;
        }
        .nav-actions { display:flex; align-items:center; gap:6px; }
        .nav-btn {
            width:36px; height:36px; border-radius:10px;
            border:1.5px solid rgba(0,0,0,.1);
            background:rgba(255,255,255,.5);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:.9rem; color:var(--text);
            transition:all .2s; text-decoration:none;
        }
        [data-theme="dark"] .nav-btn { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.12); color:#f1f5f9; }
        .nav-btn:hover { background:var(--primary); color:#fff; border-color:var(--primary); }
        .back-nav-btn {
            display:flex; align-items:center; gap:6px;
            padding: 7px 12px; border-radius:10px;
            border:1.5px solid rgba(0,0,0,.1);
            background:rgba(255,255,255,.5);
            color:var(--primary); font-size:.85rem; font-weight:600;
            cursor:pointer; text-decoration:none; white-space:nowrap;
            transition:all .2s;
        }
        [data-theme="dark"] .back-nav-btn { background:rgba(255,255,255,.08); border-color:rgba(255,255,255,.12); }
        .back-nav-btn:hover { background:var(--primary); color:#fff; }

        /* Hamburger */
        .nav-hamburger {
            display:none; flex-direction:column; gap:4px;
            cursor:pointer; padding:6px; border-radius:8px;
            border:none; background:transparent;
        }
        .nav-hamburger span { display:block; width:20px; height:2px; background:var(--text); border-radius:2px; }

        /* Mobile menu drawer */
        .nav-drawer {
            position:fixed; top:0; right:-280px; bottom:0;
            width:260px; height:100vh;
            background:rgba(248,250,252,0.98);
            backdrop-filter:blur(20px);
            border-left:1px solid rgba(255,255,255,.6);
            z-index:2000;
            display:flex; flex-direction:column;
            padding:70px 20px 30px;
            gap:10px;
            transition:right .3s cubic-bezier(.4,0,.2,1);
        }
        [data-theme="dark"] .nav-drawer { background:rgba(13,15,18,.98); }
        .nav-drawer.open { right:0; box-shadow:-8px 0 30px rgba(0,0,0,.15); }
        .nav-drawer-close {
            position:absolute; top:16px; right:16px;
            width:36px; height:36px; border-radius:50%;
            background:rgba(0,0,0,.06); border:none;
            display:flex; align-items:center; justify-content:center;
            cursor:pointer; font-size:.9rem; color:var(--muted);
        }
        [data-theme="dark"] .nav-drawer-close { background:rgba(255,255,255,.08); }
        .nav-drawer a {
            padding:12px 16px; border-radius:12px;
            border:1px solid rgba(0,0,0,.07);
            background:rgba(255,255,255,.9);
            display:flex; align-items:center; gap:10px;
            color:#111827; font-size:.9rem; font-weight:600;
            text-decoration:none; transition:all .2s;
        }
        [data-theme="dark"] .nav-drawer a { background:rgba(255,255,255,.07); border-color:rgba(255,255,255,.1); color:#f1f5f9; }
        .nav-drawer a.primary { background:var(--primary); color:#fff; border-color:var(--primary); }
        .nav-drawer-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,.4);
            backdrop-filter:blur(4px); z-index:1999; display:none;
        }
        .nav-drawer-overlay.show { display:block; }

        /* ══════════════ PAGE LAYOUT ══════════════ */
        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 20px 16px 60px;
        }

        /* ══════════════ IMAGE GALLERY ══════════════ */
        .gallery {
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            position: relative;
        }

        /* Mobile: horizontal scroll gallery */
        .gallery-scroll {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -ms-overflow-style: none;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .gallery-scroll::-webkit-scrollbar { display:none; }
        .gallery-scroll img, .gallery-scroll .gallery-placeholder {
            flex: 0 0 100%;
            width: 100%;
            height: 260px;
            object-fit: cover;
            scroll-snap-align: start;
            border-radius: 16px;
        }
        .gallery-placeholder {
            display:flex; align-items:center; justify-content:center;
            background:rgba(0,0,0,.06); font-size:3rem; color:var(--muted);
        }
        .gallery-counter {
            position:absolute; bottom:14px; right:14px;
            background:rgba(0,0,0,.55); color:#fff;
            padding:4px 10px; border-radius:20px;
            font-size:.75rem; font-weight:600;
            backdrop-filter:blur(8px);
        }

        /* Desktop: grid gallery */
        @media (min-width: 769px) {
            .gallery-scroll {
                display: grid;
                grid-template-columns: 2fr 1fr;
                gap: 10px;
                overflow-x: visible;
                scroll-snap-type: none;
            }
            .gallery-scroll img, .gallery-scroll .gallery-placeholder {
                flex: unset;
                width: 100%;
                height: 380px;
                scroll-snap-align: unset;
                border-radius: 12px;
            }
            .gallery-side {
                display: grid;
                grid-template-rows: 1fr 1fr;
                gap: 10px;
            }
            .gallery-side img {
                width:100%; height:100%;
                object-fit:cover; border-radius:12px;
            }
        }

        /* ══════════════ MAIN GRID ══════════════ */
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }
        @media (min-width: 769px) {
            .detail-grid { grid-template-columns: 1.8fr 1.2fr; gap: 28px; }
        }

        /* ══════════════ GLASS CARD ══════════════ */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,.06);
        }
        @media (min-width: 769px) { .card { padding: 28px; } }

        /* ══════════════ PROPERTY INFO ══════════════ */
        .prop-type-badge {
            display:inline-block; padding:5px 12px;
            background:rgba(10,132,255,.1); color:var(--primary);
            border-radius:8px; font-size:.78rem; font-weight:700;
            margin-bottom:10px;
        }
        .prop-title {
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            font-weight: 800; line-height: 1.2;
            margin-bottom: 8px; color:var(--text);
        }
        .prop-location {
            display:flex; align-items:center; gap:5px;
            color:var(--muted); font-size:.88rem; margin-bottom:16px;
        }
        .prop-price-wrap { margin-bottom:20px; }
        .prop-price {
            font-size: 1.8rem; font-weight:800; color:var(--primary); line-height:1;
        }
        .prop-price-night { font-size:.8rem; font-weight:400; color:var(--muted); }
        .old-price-tag { font-size:1rem; color:var(--muted); text-decoration:line-through; font-weight:400; }
        .promo-tag {
            display:inline-block; padding:3px 10px;
            background:#FF3B30; color:#fff;
            border-radius:8px; font-size:.72rem; font-weight:700;
            margin-bottom:6px;
        }

        .prop-stats {
            display:flex; gap:16px; flex-wrap:wrap;
            padding:16px 0; border-top:1px solid var(--glass-border);
            border-bottom:1px solid var(--glass-border);
            margin-bottom:20px;
        }
        .stat-item {
            display:flex; align-items:center; gap:8px;
            font-size:.88rem; color:var(--text);
        }
        .stat-icon {
            width:36px; height:36px; border-radius:10px;
            background:rgba(10,132,255,.1); color:var(--primary);
            display:flex; align-items:center; justify-content:center;
            font-size:.85rem; flex-shrink:0;
        }

        .section-title { font-size:1rem; font-weight:700; margin-bottom:10px; }
        .prop-desc { font-size:.9rem; line-height:1.7; color:var(--text); opacity:.85; margin-bottom:20px; }

        /* Features chips */
        .features-wrap { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px; }
        .feature-chip {
            display:flex; align-items:center; gap:6px;
            padding:7px 12px; border-radius:10px;
            background:rgba(0,0,0,.04); font-size:.82rem; color:var(--text);
        }
        [data-theme="dark"] .feature-chip { background:rgba(255,255,255,.07); }
        .feature-chip i { color:var(--primary); font-size:.8rem; }

        /* ══════════════ BOOKING CARD ══════════════ */
        .booking-card {
            position: sticky;
            top: calc(var(--nav-h) + 12px);
        }
        .booking-title { font-size:1.1rem; font-weight:700; margin-bottom:16px; }

        .form-field { margin-bottom:14px; }
        .form-field label {
            display:block; font-size:.78rem; font-weight:600;
            color:var(--muted); margin-bottom:6px;
            text-transform:uppercase; letter-spacing:.04em;
        }
        .form-field input {
            width:100%; padding:12px 14px;
            border:1.5px solid var(--glass-border);
            border-radius:12px; font-size:.95rem; font-family:inherit;
            background:rgba(255,255,255,.6); color:var(--text);
            transition:border-color .2s; outline:none;
        }
        [data-theme="dark"] .form-field input { background:rgba(255,255,255,.08); }
        .form-field input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(10,132,255,.12); }

        .price-breakdown {
            background:rgba(10,132,255,.06); border:1px solid rgba(10,132,255,.15);
            padding:14px; border-radius:12px; margin-bottom:14px; display:none;
        }
        .price-row { display:flex; justify-content:space-between; padding:4px 0; font-size:.85rem; }
        .price-row.total { font-weight:700; font-size:.95rem; border-top:1px solid rgba(10,132,255,.2); margin-top:8px; padding-top:10px; color:var(--primary); }

        .book-btn {
            width:100%; padding:15px;
            background:var(--primary); color:#fff;
            border:none; border-radius:14px;
            font-size:1rem; font-weight:700; cursor:pointer;
            transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .book-btn:hover { background:var(--primary-dark); transform:translateY(-1px); }
        .book-btn:disabled { background:#aaa; cursor:not-allowed; transform:none; }

        .inline-msg {
            padding:12px 14px; border-radius:12px;
            font-size:.85rem; font-weight:500; margin-bottom:12px; display:none;
        }
        .inline-msg.error { background:rgba(255,59,48,.1); color:#c00; border:1px solid rgba(255,59,48,.2); }
        .inline-msg.success { background:rgba(52,199,89,.1); color:#1a6b2e; border:1px solid rgba(52,199,89,.2); }
        [data-theme="dark"] .inline-msg.error { color:#ff6b6b; }
        [data-theme="dark"] .inline-msg.success { color:#34c759; }

        /* Owner section */
        .owner-section {
            margin-top:18px; padding-top:18px;
            border-top:1px solid var(--glass-border);
        }
        .owner-row { display:flex; align-items:center; gap:12px; margin-bottom:12px; }
        .owner-avatar {
            width:44px; height:44px; border-radius:50%;
            background:var(--primary); color:#fff;
            display:flex; align-items:center; justify-content:center;
            font-size:1.1rem; font-weight:700; flex-shrink:0;
        }
        .owner-label { font-size:.73rem; color:var(--muted); margin-bottom:2px; }
        .owner-name { font-weight:700; font-size:.9rem; }
        .chat-btn {
            width:100%; padding:12px;
            background:rgba(10,132,255,.08); color:var(--primary);
            border:1.5px solid rgba(10,132,255,.2); border-radius:12px;
            font-size:.9rem; font-weight:600; cursor:pointer;
            display:flex; align-items:center; justify-content:center; gap:8px;
            transition:all .2s;
        }
        .chat-btn:hover { background:var(--primary); color:#fff; }

        /* ══════════════ REVIEWS ══════════════ */
        .review-item {
            padding:16px 0; border-bottom:1px solid var(--glass-border);
        }
        .review-item:last-child { border-bottom:none; }
        .review-meta { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
        .reviewer-av {
            width:38px; height:38px; border-radius:50%;
            background:var(--primary); color:#fff;
            display:flex; align-items:center; justify-content:center;
            font-weight:700; font-size:.9rem; flex-shrink:0;
        }
        .reviewer-name { font-weight:600; font-size:.88rem; }
        .review-date { font-size:.75rem; color:var(--muted); margin-left:auto; }
        .stars { color:#FFCC00; font-size:.85rem; }
        .review-text { font-size:.88rem; color:var(--text); line-height:1.6; opacity:.85; }

        /* Review form */
        .write-review-area { margin-top:20px; padding-top:16px; border-top:1px solid var(--glass-border); }
        .star-input { display:flex; gap:8px; margin:12px 0; }
        .star-input i { font-size:1.8rem; cursor:pointer; color:#ddd; transition:color .2s; }
        .star-input i.active { color:#FFCC00; }
        .review-textarea {
            width:100%; padding:12px 14px;
            border:1.5px solid var(--glass-border); border-radius:12px;
            font-size:.9rem; font-family:inherit; color:var(--text);
            background:rgba(255,255,255,.6);
            min-height:100px; resize:vertical; margin-bottom:12px;
            outline:none;
        }
        [data-theme="dark"] .review-textarea { background:rgba(255,255,255,.07); }
        .review-textarea:focus { border-color:var(--primary); }

        /* Loading */
        #loading { text-align:center; padding:60px 20px; color:var(--muted); }

        /* ══════════════ MOBILE BOOKING CTA ══════════════ */
        /* On mobile, hide sticky booking card and show a bottom bar */
        .mobile-book-bar {
            display:none;
            position:fixed; bottom:0; left:0; right:0; z-index:900;
            background:var(--glass-bg); backdrop-filter:blur(20px);
            border-top:1px solid var(--glass-border);
            padding:12px 16px;
            align-items:center; justify-content:space-between; gap:12px;
        }
        .mobile-book-price { font-weight:800; font-size:1.1rem; color:var(--primary); }
        .mobile-book-price small { font-size:.72rem; font-weight:400; color:var(--muted); display:block; }
        .mobile-book-btn {
            padding:12px 24px; background:var(--primary); color:#fff;
            border:none; border-radius:12px; font-weight:700; font-size:.95rem;
            cursor:pointer; transition:all .2s; flex-shrink:0;
        }
        .mobile-book-btn:hover { background:var(--primary-dark); }

        /* Booking modal for mobile */
        .booking-modal-overlay {
            display:none; position:fixed; inset:0; z-index:2000;
            background:rgba(0,0,0,.5); backdrop-filter:blur(6px);
        }
        .booking-modal-overlay.show { display:block; }
        .booking-modal {
            position:fixed; bottom:0; left:0; right:0; z-index:2001;
            background:var(--glass-bg); backdrop-filter:blur(20px);
            border-radius:24px 24px 0 0;
            border-top:1px solid var(--glass-border);
            padding:24px 20px 40px;
            transform:translateY(100%);
            transition:transform .4s cubic-bezier(.4,0,.2,1);
            max-height:92vh; overflow-y:auto;
        }
        .booking-modal.show { transform:translateY(0); }
        .modal-handle { width:40px; height:4px; background:rgba(0,0,0,.15); border-radius:2px; margin:0 auto 20px; }
        [data-theme="dark"] .modal-handle { background:rgba(255,255,255,.2); }

        @media (max-width: 768px) {
            .booking-card { display:none; } /* hide sidebar booking on mobile */
            .mobile-book-bar { display:flex; }
            .page-wrap { padding-bottom: 90px; } /* space for bottom bar */

            /* Stack gallery full width on mobile, one image at a time */
            .gallery { border-radius: 16px; margin: 0 -16px 20px; }
            .gallery-scroll img, .gallery-scroll .gallery-placeholder { border-radius:0; height:240px; }

            /* Reviews card full width */
            .detail-grid { grid-template-columns: 1fr; }
        }

        @media (min-width: 769px) {
            .mobile-book-bar { display:none !important; }
            .booking-modal-overlay, .booking-modal { display:none !important; }
            .gallery { border-radius:20px; }
        }

        /* Misc */
        .loading-spin { 
            font-size:2rem; color:var(--primary); display:block; 
            margin-bottom:12px; animation:spin .8s linear infinite; 
        }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>

    <script>
    window.I18N_MESSAGES = {
        nav_home: { en: 'Home', ar: 'الرئيسية' },
        nav_logo_text: { en: 'DarLink', ar: 'دارلينك' }
    };
    </script>
</head>
<body>

<!-- ══════════════ NAVBAR ══════════════ -->
<nav class="navbar">
    <a href="index.html" class="back-nav-btn">
        <i class="fa-solid fa-arrow-left"></i>
        <span>Back</span>
    </a>

    <a href="index.html" class="nav-logo">
        <i class="fa-solid fa-house"></i>
        <span>DarLink</span>
    </a>

    <div class="nav-actions">
        <button class="nav-btn" onclick="toggleTheme()" aria-label="Toggle theme">
            <i class="fa-regular fa-moon" id="themeIcon"></i>
        </button>
        <button class="nav-hamburger" id="navHamburger" onclick="openDrawer()" aria-label="Menu">
            <span></span><span></span><span></span>
        </button>
    </div>
</nav>

<!-- Mobile Nav Drawer -->
<div class="nav-drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="nav-drawer" id="navDrawer">
    <button class="nav-drawer-close" onclick="closeDrawer()"><i class="fa-solid fa-times"></i></button>
    <a href="index.html"><i class="fa-solid fa-house"></i> Home</a>
    <a href="login.html" id="drawerLogin"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
    <a href="Register.html" id="drawerRegister" class="primary"><i class="fa-solid fa-user-plus"></i> Register</a>
    <a href="#" id="drawerDashboard" style="display:none"><i class="fa-solid fa-gauge"></i> Dashboard</a>
    <a href="my-bookings.html" id="drawerBookings" style="display:none"><i class="fa-solid fa-calendar"></i> My Bookings</a>
    <a href="profile.html" id="drawerProfile" style="display:none"><i class="fa-solid fa-user"></i> Profile</a>
</div>

<!-- ══════════════ PAGE ══════════════ -->
<main class="page-wrap">
    <div id="loading">
        <i class="fa-solid fa-spinner loading-spin"></i>
        Loading property details...
    </div>

    <div id="propertyContent" style="display:none">

        <!-- Gallery -->
        <div class="gallery">
            <div class="gallery-scroll" id="gallery"></div>
            <div class="gallery-counter" id="galleryCounter" style="display:none"></div>
        </div>

        <!-- Main Detail Grid -->
        <div class="detail-grid">

            <!-- Left: Info + Reviews -->
            <div>
                <!-- Property Info Card -->
                <div class="card" style="margin-bottom:20px">
                    <span class="prop-type-badge" id="propTypeBadge">Type</span>
                    <h1 class="prop-title" id="propTitle"></h1>
                    <div class="prop-location" id="propLocation">
                        <i class="fa-solid fa-location-dot" style="color:var(--primary)"></i>
                    </div>

                    <div class="prop-price-wrap" id="propPriceWrap"></div>

                    <div class="prop-stats" id="propStats"></div>

                    <div class="section-title">📝 Description</div>
                    <p class="prop-desc" id="propDesc"></p>

                    <div class="section-title">✨ Features</div>
                    <div class="features-wrap" id="propFeatures"></div>
                </div>

                <!-- Reviews Card -->
                <div class="card">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                        <h2 style="font-size:1.05rem;font-weight:700">⭐ Guest Reviews</h2>
                        <span class="stars" id="summaryStars"></span>
                    </div>
                    <div id="reviewsList"></div>
                    <div id="reviewFormArea"></div>
                </div>
            </div>

            <!-- Right: Booking Card (desktop only) -->
            <div class="booking-card card">
                <div class="booking-title">📅 Book This Stay</div>
                <div class="inline-msg" id="bookingMsgDesk"></div>
                <form id="bookingFormDesk" onsubmit="handleBookingSubmit(event,'desk')">
                    <div class="form-field">
                        <label>Check-in</label>
                        <input type="date" id="startDateDesk" required>
                    </div>
                    <div class="form-field">
                        <label>Check-out</label>
                        <input type="date" id="endDateDesk" required>
                    </div>
                    <div class="form-field">
                        <label>Phone Number</label>
                        <input type="tel" id="phoneDesk" placeholder="06XXXXXXXX" required>
                    </div>
                    <div class="price-breakdown" id="breakdownDesk">
                        <div class="price-row"><span id="bdNightsDesk"></span><span id="bdRateDesk"></span></div>
                        <div class="price-row total"><span>Total</span><span id="bdTotalDesk"></span></div>
                    </div>
                    <button type="submit" class="book-btn" id="bookBtnDesk">
                        <i class="fa-solid fa-credit-card"></i> Confirm & Pay
                    </button>
                </form>
                <div class="owner-section" id="ownerSectionDesk"></div>
            </div>
        </div>
    </div>
</main>

<!-- ══════════════ MOBILE BOTTOM BAR ══════════════ -->
<div class="mobile-book-bar" id="mobileBookBar">
    <div class="mobile-book-price" id="mobilePrice">
        <span id="mobilePriceVal">—</span>
        <small>DZD / night</small>
    </div>
    <button class="mobile-book-btn" onclick="openBookingModal()">
        Book Now
    </button>
</div>

<!-- ══════════════ MOBILE BOOKING MODAL ══════════════ -->
<div class="booking-modal-overlay" id="bookingModalOverlay" onclick="closeBookingModal()"></div>
<div class="booking-modal" id="bookingModal">
    <div class="modal-handle"></div>
    <div class="booking-title">📅 Book This Stay</div>
    <div class="inline-msg" id="bookingMsgMob"></div>
    <form id="bookingFormMob" onsubmit="handleBookingSubmit(event,'mob')">
        <div class="form-field">
            <label>Check-in</label>
            <input type="date" id="startDateMob" required>
        </div>
        <div class="form-field">
            <label>Check-out</label>
            <input type="date" id="endDateMob" required>
        </div>
        <div class="form-field">
            <label>Phone Number</label>
            <input type="tel" id="phoneMob" placeholder="06XXXXXXXX" required>
        </div>
        <div class="price-breakdown" id="breakdownMob">
            <div class="price-row"><span id="bdNightsMob"></span><span id="bdRateMob"></span></div>
            <div class="price-row total"><span>Total</span><span id="bdTotalMob"></span></div>
        </div>
        <button type="submit" class="book-btn" id="bookBtnMob">
            <i class="fa-solid fa-credit-card"></i> Confirm & Pay
        </button>
    </form>
    <div class="owner-section" id="ownerSectionMob" style="margin-top:16px"></div>
</div>

<script>
const SERVER_URL = 'https://darlink-production.up.railway.app';
const API_URL    = `${SERVER_URL}/api`;

const user       = JSON.parse(localStorage.getItem('user') || 'null');
const urlParams  = new URLSearchParams(window.location.search);
const propertyId = urlParams.get('id');

let property     = null;
let selectedStars = 0;
let pendingBookingId = null;

if (!propertyId) window.location.href = 'index.html';

/* ── Theme ── */
const _t = localStorage.getItem('site_theme') || 'light';
document.documentElement.setAttribute('data-theme', _t);
document.addEventListener('DOMContentLoaded', () => {
    const icon = document.getElementById('themeIcon');
    if(icon) icon.className = _t === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
});
function toggleTheme(){
    const t = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('site_theme', t);
    const icon = document.getElementById('themeIcon');
    if(icon) icon.className = t === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
}

/* ── Nav drawer ── */
function openDrawer(){
    document.getElementById('navDrawer').classList.add('open');
    document.getElementById('drawerOverlay').classList.add('show');
}
function closeDrawer(){
    document.getElementById('navDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('show');
}

/* ── Setup nav based on user state ── */
if(user) {
    document.getElementById('drawerLogin').style.display = 'none';
    document.getElementById('drawerRegister').style.display = 'none';
    document.getElementById('drawerDashboard').style.display = 'flex';
    document.getElementById('drawerDashboard').href = user.UserType === 'Owner' ? 'AddHome.html' : 'Rent.html';
    document.getElementById('drawerBookings').style.display = 'flex';
    document.getElementById('drawerProfile').style.display = 'flex';
}

/* ── Mobile booking modal ── */
function openBookingModal(){
    if(!user){ window.location.href='login.html'; return; }
    document.getElementById('bookingModalOverlay').classList.add('show');
    document.getElementById('bookingModal').classList.add('show');
}
function closeBookingModal(){
    document.getElementById('bookingModalOverlay').classList.remove('show');
    document.getElementById('bookingModal').classList.remove('show');
}

/* ── Price calculation ── */
function calcPricing(prop) {
    const priceInDB = parseFloat(prop.PricePerNight);
    if (!prop.HasPromotion) {
        return { displayPrice: priceInDB, originalPrice: null, promoLabel: null, ownerBasePrice: priceInDB / 1.1 };
    }
    const ownerBase = priceInDB / 1.1;
    let ownerAfterDiscount = ownerBase, promoLabel = '';
    if (prop.DiscountType === 'Percentage' && parseFloat(prop.DiscountPercentage) > 0) {
        const pct = parseFloat(prop.DiscountPercentage);
        ownerAfterDiscount = ownerBase * (1 - pct / 100);
        promoLabel = `${pct}% OFF`;
    } else if (prop.DiscountType === 'FixedAmount' && parseFloat(prop.DiscountAmount) > 0) {
        const amt = parseFloat(prop.DiscountAmount);
        ownerAfterDiscount = Math.max(0, ownerBase - amt);
        promoLabel = `${Math.round(amt).toLocaleString()} DZD OFF`;
    }
    const displayPrice = ownerAfterDiscount * 1.1;
    return { displayPrice, originalPrice: priceInDB, promoLabel, ownerBasePrice: ownerAfterDiscount };
}

/* ── Stars helper ── */
function getStarHtml(rating) {
    let html = '';
    for (let i = 1; i <= 5; i++) {
        if (i <= Math.floor(rating))                           html += '<i class="fa-solid fa-star"></i>';
        else if (i === Math.ceil(rating) && rating % 1 !== 0) html += '<i class="fa-solid fa-star-half-stroke"></i>';
        else                                                   html += '<i class="fa-regular fa-star"></i>';
    }
    return html;
}

/* ── Render property ── */
function renderDetails() {
    const { displayPrice, originalPrice, promoLabel, ownerBasePrice } = calcPricing(property);
    property._displayPrice   = displayPrice;
    property._ownerBasePrice = ownerBasePrice;

    document.getElementById('propTypeBadge').textContent = property.PropertyType;
    document.getElementById('propTitle').textContent     = property.Title;
    document.getElementById('propLocation').innerHTML    = `<i class="fa-solid fa-location-dot" style="color:var(--primary)"></i> ${property.Address}, ${property.City}, ${property.Wilaya}`;
    document.getElementById('propDesc').textContent      = property.Description || 'No description available.';

    // Price
    const pw = document.getElementById('propPriceWrap');
    if (originalPrice && promoLabel) {
        pw.innerHTML = `
            <span class="promo-tag">🔥 ${promoLabel}</span><br>
            <span class="old-price-tag">${Math.round(originalPrice).toLocaleString()} DZD</span>
            <div class="prop-price">${Math.round(displayPrice).toLocaleString()} <span class="prop-price-night">DZD / night</span></div>`;
    } else {
        pw.innerHTML = `<div class="prop-price">${Math.round(displayPrice).toLocaleString()} <span class="prop-price-night">DZD / night</span></div>`;
    }

    // Mobile price bar
    document.getElementById('mobilePriceVal').textContent = Math.round(displayPrice).toLocaleString();

    // Stats
    document.getElementById('propStats').innerHTML = `
        <div class="stat-item"><div class="stat-icon"><i class="fa-solid fa-door-open"></i></div><span><b>${property.NumofRooms}</b> Rooms</span></div>
        ${property.AverageRating > 0 ? `<div class="stat-item"><div class="stat-icon"><i class="fa-solid fa-star"></i></div><span><b>${Number(property.AverageRating).toFixed(1)}</b> (${property.TotalReviews} reviews)</span></div>` : ''}
        <div class="stat-item"><div class="stat-icon"><i class="fa-solid fa-house"></i></div><span>${property.PropertyType}</span></div>`;

    // Features
    const featsHtml = (property.Features || []).map(f =>
        `<span class="feature-chip"><i class="fa-solid fa-check"></i>${f.FeatureName}</span>`).join('');
    document.getElementById('propFeatures').innerHTML = featsHtml || '<span style="color:var(--muted);font-size:.85rem">No features listed</span>';

    // Gallery
    const gallery = document.getElementById('galleryScroll') || document.getElementById('gallery');
    const imgs = property.Images || [];
    if(imgs.length > 0) {
        const fullUrl = url => url.startsWith('http') ? url : `${SERVER_URL}${url}`;
        gallery.innerHTML = imgs.map(img => `<img src="${fullUrl(img.ImageURL)}" alt="${property.Title}" loading="lazy">`).join('');
        if(imgs.length > 1) {
            const counter = document.getElementById('galleryCounter');
            counter.style.display = 'block';
            counter.textContent = `1 / ${imgs.length}`;
            // Update counter on scroll
            gallery.addEventListener('scroll', () => {
                const idx = Math.round(gallery.scrollLeft / gallery.offsetWidth);
                counter.textContent = `${idx + 1} / ${imgs.length}`;
            }, {passive:true});
        }
    } else {
        gallery.innerHTML = `<div class="gallery-placeholder"><i class="fa-solid fa-house"></i></div>`;
    }

    // Owner section — both desktop and mobile
    const ownerInitial = (property.OwnerName || 'O').charAt(0);
    const ownerHtml = `
        <div class="owner-row">
            <div class="owner-avatar">${ownerInitial}</div>
            <div>
                <div class="owner-label">Hosted by</div>
                <div class="owner-name">${property.OwnerName || 'Owner'}</div>
            </div>
        </div>
        <button class="chat-btn" id="chatBtnEl">
            <i class="fa-solid fa-message"></i> Message Owner
        </button>`;

    document.getElementById('ownerSectionDesk').innerHTML = ownerHtml;
    document.getElementById('ownerSectionMob').innerHTML  = ownerHtml.replace('chatBtnEl','chatBtnMob');

    // Attach click handlers
    ['chatBtnEl','chatBtnMob'].forEach(id => {
        const btn = document.getElementById(id);
        if(btn) btn.addEventListener('click', () => openChat(property.OwnerId, property.OwnerName, property.PropertyId));
    });

    // Date min
    const today = new Date().toISOString().split('T')[0];
    ['startDateDesk','endDateDesk','startDateMob','endDateMob'].forEach(id => {
        const el = document.getElementById(id);
        if(el) el.min = today;
    });

    // Price breakdown listeners
    ['Desk','Mob'].forEach(suffix => {
        const s = document.getElementById(`startDate${suffix}`);
        const e = document.getElementById(`endDate${suffix}`);
        if(s) s.addEventListener('change', () => updateBreakdown(suffix));
        if(e) e.addEventListener('change', () => updateBreakdown(suffix));
    });
}

function updateBreakdown(suffix) {
    const s = new Date(document.getElementById(`startDate${suffix}`).value);
    const e = new Date(document.getElementById(`endDate${suffix}`).value);
    const box = document.getElementById(`breakdown${suffix}`);
    if(!s || !e || e <= s) { box.style.display='none'; return; }
    const nights = Math.ceil((e - s) / 86400000);
    const total  = nights * property._displayPrice;
    document.getElementById(`bdNights${suffix}`).textContent = `${nights} night${nights > 1 ? 's' : ''}`;
    document.getElementById(`bdRate${suffix}`).textContent   = `${Math.round(property._displayPrice).toLocaleString()} DZD × ${nights}`;
    document.getElementById(`bdTotal${suffix}`).textContent  = `${Math.round(total).toLocaleString()} DZD`;
    box.style.display = 'block';
}

/* ── Booking submit ── */
async function handleBookingSubmit(e, mode) {
    e.preventDefault();
    if(!user) { window.location.href='login.html'; return; }

    const suffix = mode === 'mob' ? 'Mob' : 'Desk';
    const sDate = document.getElementById(`startDate${suffix}`).value;
    const eDate = document.getElementById(`endDate${suffix}`).value;
    const phone = document.getElementById(`phone${suffix === 'Mob' ? 'Mob' : 'Desk'}`).value.trim();

    if(!sDate || !eDate || new Date(eDate) <= new Date(sDate)) {
        showBookMsg('Please select valid check-in and check-out dates.', 'error', suffix);
        return;
    }

    const btn = document.getElementById(`bookBtn${suffix === 'Mob' ? 'Mob' : 'Desk'}`);
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

    const nights = Math.ceil((new Date(eDate) - new Date(sDate)) / 86400000);
    const displayPrice   = property._displayPrice;
    const ownerBasePrice = property._ownerBasePrice;
    const totalPrice     = Math.round(nights * displayPrice * 100) / 100;
    const basePrice      = Math.round(nights * ownerBasePrice * 100) / 100;

    try {
        const bookingRes = await fetch(`${API_URL}/bookings`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({
                UserId:property.OwnerId===user?.UserId ? null : user.UserId,
                PropertyId:property.PropertyId, StartDate:sDate, EndDate:eDate,
                LengthOfStay:nights, TotalPrice:totalPrice, BasePrice:basePrice,
                DiscountAmount:0, PhoneNumber:phone, BookingStatus:'Pending'
            })
        });
        const bData = await bookingRes.json();
        if(!bookingRes.ok) throw new Error(bData.error || 'Failed to create booking');
        pendingBookingId = bData.bookingId;

        const payRes = await fetch(`${API_URL}/payment/create-booking-payment`, {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ bookingId: pendingBookingId })
        });
        const pData = await payRes.json();
        if(!payRes.ok || !pData.checkoutUrl) {
            await fetch(`${API_URL}/bookings/cancel/${pendingBookingId}`, {method:'DELETE'});
            throw new Error(pData.error || 'Could not create payment');
        }
        window.location.href = pData.checkoutUrl;

    } catch(err) {
        showBookMsg('Booking failed: ' + err.message, 'error', suffix);
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-credit-card"></i> Confirm & Pay';
    }
}

function showBookMsg(text, type, suffix) {
    const id = suffix === 'Mob' ? 'bookingMsgMob' : 'bookingMsgDesk';
    const el = document.getElementById(id);
    if(!el) return;
    el.textContent = text;
    el.className = `inline-msg ${type}`;
    el.style.display = 'block';
}

/* ── Reviews ── */
async function loadReviews() {
    const res  = await fetch(`${API_URL}/reviews/property/${propertyId}`);
    const data = await res.json();
    document.getElementById('summaryStars').innerHTML = getStarHtml(property.AverageRating || 0);

    const list = document.getElementById('reviewsList');
    if(!data.reviews || !data.reviews.length) {
        list.innerHTML = `<p style="text-align:center;padding:24px;color:var(--muted);font-size:.9rem">📝 No reviews yet.</p>`;
        return;
    }
    list.innerHTML = data.reviews.map(r => `
        <div class="review-item">
            <div class="review-meta">
                <div class="reviewer-av">${r.ReviewerName.charAt(0)}</div>
                <div>
                    <div class="reviewer-name">${r.ReviewerName}</div>
                    <div class="stars">${getStarHtml(r.Rating)}</div>
                </div>
                <span class="review-date">${new Date(r.ReviewDate).toLocaleDateString()}</span>
            </div>
            <p class="review-text">${r.Comment || ''}</p>
        </div>`).join('');
}

async function checkReviewPermission() {
    const area = document.getElementById('reviewFormArea');
    if(!user) {
        area.innerHTML = `<p style="text-align:center;font-size:.85rem;color:var(--primary);padding-top:12px">🔒 Login to leave a review.</p>`;
        return;
    }
    try {
        const res      = await fetch(`${API_URL}/bookings/user/${user.UserId}`);
        const bookings = await res.json();
        const valid    = bookings.find(b =>
            b.PropertyId == propertyId &&
            (b.BookingStatus === 'Completed' || new Date(b.EndDate) < new Date())
        );
        if(!valid) {
            area.innerHTML = `<p style="text-align:center;font-size:.85rem;color:var(--muted);padding-top:12px">Complete a stay to leave a review.</p>`;
            return;
        }
        const checkRes = await fetch(`${API_URL}/bookings/${valid.BookingId}/can-review?userId=${user.UserId}`);
        const check    = await checkRes.json();
        if(check.canReviewProperty) renderReviewForm(valid.BookingId);
        else area.innerHTML = `<p style="text-align:center;color:#34C759;padding-top:12px;font-size:.9rem"><i class="fa-solid fa-circle-check"></i> Thank you for your review!</p>`;
    } catch(_) {}
}

function renderReviewForm(bookingId) {
    const area = document.getElementById('reviewFormArea');
    area.innerHTML = `
        <div class="write-review-area">
            <div class="section-title">✍️ Share your experience</div>
            <div class="star-input" id="starInput">
                ${[1,2,3,4,5].map(v=>`<i class="fa-regular fa-star" data-val="${v}"></i>`).join('')}
            </div>
            <textarea class="review-textarea" id="reviewComment" placeholder="Tell others about your stay..."></textarea>
            <button class="book-btn" onclick="submitReview(${bookingId})" style="max-width:200px;font-size:.9rem;padding:12px">📝 Submit</button>
        </div>`;

    area.querySelectorAll('.star-input i').forEach(star => {
        star.onclick = () => {
            selectedStars = parseInt(star.dataset.val);
            area.querySelectorAll('.star-input i').forEach(s => {
                const active = parseInt(s.dataset.val) <= selectedStars;
                s.className = active ? 'fa-solid fa-star active' : 'fa-regular fa-star';
            });
        };
    });
}

async function submitReview(bookingId) {
    const comment = document.getElementById('reviewComment').value.trim();
    if(!selectedStars || !comment) { alert('Please provide a rating and comment.'); return; }
    const res = await fetch(`${API_URL}/reviews`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            reviewerId:user.UserId, reviewedUserId:property.OwnerId,
            propertyId:property.PropertyId, bookingId,
            rating:selectedStars, comment,
            reviewerType:user.UserType, reviewedRole:'Property'
        })
    });
    if(res.ok) { alert('✅ Review saved!'); location.reload(); }
    else alert('Failed to save review.');
}

/* ── Chat ── */
function openChat(ownerId, ownerName, propId) {
    if(!user) { window.location.href='login.html'; return; }
    if(user.UserId === ownerId) { alert("You can't message yourself."); return; }
    sessionStorage.setItem('openChatIntent', JSON.stringify({ ownerId, ownerName, propId }));
    window.location.href = 'index.html';
}

/* ── Init ── */
async function init() {
    try {
        const res = await fetch(`${API_URL}/properties/${propertyId}`);
        if(!res.ok) throw new Error('Not found');
        property = await res.json();

        renderDetails();
        loadReviews();
        checkReviewPermission();

        document.getElementById('loading').style.display         = 'none';
        document.getElementById('propertyContent').style.display = 'block';

        // Show mobile book bar if renter or not logged in
        if(!user || user.UserType === 'Renter') {
            document.getElementById('mobileBookBar').style.display = 'flex';
        }
        // Hide book bar if owner of this property
        if(user && user.UserId === property.OwnerId) {
            document.getElementById('mobileBookBar').style.display = 'none';
        }

    } catch(err) {
        document.getElementById('loading').innerHTML =
            `<h2 style="color:red;">Property Not Found</h2><p>${err.message}</p><a href="index.html" style="color:var(--primary)">Back Home</a>`;
    }
}

init();
</script>
</body>
