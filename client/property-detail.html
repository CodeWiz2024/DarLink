<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Details - DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/i18n-dashboard.js"></script><script src="lang.js"></script>

    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        [data-theme="dark"] {
            --glass-bg: rgba(20, 20, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }
        
        *, *::before, *::after {
            box-sizing: border-box;
        }
        
        html, body {
            overflow-x: hidden;
            max-width: 100vw;
        }

        body {
            font-family: 'Inter', 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
            margin: 0;
            padding: 0;
        }

        .details-container {
            max-width: 1200px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--glass-shadow);
            padding: 30px;
            margin-bottom: 30px;
        }

        /* Property Gallery Carousel */
        .gallery-wrap {
            position: relative;
            margin-bottom: 30px;
            height: 500px;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--glass-bg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .gallery-grid {
            display: flex;
            height: 100%;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }
        .gallery-grid::-webkit-scrollbar { display: none; }
        
        .gallery-img-item {
            flex: 0 0 100%;
            height: 100%;
            scroll-snap-align: center;
            position: relative;
        }
        .gallery-img-item img {
            width: 100%; height: 100%; object-fit: cover; pointer-events: none;
        }
        
        .gallery-arrow {
            position: absolute; top: 50%; transform: translateY(-50%);
            background: rgba(255,255,255,0.85); color: #000;
            border: none; width: 44px; height: 44px; border-radius: 50%;
            font-size: 1.2rem; cursor: pointer; z-index: 10;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .gallery-arrow:hover { background: #fff; transform: translateY(-50%) scale(1.1); color: var(--primary); }
        .gallery-prev { left: 20px; }
        .gallery-next { right: 20px; }
        [dir="rtl"] .gallery-prev { left: auto; right: 20px; }
        [dir="rtl"] .gallery-next { right: auto; left: 20px; }
        
        .gallery-indicators {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; z-index: 10;
        }
        .gallery-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); cursor:pointer; transition:all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .gallery-dot.active { background: #fff; width: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

        /* Content Layout */
        .property-layout {
            display: grid;
            grid-template-columns: 1.8fr 1.2fr;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .property-layout { display: flex; flex-direction: column; }
            .gallery-wrap { height: 360px; border-radius: 20px; margin-left:-20px; margin-right:-20px; width:calc(100% + 40px); }
            .gallery-arrow { transform: scale(0.85); margin-top: -10px; } 
            
            .main-info, .sidebar { display: contents; }
            .info-card { order: 1; margin-bottom: 20px; }
            .booking-card { order: 2; margin-top: 0; margin-bottom: 20px; position: static; }
            .features-card { order: 3; margin-bottom: 20px; }
            .reviews-card { order: 4; }
            .gallery-grid { height: 100%; } 
        }

        .img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg) 0%, rgba(10, 132, 255, 0.1) 100%);
            color: var(--text-muted);
            font-size: 3rem;
            border-radius: var(--radius-lg);
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .property-badge {
            display: inline-block;
            padding: 6px 12px;
            background: var(--accent);
            color: white;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 10px;
        }

        .price-tag {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(10, 132, 255, 0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin-right: 12px;
        }
        [dir="rtl"] .feature-icon { margin-right: 0; margin-left: 12px; }

        /* Booking Card */
        .booking-card {
            position: sticky;
            top: 100px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
        }

        .book-btn {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .book-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(10, 132, 255, 0.4);
        }

        /* Review Section */
        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .review-card {
            padding: 24px;
            border-radius: 16px;
            background: var(--bg);
            border: 1px solid var(--glass-border);
            margin-bottom: 20px;
        }

        .review-meta {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .reviewer-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 15px;
        }
        [dir="rtl"] .reviewer-avatar { margin-right: 0; margin-left: 15px; }

        .stars { color: #FFCC00; }

        /* Review Form */
        .review-form-container {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid var(--glass-border);
        }

        .star-rating {
            display: flex;
            gap: 10px;
            margin: 15px 0;
        }

        .star-rating i {
            font-size: 2rem;
            cursor: pointer;
            color: #ddd;
            transition: color 0.2s;
        }

        .star-rating i.active, .star-rating i:hover {
            color: #FFCC00;
        }

        .review-textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            background: var(--bg);
            color: var(--text);
            min-height: 120px;
            margin-bottom: 20px;
            font-family: inherit;
        }

        /* Map Styles */
        #map {
            height: 350px;
            width: 100%;
            border-radius: 18px;
            z-index: 1;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }
        .map-section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
    </style>
</head>

    <main class="details-container">
        <div id="loading" style="text-align: center; padding: 50px;">
            <div class="spinner"></div>

            <div class="property-layout">

                        <div class="info-header">
                            <div>
                                <span class="property-badge" id="propTypeBadge">Apartment</span>
                                <h1 id="propTitle" style="margin: 0; font-size: 2.2rem;"></h1>
                                <p id="propLocation" style="color: #666; font-size: 1.1rem; margin: 10px 0;"></p>
                            </div>
                            <div class="price-tag">

                            </div>

                        <div style="display: flex; gap: 30px; margin: 20px 0; padding: 20px 0; border-top: 1px solid var(--glass-border); border-bottom: 1px solid var(--glass-border);">

    <script>
        window.I18N_MESSAGES = {
            nav_home: { en: "Home", ar: "الرئيسية" },
            loading: { en: "Loading details...", ar: "جاري تحميل التفاصيل..." },
            night: { en: "night", ar: "ليلة" },
            rooms: { en: "Rooms", ar: "الغرف" },
            nights: { en: "nights", ar: "ليالي" },
            description: { en: "📝 Description", ar: "📝 الوصف" },
            features: { en: "✨ Features", ar: "✨ المميزات" },
            sec_reviews: { en: "⭐ Guest Reviews", ar: "⭐ تقييمات الضيوف" },
            book_title: { en: "📅 Book This Stay", ar: "📅 احجز هذه الإقامة" },
            check_in: { en: "Check-in Date", ar: "تاريخ الوصول" },
            check_out: { en: "Check-out Date", ar: "تاريخ المغادرة" },
            phone: { en: "Phone Number", ar: "رقم الهاتف" },
            total: { en: "Estimated Total", ar: "الإجمالي المقدر" },
            confirm_btn: { en: "Request Booking", ar: "طلب حجز" },
            hosted_by: { en: "Hosted by", ar: "المضيف:" },
            chat_owner: { en: "Message Owner", ar: "مراسلة المالك" },
            no_reviews: { en: "No reviews yet.", ar: "لا توجد تقييمات بعد." },
            write_review: { en: "Share your experience", ar: "شارك تجربتك" },
            submit_review: { en: "Submit Review", ar: "إرسال التقييم" },
            review_placeholder: { en: "Tell others about your stay...", ar: "أخبر الآخرين عن إقامتك..." },
            must_book: { en: "Only verified guests who completed their stay can leave a review.", ar: "فقط الضيوف الذين أكملوا إقامتهم يمكنهم ترك تقييم." },
            login_to_review: { en: "Please login to leave a review.", ar: "يرجى تسجيل الدخول للتقييم." },
            location_map: { en: "📍 Location on Map", ar: "📍 موقع المنزل على الخريطة" }
        };

        const user = JSON.parse(localStorage.getItem('user') || 'null');
        const urlParams = new URLSearchParams(window.location.search);
        const propertyId = urlParams.get('id');
        const SERVER_URL = 'https://darlink-production.up.railway.app' ? 'https://darlink-production.up.railway.app' : `http://${window.location.hostname}:5000`;
        const API_URL = `${SERVER_URL}/api`;
        let property = null;
        let currentUser = null;
        let selectedStars = 0;

        function t(key) {
            const lang = window.I18N ? window.I18N.getCurrentLang() : (localStorage.getItem('site_lang') || 'ar');
            return window.I18N_MESSAGES[key] ? window.I18N_MESSAGES[key][lang] : key;
        }

        if (!propertyId) {
            window.location.href = 'index.html';
        }

        async function init() {
            try {
                const res = await fetch(`${API_URL}/properties/${propertyId}`);
                if (!res.ok) throw new Error('Not found');
                property = await res.json();
                
                renderDetails();
                loadReviews();
                checkReviewPermission();
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('propertyContent').style.display = 'block';
            } catch (err) {
                document.getElementById('loading').innerHTML = `<h2 style="color:red">Property Not Found</h2><a href="index.html">Back Home</a>`;
            }
        }

function renderDetails() {
    document.getElementById('propTitle').textContent = property.Title;
    document.getElementById('propLocation').textContent = `📍 ${property.Address}, ${property.City}, ${property.Wilaya}`;
    
    // ✅ FIX: Calculate promotional price correctly
    let displayPrice = parseFloat(property.PricePerNight);
    let hasPromotion = false;
    let promoLabel = '';
    
    // Check if property has active promotion
    if (property.HasPromotion && (parseFloat(property.DiscountPercentage) > 0 || parseFloat(property.DiscountAmount) > 0)) {
        hasPromotion = true;
        const priceInDB = parseFloat(property.PricePerNight); // Has 10% markup
        
        // Step 1: Remove 10% markup
        const ownerBasePrice = priceInDB / 1.1;
        
        // Step 2: Apply discount
        let ownerPriceAfterDiscount = ownerBasePrice;
        
        if (property.DiscountType === 'Percentage' && parseFloat(property.DiscountPercentage) > 0) {
            const discountPercent = parseFloat(property.DiscountPercentage);
            ownerPriceAfterDiscount = ownerBasePrice * (1 - discountPercent / 100);
            promoLabel = `🔥 ${discountPercent}% OFF`;
        } else if (property.DiscountType === 'FixedAmount' && parseFloat(property.DiscountAmount) > 0) {
            const discountAmount = parseFloat(property.DiscountAmount);
            ownerPriceAfterDiscount = ownerBasePrice - discountAmount;
            promoLabel = `🔥 ${discountAmount.toLocaleString()} DZD OFF`;
        }
        
        // Step 3: Add 10% markup back
        displayPrice = ownerPriceAfterDiscount * 1.1;
    }
    
    // Display price with promotion badge if applicable
    const priceHTML = hasPromotion ? `
        <div style="display: flex; flex-direction: column; align-items: flex-end;">
            <div style="background: #FF4757; color: white; padding: 4px 12px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 5px;">${promoLabel}</div>
            <div style="text-decoration: line-through; color: #999; font-size: 1.2rem;">${Math.round(parseFloat(property.PricePerNight)).toLocaleString()} DZD</div>
            <div style="color: #00C851; font-size: 1.8rem; font-weight: 700;">${Math.round(displayPrice).toLocaleString()} DZD</div>
        </div>
    ` : `${Math.round(displayPrice).toLocaleString()} DZD`;
    
    document.getElementById('propPrice').innerHTML = priceHTML;
    
    document.getElementById('propTypeBadge').textContent = property.PropertyType;
    document.getElementById('propRooms').textContent = property.NumofRooms;
    document.getElementById('propRating').textContent = property.AverageRating ? Number(property.AverageRating).toFixed(1) : 'New';
    document.getElementById('propReviewsCount').textContent = `(${property.TotalReviews || 0} reviews)`;
    document.getElementById('propDescription').textContent = property.Description;
    document.getElementById('ownerName').textContent = property.OwnerName;
 
    const avatar = document.getElementById('ownerAvatar');
    avatar.textContent = property.OwnerName.charAt(0);
    if (property.OwnerAvatar) {
        avatar.innerHTML = `<img src="${property.OwnerAvatar}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
    }
 
    // Gallery Carousel
    const gallery = document.getElementById('gallery');
    if (property.Images && property.Images.length > 0) {
        const getFullImg = (url) => url.startsWith('http') ? url : `${SERVER_URL}${url}`;
        
        let sliderHtml = `<div class="gallery-wrap" id="gallery">`;
        if(property.Images.length > 1) {
            const leftIcon = window.I18N && window.I18N.getCurrentLang() === 'ar' ? 'right' : 'left';
            const rightIcon = window.I18N && window.I18N.getCurrentLang() === 'ar' ? 'left' : 'right';
            sliderHtml += `
            <button class="gallery-arrow gallery-prev" onclick="scrollGallery(-1)"><i class="fa-solid fa-chevron-${leftIcon}"></i></button>
            <button class="gallery-arrow gallery-next" onclick="scrollGallery(1)"><i class="fa-solid fa-chevron-${rightIcon}"></i></button>
            <div class="gallery-indicators">`;
            property.Images.forEach((_, i) => {
                sliderHtml += `<div class="gallery-dot ${i===0 ? 'active':''}" onclick="scrollToGallery(${i})"></div>`;
            });
            sliderHtml += `</div>`;
        }
        
        sliderHtml += `<div class="gallery-grid" id="galleryScroll">`;
        property.Images.forEach(img => {
            sliderHtml += `<div class="gallery-img-item"><img src="${getFullImg(img.ImageURL)}"></div>`;
        });
        sliderHtml += `</div></div>`;
        
        // Setup scroll logic safely attached to window
        window.scrollGallery = function(dir) {
            const scroller = document.getElementById('galleryScroll');
            if(!scroller) return;
            const cw = scroller.clientWidth;
            let current = Math.floor((scroller.scrollLeft + (cw/2) * (document.dir==='rtl'?-1:1)) / cw);
            current = Math.abs(current);
            let nextIndex = current + dir;
            if(nextIndex < 0) nextIndex = property.Images.length - 1;
            if(nextIndex >= property.Images.length) nextIndex = 0;
            scrollToGallery(nextIndex);
        };
        
        window.scrollToGallery = function(idx) {
            const scroller = document.getElementById('galleryScroll');
            if(!scroller || !scroller.children[idx]) return;
            scroller.children[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            
            document.querySelectorAll('.gallery-dot').forEach((dot, i) => {
                dot.className = i === idx ? 'gallery-dot active' : 'gallery-dot';
            });
        };
        
        gallery.outerHTML = sliderHtml;
        
        // Update dots on manual native swipe scroll
        setTimeout(() => {
            const scroller = document.getElementById('galleryScroll');
            if(scroller) {
                scroller.addEventListener('scroll', () => {
                    const cw = scroller.clientWidth;
                    let current = Math.abs(Math.round(scroller.scrollLeft / cw));
                    document.querySelectorAll('.gallery-dot').forEach((dot, i) => {
                        dot.className = i === current ? 'gallery-dot active' : 'gallery-dot';
                    });
                });
            }
        }, 300);

    } else {
        gallery.outerHTML = `<div class="img-placeholder" id="gallery" style="height:350px; margin-bottom:30px; border-radius:20px;"><i class="fa-solid fa-house"></i></div>`;
    }
 
    // Features
    document.getElementById('propFeatures').innerHTML = (property.Features || []).map(f => `
        <div style="background:rgba(128,128,128,0.1); padding:8px 15px; border-radius:10px; font-size:0.9rem;">
            <i class="fa-solid fa-check" style="color:var(--primary); margin-right:8px;"></i> ${f.FeatureName}
        </div>
    `).join('');
    
    // Set date constraints
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('startDate').min = today;
    document.getElementById('endDate').min = today;
    
    // ✅ IMPORTANT: Store the actual display price for booking calculation
    property.ActualDisplayPrice = displayPrice;

    // ✅ NEW: Initialize Location Map
    if (property.Latitude && property.Longitude) {
        document.getElementById('mapSection').style.display = 'block';
        const lat = parseFloat(property.Latitude);
        const lng = parseFloat(property.Longitude);
        
        // Use a small delay to ensure the container is visible before initializing Leaflet
        setTimeout(() => {
            const map = L.map('map').setView([lat, lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);
            
            L.marker([lat, lng]).addTo(map)
                .bindPopup(property.Title)
                .openPopup();
                
            // Force redraw to fix container size issues
            map.invalidateSize();
        }, 100);
    }
}
 
// ✅ FIX: Update booking form calculation to use promotional price
['startDate', 'endDate'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => {
        const s = new Date(document.getElementById('startDate').value);
        const e = new Date(document.getElementById('endDate').value);
        if (s && e && e > s) {
            const nights = Math.ceil((e - s) / (86400000));
            // Use the display price (with promotion applied)
            const pricePerNight = property.ActualDisplayPrice || property.PricePerNight;
            const total = nights * pricePerNight;
            document.getElementById('pricePriceCalculation').style.display = 'block';
            document.getElementById('calcTotal').textContent = `${Math.round(total).toLocaleString()} DZD`;
            document.getElementById('calcNights').textContent = nights;
        }
    });
});
 
// ✅ FIX: Update booking submission to use promotional price
document.getElementById('bookingForm').onsubmit = async (e) => {
    e.preventDefault();
    if (!user) { window.location.href = 'login.html'; return; }
    
    const btn = document.getElementById('bookBtn');
    btn.disabled = true;
    btn.textContent = t('loading') || 'Processing...';
 
    try {
        const sDate = document.getElementById('startDate').value;
        const eDate = document.getElementById('endDate').value;
        const nights = Math.ceil((new Date(eDate) - new Date(sDate)) / 86400000);
        
        // Use promotional price if available
        const pricePerNight = property.ActualDisplayPrice || property.PricePerNight;
        const totalPrice = nights * pricePerNight;
        
        const bookingRes = await fetch(`${API_URL}/bookings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                UserId: user.UserId,
                PropertyId: property.PropertyId,
                StartDate: sDate,
                EndDate: eDate,
                LengthOfStay: nights,
                TotalPrice: totalPrice,
                BasePrice: totalPrice,
                PhoneNumber: document.getElementById('phoneNumber').value,
                BookingStatus: 'Pending'
            })
        });
 
        const bookingData = await bookingRes.json();
        if (!bookingRes.ok) throw new Error(bookingData.error);
 
        // Notify user about host approval required
        const msg = window.I18N && window.I18N.getCurrentLang() === 'ar' 
            ? 'تم إرسال طلب الحجز بنجاح! يجب على صاحب المنزل الموافقة عليه قبل إتمام عملية الدفع.' 
            : 'Booking Requested successfully! The host must approve this request before you can proceed to payment.';
        alert(msg);
        window.location.href = 'my-bookings.html';
 
    } catch (err) {
        alert(err.message);
        btn.disabled = false;
        btn.textContent = t('confirm_btn');
    }
};
 

        async function loadReviews() {
            const res = await fetch(`${API_URL}/reviews/property/${propertyId}`);
            const data = await res.json();
            const list = document.getElementById('reviewsList');
            
            if (!data.reviews || data.reviews.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding:30px; color:#999;" data-i18n="no_reviews">📝 No reviews yet.</div>`;
                if (window.I18N) window.I18N.applyTranslations(window.I18N.getCurrentLang());
                return;
            }

            list.innerHTML = data.reviews.map(r => `
                <div class="review-card">
                    <div class="review-meta">
                        <div class="reviewer-avatar">${r.ReviewerName.charAt(0)}</div>
                        <div>
                            <div style="font-weight:600">${r.ReviewerName}</div>
                            <div class="stars">${getStarHtml(r.Rating)}</div>
                        </div>
                        <div style="margin-left:auto; font-size:0.85rem; color:#888;">📅 ${new Date(r.ReviewDate).toLocaleDateString()}</div>
                    </div>
                    <p style="margin:0; opacity:0.8;">💬 ${r.Comment}</p>
                </div>
            `).join('');
            
            document.getElementById('summaryStars').innerHTML = getStarHtml(property.AverageRating || 0);
        }

        function getStarHtml(rating) {
            let html = '';
            for(let i=1; i<=5; i++) {
                if(i <= Math.floor(rating)) html += '<i class="fa-solid fa-star"></i>';
                else if(i === Math.ceil(rating) && rating % 1 !== 0) html += '<i class="fa-solid fa-star-half-stroke"></i>';
                else html += '<i class="fa-regular fa-star"></i>';
            }
            return html;
        }

        async function checkReviewPermission() {
            const area = document.getElementById('reviewFormArea');
            if (!user) {
                area.innerHTML = `<p style="text-align:center; color:var(--primary);" data-i18n="login_to_review">🔒 Login to review</p>`;
                if (window.I18N) window.I18N.applyTranslations(window.I18N.getCurrentLang());
                return;
            }

            try {
                // Check all user bookings to see if any completed for THIS property
                const res = await fetch(`${API_URL}/bookings/user/${user.UserId}`);
                const bookings = await res.json();
                
                const validBooking = bookings.find(b => 
                    b.PropertyId == propertyId && 
                    (b.BookingStatus === 'Completed' || new Date(b.EndDate) < new Date())
                );

                if (validBooking) {
                    // Check if already reviewed
                    const checkRes = await fetch(`${API_URL}/bookings/${validBooking.BookingId}/can-review?userId=${user.UserId}`);
                    const check = await checkRes.json();
                    
                    if (check.canReviewProperty) {
                        renderReviewForm(validBooking.BookingId);
                    } else {
                        area.innerHTML = `<p style="text-align:center; color:#28a745;"><i class="fa-solid fa-circle-check"></i> ✅ Thank you for your review!</p>`;
                    }
                } else {
                    area.innerHTML = `<p style="text-align:center; color:#888; font-size:0.9rem;" data-i18n="must_book">📋 Must complete a booking to review</p>`;
                }
            } catch (e) {
                console.error(e);
            }
            if (window.I18N) window.I18N.applyTranslations(window.I18N.getCurrentLang());
        }

        function renderReviewForm(bookingId) {
            const area = document.getElementById('reviewFormArea');
            area.innerHTML = `
                <h3 data-i18n="write_review">✍️ Share your experience</h3>
                <div class="star-rating" id="starInput">
                    <i class="fa-regular fa-star" data-val="1"></i>
                    <i class="fa-regular fa-star" data-val="2"></i>
                    <i class="fa-regular fa-star" data-val="3"></i>
                    <i class="fa-regular fa-star" data-val="4"></i>
                    <i class="fa-regular fa-star" data-val="5"></i>
                </div>
                <textarea class="review-textarea" id="reviewComment" data-i18n-placeholder="review_placeholder" placeholder="Tell others..."></textarea>
                <button class="book-btn" onclick="submitReview(${bookingId})" data-i18n="submit_review">📝 Submit Review</button>
            `;

            const stars = area.querySelectorAll('.star-rating i');
            stars.forEach(s => {
                s.onclick = () => {
                    selectedStars = parseInt(s.dataset.val);
                    stars.forEach(st => {
                        st.classList.remove('fa-solid', 'active');
                        st.classList.add('fa-regular');
                        if(parseInt(st.dataset.val) <= selectedStars) {
                            st.classList.add('fa-solid', 'active');
                            st.classList.remove('fa-regular');
                        }
                    });
                };
            });
            if (window.I18N) window.I18N.applyTranslations(window.I18N.getCurrentLang());
        }

        async function submitReview(bookingId) {
            const comment = document.getElementById('reviewComment').value;
            if (!selectedStars || !comment) return alert('Please provide rating and comment');

            const res = await fetch(`${API_URL}/reviews`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    reviewerId: user.UserId,
                    reviewedUserId: property.OwnerId,
                    propertyId: property.PropertyId,
                    bookingId: bookingId,
                    rating: selectedStars,
                    comment: comment,
                    reviewerType: user.UserType,
                    reviewedRole: 'Property'
                })
            });

            if (res.ok) {
                alert('✅ Review saved!');
                location.reload();
            } else {
                alert('Failed to save review');
            }
        }

        function openChat(ownerId, ownerName, propId) {
            if (!user) { window.location.href = 'login.html'; return; }
            if (user.UserId === ownerId) { alert("You can't message yourself."); return; }
            
            // This assumes unified sidebar on index.html. For standalone, we trigger a redirect or similar.
            // Since we unified it on index.html, we'll store the intent in session and go back to index
            sessionStorage.setItem('openChatIntent', JSON.stringify({ ownerId, ownerName, propId }));
            window.location.href = 'index.html';
        }

        init();
    </script>
