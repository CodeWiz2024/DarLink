<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings – DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/i18n-dashboard.js"></script>
    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; background: var(--bg-gradient); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        .dash-layout { display: flex; min-height: 100vh; }

        /* ===== SIDEBAR ===== */
        .side-nav {
            width: 270px; flex-shrink: 0;
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: 4px 0 24px rgba(0,0,0,0.06);
        }
        .side-nav-logo { padding: 24px 22px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); }
        .side-nav-logo img { height: 42px; border-radius: 10px; }
        .side-nav-logo span { font-size: 1.2rem; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }
        .side-nav-user { padding: 18px 22px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); background: rgba(10,132,255,0.04); }
        .side-user-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; overflow: hidden; }
        .side-user-info .name { font-weight: 700; font-size: 0.95rem; color: var(--text-main); }
        .side-user-info .role { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
        .side-nav-links { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .side-link { display: flex; align-items: center; gap: 13px; padding: 13px 16px; border-radius: 14px; text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 0.95rem; transition: all 0.2s ease; }
        .side-link i { width: 22px; text-align: center; font-size: 1rem; }
        .side-link:hover { background: rgba(10,132,255,0.07); color: var(--primary); text-decoration: none; transform: translateX(3px); }
        .side-link.active { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(10,132,255,0.35); }
        .side-link.active i { color: white; }
        .side-nav-section-label { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 12px 16px 4px; }
        .side-nav-footer { padding: 16px 12px; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 8px; }
        .side-footer-actions { display: flex; gap: 8px; align-items: center; }
        .theme-toggle-side { flex: 1; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-muted); font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .theme-toggle-side:hover { background: rgba(0,0,0,0.05); color: var(--text-main); }
        .lang-side { display: flex; gap: 4px; }
        .lang-side button { padding: 8px 12px; border: 1px solid var(--glass-border); border-radius: 10px; background: transparent; color: var(--text-muted); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .lang-side button:hover, .lang-side button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-logout-side { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; background: rgba(255,59,48,0.08); color: #ff3b30; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
        .btn-logout-side:hover { background: #ff3b30; color: white; }

        .sidebar-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 200; width: 44px; height: 44px; border-radius: 12px; background: var(--primary); color: white; border: none; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 14px rgba(10,132,255,0.4); align-items: center; justify-content: center; }
        .side-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 99; }

        /* MAIN CONTENT */
        .dash-main { margin-left: 270px; flex: 1; padding: 32px 36px; min-height: 100vh; }
        .dash-topbar { margin-bottom: 32px; }
        .dash-page-title h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 0 0 6px; }
        .dash-page-title p { color: var(--text-muted); font-size: 1rem; margin: 0; }

        /* FILTER TABS */
        .filter-tabs { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        .filter-tab { padding: 10px 20px; border-radius: 12px; border: 1px solid var(--glass-border); background: var(--glass-bg); color: var(--text-muted); font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .filter-tab:hover { background: rgba(10,132,255,0.08); color: var(--primary); }
        .filter-tab.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* BOOKINGS LIST */
        .bookings-grid { display: grid; gap: 20px; }
        .booking-card {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--glass-border);
            transition: all 0.2s;
        }
        .booking-card:hover { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.12); }
        
        .booking-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
        .booking-property { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .booking-status { padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; white-space: nowrap; }
        .status-pending { background: rgba(255,149,0,0.12); color: #FF9500; }
        .status-confirmed { background: rgba(52,199,89,0.12); color: #34C759; }
        .status-cancelled { background: rgba(255,59,48,0.12); color: #FF3B30; }
        .status-completed { background: rgba(10,132,255,0.12); color: var(--primary); }
        
        .booking-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .detail-item { display: flex; align-items: center; gap: 8px; color: var(--text-muted); font-size: 0.95rem; }
        .detail-item i { color: var(--primary); width: 20px; }
        .detail-value { font-weight: 600; color: var(--text-main); }
        
        .booking-actions { display: flex; gap: 12px; flex-wrap: wrap; }
        .btn { padding: 12px 24px; border-radius: 12px; border: none; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #0056CC; transform: translateY(-2px); }
        .btn-warning { background: #FFD700; color: #000; }
        .btn-warning:hover { background: #FFC700; transform: translateY(-2px); }
        .btn-danger { background: rgba(255,59,48,0.12); color: #FF3B30; }
        .btn-danger:hover { background: #FF3B30; color: white; transform: translateY(-2px); }

        /* EMPTY STATE */
        .empty-state { text-align: center; padding: 80px 20px; }
        .empty-state i { font-size: 5rem; color: var(--text-muted); opacity: 0.3; margin-bottom: 20px; }
        .empty-state h3 { font-size: 1.5rem; color: var(--text-main); margin-bottom: 10px; }
        .empty-state p { color: var(--text-muted); margin-bottom: 24px; }

        /* LOADING STATE */
        .loading-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .loading-state i { font-size: 3rem; animation: spin 1s linear infinite; margin-bottom: 16px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width: 900px) {
            .side-nav { transform: translateX(-100%); }
            .side-nav.open { transform: translateX(0); }
            .side-overlay.show { display: block; }
            .dash-main { margin-left: 0; padding: 80px 20px 30px; }
            .sidebar-toggle { display: flex; }
            .booking-header { flex-direction: column; align-items: flex-start; }
        }

        [data-theme="dark"] .side-nav { background: rgba(28,28,30,0.92); border-right-color: rgba(255,255,255,0.08); }
        [data-theme="dark"] .side-link { color: rgba(255,255,255,0.6); }
        [data-theme="dark"] .side-link:hover { background: rgba(255,255,255,0.07); color: white; }
        [data-theme="dark"] .theme-toggle-side { color: rgba(255,255,255,0.6); }
        [data-theme="dark"] .theme-toggle-side:hover { color: white; background: rgba(255,255,255,0.07); }
    </style>
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
<div class="side-overlay" id="sideOverlay" onclick="closeSidebar()"></div>

<aside class="side-nav" id="sideNav">
    <div class="side-nav-logo">
        <a class="darlink-logo blue small" href="index.html" style="display:flex; flex-direction:row; align-items:center; gap:8px; text-decoration:none;">
  <svg width="36" height="32" viewBox="0 0 110 100" fill="none">
    <path d="M55 8 L98 42 L98 92 L12 92 L12 42 Z" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linejoin="round"/>
    <rect x="72" y="10" width="10" height="18" fill="none" stroke="#00d4ff" stroke-width="5.5"/>
    <path d="M55 22 L88 50 L88 88 L22 88 L22 50 Z" fill="none" stroke="#5aa8c0" stroke-width="5" stroke-linejoin="round"/>
    <path d="M32 88 L32 52 Q32 30 52 30 Q72 30 72 52 Q72 68 58 72 Q44 76 32 72" fill="none" stroke="#5aa8c0" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="32" y1="88" x2="75" y2="88" stroke="#5aa8c0" stroke-width="5.5" stroke-linecap="round"/>
  </svg>
  <span style="color:#00d4ff; font-size:22px; font-weight:700;">DarLink</span>
</a>
    </div>
    <div class="side-nav-user">
        <div class="side-user-avatar" id="userAvatarSide">R</div>
        <div class="side-user-info">
            <div class="name" id="userNameSide">Loading...</div>
            <div class="role">Renter</div>
        </div>
    </div>
    <div class="side-nav-links">
        <div class="side-nav-section-label">Dashboard</div>
        <a href="Rent.html" class="side-link"><i class="fa-solid fa-gauge"></i> Dashboard</a>
        <a href="index.html" class="side-link"><i class="fa-solid fa-magnifying-glass"></i> Explore Houses</a>
        <a href="my-bookings.html" class="side-link active"><i class="fa-solid fa-suitcase-rolling"></i> My Bookings</a>
        <div class="side-nav-section-label" style="margin-top: 8px;">Account</div>
        <a href="profile.html" class="side-link"><i class="fa-solid fa-user"></i> Profile Settings</a>
    </div>
    <div class="side-nav-footer">
        <div class="side-footer-actions">
            <button class="theme-toggle-side" onclick="toggleTheme()">
                <i class="fa-regular fa-moon" id="themeIcon"></i>
                <span id="themeLabel">Dark Mode</span>
            </button>
            <div class="lang-side">
                <button class="lang-btn active" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ar">ع</button>
            </div>
        </div>
        <button class="btn-logout-side" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> Log Out</button>
    </div>
</aside>

<main class="dash-main">
    <div class="dash-topbar">
        <div class="dash-page-title">
            <h1><i class="fa-solid fa-calendar-check" style="color: var(--primary);"></i> <span id="pageTitle">My Bookings</span></h1>
            <p id="pageSubtitle">View and manage your property bookings</p>
        </div>
    </div>

    <!-- Filter Tabs -->
    <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterBookings('all')" id="tabAll">All</button>
        <button class="filter-tab" onclick="filterBookings('Pending')" id="tabPending">Pending</button>
        <button class="filter-tab" onclick="filterBookings('Confirmed')" id="tabConfirmed">Confirmed</button>
        <button class="filter-tab" onclick="filterBookings('Cancelled')" id="tabCancelled">Cancelled</button>
        <button class="filter-tab" onclick="filterBookings('Completed')" id="tabCompleted">Completed</button>
    </div>

    <!-- Loading State -->
    <div id="loading" class="loading-state">
        <i class="fa-solid fa-spinner"></i>
        <p id="loadingText">Loading your bookings...</p>
    </div>

    <!-- Bookings List -->
    <div id="bookingsList" class="bookings-grid" style="display: none;"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state" style="display: none;">
        <i class="fa-solid fa-calendar-xmark"></i>
        <h3 id="emptyTitle">No Bookings Yet</h3>
        <p id="emptyText">You haven't made any bookings yet.</p>
        <a href="index.html" class="btn btn-primary" id="emptyBtn">Explore Houses</a>
    </div>
</main>

<script>
    // ===== TRANSLATIONS =====
    window.I18N_MESSAGES = {
        // Sidebar
        dashboard: { en: "Dashboard", ar: "لوحة التحكم" },
        explore_houses: { en: "Explore Houses", ar: "استكشف العقارات" },
        my_bookings: { en: "My Bookings", ar: "حجوزاتي" },
        account: { en: "Account", ar: "الحساب" },
        profile_settings: { en: "Profile Settings", ar: "إعدادات الملف الشخصي" },
        dark_mode: { en: "Dark Mode", ar: "الوضع الداكن" },
        light_mode: { en: "Light Mode", ar: "الوضع الفاتح" },
        log_out: { en: "Log Out", ar: "تسجيل الخروج" },
        renter: { en: "Renter", ar: "مستأجر" },
        
        // Page Header
        page_title: { en: "My Bookings", ar: "حجوزاتي" },
        page_subtitle: { en: "View and manage your property bookings", ar: "عرض وإدارة حجوزات العقارات الخاصة بك" },
        
        // Filter Tabs
        all: { en: "All", ar: "الكل" },
        pending: { en: "Pending", ar: "قيد الانتظار" },
        confirmed: { en: "Confirmed", ar: "مؤكدة" },
        cancelled: { en: "Cancelled", ar: "ملغاة" },
        completed: { en: "Completed", ar: "مكتملة" },
        
        // Booking Details
        check_in: { en: "Check-in", ar: "تسجيل الوصول" },
        check_out: { en: "Check-out", ar: "تسجيل المغادرة" },
        nights: { en: "night(s)", ar: "ليلة" },
        total: { en: "Total", ar: "الإجمالي" },
        
        // Booking Status
        awaiting_approval: { en: "Awaiting Owner Approval", ar: "في انتظار موافقة المالك" },
        owner_approved: { en: "Owner Approved", ar: "موافق من المالك" },
        payment_pending: { en: "Payment Pending", ar: "في انتظار الدفع" },
        paid_confirmed: { en: "Paid & Confirmed", ar: "مدفوع ومؤكد" },
        status_pending: { en: "Pending", ar: "قيد الانتظار" },
        status_confirmed: { en: "Confirmed", ar: "مؤكد" },
        status_cancelled: { en: "Cancelled", ar: "ملغى" },
        status_completed: { en: "Completed", ar: "مكتمل" },
        
        // Buttons
        retry_payment: { en: "Retry Payment", ar: "إعادة الدفع" },
        pay_now: { en: "Pay Now", ar: "ادفع الآن" },
        cancel_booking: { en: "Cancel Booking", ar: "إلغاء الحجز" },
        write_review: { en: "Write Review", ar: "كتابة تقييم" },
        
        // Empty State
        no_bookings_yet: { en: "No Bookings Yet", ar: "لا توجد حجوزات بعد" },
        no_bookings_text: { en: "You haven't made any bookings yet.", ar: "لم تقم بأي حجز بعد." },
        explore_houses_btn: { en: "Explore Houses", ar: "استكشف العقارات" },
        
        // Loading
        loading_text: { en: "Loading your bookings...", ar: "جاري تحميل الحجوزات..." },
        
        // Alerts
        login_required: { en: "Please log in as a renter", ar: "يرجى تسجيل الدخول كمستأجر" },
        cancel_confirm: { en: "Are you sure you want to cancel this booking?", ar: "هل أنت متأكد أنك تريد إلغاء هذا الحجز؟" },
        logout_confirm: { en: "Are you sure you want to logout?", ar: "هل أنت متأكد أنك تريد تسجيل الخروج؟" },
        cancel_failed: { en: "Failed to cancel booking", ar: "فشل إلغاء الحجز" },
        payment_failed: { en: "Failed to create payment", ar: "فشل إنشاء الدفع" },
        load_failed: { en: "Failed to load bookings", ar: "فشل تحميل الحجوزات" },
        network_error: { en: "Network error", ar: "خطأ في الشبكة" }
    };

    // ===== LANGUAGE FUNCTIONS =====
    function getCurrentLang() {
        return localStorage.getItem('site_lang') || 'en';
    }

    function setLanguage(lang) {
        localStorage.setItem('site_lang', lang);
        document.documentElement.setAttribute('dir', 'rtl');
        document.documentElement.setAttribute('lang', lang);
        updatePageText();
        loadBookings(); // Reload bookings to translate content
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });
    }

    function t(key) {
        const lang = getCurrentLang();
        return window.I18N_MESSAGES[key] ? window.I18N_MESSAGES[key][lang] : key;
    }

    function updatePageText() {
        // Sidebar
        document.querySelector('.side-nav-section-label:first-of-type').textContent = t('dashboard').toUpperCase();
        document.querySelector('.side-link[href="Rent.html"]').innerHTML = `<i class="fa-solid fa-gauge"></i> ${t('dashboard')}`;
        document.querySelector('.side-link[href="index.html"]').innerHTML = `<i class="fa-solid fa-magnifying-glass"></i> ${t('explore_houses')}`;
        document.querySelector('.side-link[href="my-bookings.html"]').innerHTML = `<i class="fa-solid fa-suitcase-rolling"></i> ${t('my_bookings')}`;
        document.querySelector('.side-nav-section-label:last-of-type').textContent = t('account').toUpperCase();
        document.querySelector('.side-link[href="profile.html"]').innerHTML = `<i class="fa-solid fa-user"></i> ${t('profile_settings')}`;
        document.querySelector('.btn-logout-side').innerHTML = `<i class="fa-solid fa-right-from-bracket"></i> ${t('log_out')}`;
        document.querySelector('.side-user-info .role').textContent = t('renter');
        
        // Page Header
        document.getElementById('pageTitle').textContent = t('page_title');
        document.getElementById('pageSubtitle').textContent = t('page_subtitle');
        
        // Filter Tabs
        document.getElementById('tabAll').textContent = t('all');
        document.getElementById('tabPending').textContent = t('pending');
        document.getElementById('tabConfirmed').textContent = t('confirmed');
        document.getElementById('tabCancelled').textContent = t('cancelled');
        document.getElementById('tabCompleted').textContent = t('completed');
        
        // Empty State
        document.getElementById('emptyTitle').textContent = t('no_bookings_yet');
        document.getElementById('emptyText').textContent = t('no_bookings_text');
        document.getElementById('emptyBtn').textContent = t('explore_houses_btn');
        
        // Loading
        document.getElementById('loadingText').textContent = t('loading_text');
        
        // Theme Label
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        document.getElementById('themeLabel').textContent = currentTheme === 'dark' ? t('light_mode') : t('dark_mode');
    }

    // ===== INITIALIZATION =====
    const API_URL = 'https://darlink-production.up.railway.app/api';
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (!user || user.UserType !== 'Renter') {
        alert(t('login_required'));
        window.location.href = 'login.html';
    }

    // Setup UI
    const fullName = `${user.FirstName || ''} ${user.LastName || ''}`.trim() || 'Renter';
    document.getElementById('userNameSide').textContent = fullName;
    const initials = (user.FirstName?.[0] || 'R') + (user.LastName?.[0] || '');
    document.getElementById('userAvatarSide').textContent = initials.toUpperCase();

    // Initialize language
    const savedLang = getCurrentLang();
    document.documentElement.setAttribute('dir', 'rtl');
    document.documentElement.setAttribute('lang', savedLang);
    updatePageText();
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === savedLang);
        btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
    });

    // Theme functions
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('site_theme', newTheme);
        document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
        document.getElementById('themeLabel').textContent = newTheme === 'dark' ? t('light_mode') : t('dark_mode');
    }

    const savedTheme = localStorage.getItem('site_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    if (savedTheme === 'dark') {
        document.getElementById('themeIcon').className = 'fa-solid fa-sun';
        document.getElementById('themeLabel').textContent = t('light_mode');
    }

    function toggleSidebar() {
        document.getElementById('sideNav').classList.toggle('open');
        document.getElementById('sideOverlay').classList.toggle('show');
    }

    function closeSidebar() {
        document.getElementById('sideNav').classList.remove('open');
        document.getElementById('sideOverlay').classList.remove('show');
    }

    function logout() {
        if (confirm(t('logout_confirm'))) {
            localStorage.removeItem('user');
            window.location.href = 'index.html';
        }
    }

    // ===== BOOKINGS LOGIC =====
    let allBookings = [];
    let currentFilter = 'all';

    async function loadBookings() {
        try {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('bookingsList').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';

            const response = await fetch(`${API_URL}/bookings/user/${user.UserId}`);
            allBookings = await response.json();

            document.getElementById('loading').style.display = 'none';

            if (!allBookings || allBookings.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                return;
            }

            displayBookings(allBookings);
        } catch (error) {
            document.getElementById('loading').style.display = 'none';
            console.error('Error:', error);
            alert(t('load_failed'));
        }
    }

    function filterBookings(status) {
        currentFilter = status;
        document.querySelectorAll('.filter-tab').forEach(tab => tab.classList.remove('active'));
        document.getElementById('tab' + status.charAt(0).toUpperCase() + status.slice(1)).classList.add('active');

        let filtered = allBookings;
        if (status !== 'all') {
            filtered = allBookings.filter(b => {
                if (status === 'Completed') {
                    return b.BookingStatus === 'Completed' || (b.BookingStatus === 'Confirmed' && new Date(b.EndDate) < new Date());
                }
                if (status === 'Pending') {
                    return b.BookingStatus === 'Pending';
                }
                return b.BookingStatus === status;
            });
        }

        displayBookings(filtered);
    }

    function displayBookings(bookings) {
        if (bookings.length === 0) {
            document.getElementById('bookingsList').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
            return;
        }

        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('bookingsList').style.display = 'grid';

        const list = document.getElementById('bookingsList');
        list.innerHTML = bookings.map(b => {
            const isCompleted = b.BookingStatus === 'Completed' || (b.BookingStatus === 'Confirmed' && new Date(b.EndDate) < new Date());
            
            let statusClass, statusText;
            if (b.BookingStatus === 'Pending') {
                statusClass = 'status-pending';
                statusText = t('awaiting_approval');
            } else if (b.BookingStatus === 'Confirmed') {
                statusClass = isCompleted ? 'status-completed' : 'status-confirmed';
                statusText = isCompleted ? t('status_completed') : t('paid_confirmed');
            } else if (b.BookingStatus === 'Cancelled') {
                statusClass = 'status-cancelled';
                statusText = t('status_cancelled');
            } else {
                statusClass = 'status-pending';
                statusText = b.BookingStatus;
            }

            return `
                <div class="booking-card">
                    <div class="booking-header">
                        <div class="booking-property">${b.PropertyTitle || 'Property #' + b.PropertyId}</div>
                        <div class="booking-status ${statusClass}">${statusText}</div>
                    </div>
                    <div class="booking-details">
                        <div class="detail-item">
                            <i class="fa-solid fa-location-dot"></i>
                            <span class="detail-value">${b.City || ''}, ${b.Wilaya || ''}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fa-solid fa-calendar-check"></i>
                            <span>${t('check_in')}: <span class="detail-value">${new Date(b.StartDate).toLocaleDateString()}</span></span>
                        </div>
                        <div class="detail-item">
                            <i class="fa-solid fa-calendar-xmark"></i>
                            <span>${t('check_out')}: <span class="detail-value">${new Date(b.EndDate).toLocaleDateString()}</span></span>
                        </div>
                        <div class="detail-item">
                            <i class="fa-solid fa-moon"></i>
                            <span class="detail-value">${b.LengthOfStay} ${t('nights')}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fa-solid fa-coins"></i>
                            <span>${t('total')}: <span class="detail-value">${Number(b.TotalPrice).toLocaleString()} DZD</span></span>
                        </div>
                    </div>
                    <div class="booking-actions">
                        ${(b.BookingStatus === 'Confirmed') && !isCompleted ? `<button class="btn btn-danger" onclick="cancelBooking(${b.BookingId})"><i class="fa-solid fa-xmark"></i> ${t('cancel_booking')}</button>` : ''}
                        ${isCompleted ? `<button class="btn btn-warning" onclick="window.location.href='property-review.html?propertyId=${b.PropertyId}'"><i class="fa-solid fa-star"></i> ${t('write_review')}</button>` : ''}
                    </div>
                </div>
            `;
        }).join('');
    }

    async function cancelBooking(bookingId) {
        if (!confirm(t('cancel_confirm'))) return;

        try {
            const response = await fetch(`${API_URL}/bookings/${bookingId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    BookingStatus: 'Cancelled',
                    UserId: user.UserId
                })
            });

            if (response.ok) {
                loadBookings();
            } else {
                alert(t('cancel_failed'));
            }
        } catch (error) {
            alert(t('network_error'));
        }
    }

    async function retryPayment(bookingId) {
        try {
            const response = await fetch(`${API_URL}/payment/create-booking-payment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    bookingId: bookingId,
                    userId: user.UserId
                })
            });

            const data = await response.json();

            if (response.ok) {
                // Redirect to Chargily checkout
                window.location.href = data.checkoutUrl;
            } else {
                alert(t('payment_failed') + ': ' + (data.error || 'Unknown error'));
            }
        } catch (error) {
            console.error('Payment error:', error);
            alert(t('network_error'));
        }
    }

    // Load bookings on page load
    loadBookings();
</script>
</body>
</html>
