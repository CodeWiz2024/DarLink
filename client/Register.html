<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <style>
        .id-upload { display: grid; grid-template-columns: 1fr; gap: 16px; margin: 12px 0; }
        .upload-box { background: rgba(255,255,255,0.3); backdrop-filter: blur(12px); border: 1px dashed rgba(0,122,255,0.5); border-radius: 16px; padding: 20px 12px 12px; text-align: center; transition: all 0.2s; }
        .upload-box.uploaded { border-color: #34C759; background: rgba(52,199,89,0.1); }
        .upload-box h4 { margin-bottom: 12px; color: #1d1d1f; font-weight: 500; font-size: 0.95rem; }
        .upload-box input[type="file"] { display: none; }
        .file-label { display: inline-block; padding: 10px 16px; background: var(--primary); color: white; border-radius: 12px; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: background 0.2s; margin-bottom: 12px; }
        .file-label:hover { background: var(--primary-dark); }
        .preview { margin-top: 12px; border-radius: 12px; overflow: hidden; display: none; }
        .preview img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }
        .note { font-size: 0.85rem; color: #8e8e93; margin: -8px 0 16px; }
        .ocr-status { display: none; margin: 16px 0; padding: 16px; background: rgba(255,255,255,0.3); backdrop-filter: blur(12px); border-radius: 14px; }
        .progress { height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        #manualBtn { margin-bottom: 16px; background: #6c757d; color: white; border: none; border-radius: 12px; padding: 12px; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s; width: 100%; }
        #manualBtn:hover { background: #5a6268; }
        .form-box { max-width: 550px; width: 100%; }
        .password-container { position: relative; width: 100%; margin-bottom: 15px; }
        .password-container input { width: 100%; padding-right: 40px; margin-bottom: 0; }
        .toggle-password { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #8e8e93; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px; }
        .toggle-password:hover { color: var(--primary); }
        .required-star { color: #ff3b30; margin-left: 4px; font-weight: bold; }
        [dir="rtl"] .required-star { margin-left: 0; margin-right: 4px; }

        /* ── Hamburger: hidden on desktop ── */
        .nav-hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: 10px;
            border: none;
            background: transparent;
        }
        .nav-hamburger span {
            display: block;
            width: 22px; height: 2px;
            background: var(--text-main, #1d1d1f);
            border-radius: 2px;
            transition: all 0.3s ease;
        }

        /* ── Close button: hidden everywhere until mobile ── */
        .mobile-close-btn { display: none !important; }

        /* ══════════ DESKTOP ══════════ */
        @media (min-width: 769px) {
            .navbar .links {
                display: flex !important;
                position: static;
                height: auto; width: auto;
                background: transparent;
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                flex-direction: row;
                justify-content: flex-end;
                align-items: center;
                gap: 6px;
                padding: 0;
                z-index: auto;
                overflow: visible;
            }
            .navbar .links a,
            .navbar .links button:not(.nav-hamburger) { width: auto; max-width: none; padding: 10px 18px; font-size: 0.95rem; border: none; background: transparent; }
            .navbar .links .lang-switch { margin: 0 0 0 8px; }
        }

        /* ══════════ MOBILE ══════════ */
        @media (max-width: 768px) {
            .nav-hamburger { display: flex; }

            .mobile-close-btn {
                display: flex !important;
                position: absolute;
                top: 18px; right: 18px;
                width: 42px; height: 42px;
                border-radius: 50%;
                background: rgba(0,0,0,0.06);
                border: none;
                font-size: 1.1rem;
                cursor: pointer;
                color: var(--text-muted, #8e8e93);
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
                z-index: 10;
            }
            .mobile-close-btn:hover { background: rgba(255,59,48,0.12); color: #ff3b30; }

            .navbar .links {
                display: none;
                position: fixed;
                top: 0; left: 0;
                width: 100%; height: 100vh;
                background: var(--glass-bg, rgba(255,255,255,0.97));
                backdrop-filter: saturate(180%) blur(28px);
                -webkit-backdrop-filter: saturate(180%) blur(28px);
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 10px;
                z-index: 1050;
                padding: 80px 28px 40px;
                overflow-y: auto;
            }
            .navbar .links.mobile-open { display: flex; }

            .navbar .links a {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%; max-width: 320px;
                padding: 15px 24px;
                font-size: 1.05rem;
                font-weight: 600;
                border-radius: 16px;
                border: 1px solid rgba(0,0,0,0.07);
                background: rgba(255,255,255,0.7);
                color: var(--text-main, #1d1d1f);
                text-decoration: none;
                transition: all 0.2s;
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            }
            .navbar .links a:hover { background: rgba(10,132,255,0.08); color: var(--primary, #0A84FF); border-color: rgba(10,132,255,0.2); transform: translateY(-1px); }
            .navbar .links a.primary { background: var(--primary, #0A84FF); color: white; border-color: transparent; box-shadow: 0 4px 16px rgba(10,132,255,0.35); }
            .navbar .links a.primary:hover { background: var(--primary-dark, #0062D1); transform: translateY(-1px); }

            .navbar .links button.theme-btn {
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 10px;
                width: 100%; max-width: 320px;
                padding: 15px 24px;
                font-size: 1.05rem;
                font-weight: 600;
                border-radius: 16px;
                border: 1px solid rgba(0,0,0,0.07);
                background: rgba(255,255,255,0.7);
                color: var(--text-main, #1d1d1f);
                box-shadow: 0 2px 8px rgba(0,0,0,0.04);
                cursor: pointer;
                transition: all 0.2s;
            }
            .navbar .links button.theme-btn:hover { background: rgba(0,0,0,0.05); }

            .navbar .links .lang-switch { display: flex; gap: 10px; margin-top: 4px; }
            .navbar .links .lang-switch .lang-btn { padding: 12px 28px; border-radius: 14px; font-size: 0.95rem; font-weight: 700; }

            /* form */
            .form-page { padding: 16px; align-items: flex-start; padding-top: 30px; }
            .form-box { padding: 24px 16px; }
            .form-box h1 { font-size: 1.4rem; margin-bottom: 20px; }
            .form-box input, .form-box select { font-size: 16px; }
        }

        @media (max-width: 600px) { .id-upload { grid-template-columns: 1fr; } }

        [data-theme="dark"] .upload-box h4 { color: #f5f5f7; }
        [data-theme="dark"] .note { color: #98989d; }
        [data-theme="dark"] #ocrText { color: #f5f5f7; }
        [data-theme="dark"] .user-btn { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); color: #0a84ff; }
        [data-theme="dark"] .user-btn.active { background: #0a84ff; color: #fff; }
        [data-theme="dark"] #manualBtn { background: #4a4a4e; }
        [data-theme="dark"] #manualBtn:hover { background: #5a5a5e; }
        [data-theme="dark"] .required-star { color: #ff453a; }
        [data-theme="dark"] .toggle-password { color: #98989d; }
        [data-theme="dark"] .toggle-password:hover { color: #0a84ff; }
        [data-theme="dark"] .navbar .links { background: rgba(20,20,22,0.97); }
        [data-theme="dark"] .navbar .links a { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); color: #f5f5f7; }
        [data-theme="dark"] .navbar .links a:hover { background: rgba(255,255,255,0.12); color: #fff; }
        [data-theme="dark"] .navbar .links a.primary { background: #0A84FF; color: white; }
        [data-theme="dark"] .navbar .links button.theme-btn { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.08); color: #f5f5f7; }
        [data-theme="dark"] .mobile-close-btn { background: rgba(255,255,255,0.08); color: #8e8e93; }
        [data-theme="dark"] .mobile-close-btn:hover { background: rgba(255,59,48,0.2); color: #ff453a; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="darlink-logo blue small" href="index.html" style="display:flex; flex-direction:row; align-items:center; gap:8px; text-decoration:none;">
  <svg width="36" height="32" viewBox="0 0 110 100" fill="none">
    <path d="M55 8 L98 42 L98 92 L12 92 L12 42 Z" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linejoin="round"/>
    <rect x="72" y="10" width="10" height="18" fill="none" stroke="#00d4ff" stroke-width="5.5"/>
    <path d="M55 22 L88 50 L88 88 L22 88 L22 50 Z" fill="none" stroke="#5aa8c0" stroke-width="5" stroke-linejoin="round"/>
    <path d="M32 88 L32 52 Q32 30 52 30 Q72 30 72 52 Q72 68 58 72 Q44 76 32 72" fill="none" stroke="#5aa8c0" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="32" y1="88" x2="75" y2="88" stroke="#5aa8c0" stroke-width="5.5" stroke-linecap="round"/>
  </svg>
  <span style="color:#00d4ff; font-size:22px; font-weight:700;">DarLink</span>
</a>
        <button class="nav-hamburger" id="navHamburger" aria-label="Open menu" onclick="toggleMobileNav()">
            <span></span><span></span><span></span>
        </button>
        <div class="links" id="navLinks">
            <button class="mobile-close-btn" onclick="toggleMobileNav()" aria-label="Close menu">
                <i class="fa-solid fa-times"></i>
            </button>
            <button class="theme-btn" onclick="toggleTheme()" aria-label="Theme">
            <i class="fa-regular fa-moon" id="themeIcon"></i>
            </button>
            <a href="index.html" data-i18n="nav_home" onclick="closeMobileNav()">
                <i class="fa-solid fa-house" style="margin-right:8px;"></i> Home
            </a>
            <a href="login.html" data-i18n="nav_login" onclick="closeMobileNav()">
                <i class="fa-solid fa-right-to-bracket" style="margin-right:8px;"></i> Login
            </a>
            <a href="Register.html" class="primary" data-i18n="nav_register" onclick="closeMobileNav()">
                <i class="fa-solid fa-user-plus" style="margin-right:8px;"></i> Register
            </a>
            <div class="lang-switch">
                <button type="button" class="lang-btn" data-lang="en">EN</button>
                <button type="button" class="lang-btn" data-lang="ar">عربي</button>
            </div>
        </div>
    </nav>

    <div class="form-page">
        <div class="form-box">
            <h1 data-i18n="register_title">Register</h1>
            <div id="message"></div>

            
    <!-- Progress Bar -->
    <div class="wizard-progress" style="margin-bottom: 24px; text-align: center;">
        <div style="font-size: 0.85rem; font-weight: 600; color: #8e8e93; margin-bottom: 8px;">Step <span id="stepCounter">1</span> of 3</div>
        <div class="progress" style="height: 6px; background: rgba(0,0,0,0.1); border-radius: 3px; overflow: hidden; display: flex;">
            <div id="wizardProgressBar" style="width: 33.33%; height: 100%; background: var(--primary); transition: width 0.4s ease;"></div>
        </div>
    </div>

    <form id="registerForm" enctype="multipart/form-data">
        
        <!-- STEP 1: Name and Type -->
        <div class="wizard-step" id="step1">
            <label><span data-i18n="register_user_type_label">User Type</span><span class="required-star">*</span></label>
            <div class="user-type-container">
                <button type="button" class="user-btn" onclick="selectUserType('Renter')" data-i18n="register_renter_btn">Renter</button>
                <button type="button" class="user-btn" onclick="selectUserType('Owner')" data-i18n="register_owner_btn">Owner</button>
            </div>
            <input type="hidden" id="UserType" required>
            <div id="step1TypeError" style="color:red; font-size:12px; margin-top:-10px; margin-bottom:10px; display:none;">Please select a user type.</div>

            <label><span data-i18n="register_firstname_label">First Name</span><span class="required-star">*</span></label>
            <input type="text" id="FirstName" name="first_name" placeholder="Enter your first name" data-i18n-placeholder="register_firstname_placeholder" required>
            <div id="firstNameValidation" class="validation-message" style="font-size: 13px; margin-top: -10px; margin-bottom: 10px;"></div>

            <label><span data-i18n="register_lastname_label">Last Name</span><span class="required-star">*</span></label>
            <input type="text" id="LastName" name="last_name" placeholder="Enter your last name" data-i18n-placeholder="register_lastname_placeholder" required>
            <div id="lastNameValidation" class="validation-message" style="font-size: 13px; margin-top: -10px; margin-bottom: 10px;"></div>

            <button type="button" class="wizard-next-btn" onclick="goToStep(2)" style="width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 1rem;">Next</button>
        </div>

        <!-- STEP 2: Contact & Security -->
        <div class="wizard-step" id="step2" style="display: none;">
            <label><span data-i18n="register_email_label">Email</span><span class="required-star">*</span></label>
            <input type="email" id="Email" placeholder="Enter your email" data-i18n-placeholder="register_email_placeholder" required>
            <div id="emailValidation" class="validation-message" style="font-size: 13px; margin-top: -10px; margin-bottom: 10px;"></div>

            <label><span data-i18n="register_phone_label">Phone Number</span><span class="required-star">*</span></label>
            <input type="tel" id="PhoneNumber" placeholder="Enter your phone number" data-i18n-placeholder="register_phone_placeholder" required>
            <div id="phoneValidation" class="validation-message" style="font-size: 13px; margin-top: -10px; margin-bottom: 10px;"></div>

            <label><span data-i18n="register_password_label">Password</span><span class="required-star">*</span></label>
            <div class="password-container">
                <input type="password" id="Password" minlength="6" placeholder="Minimum 6 characters" data-i18n-placeholder="register_password_placeholder" required>
                <span class="toggle-password" onclick="togglePasswordVisibility('Password', this)"><i class="fa fa-eye"></i></span>
            </div>



            <label><span data-i18n="register_confirm_password_label">Confirm Password</span><span class="required-star">*</span></label>
            <div class="password-container">
                <input type="password" id="ConfirmPassword" minlength="6" placeholder="Re-enter your password" data-i18n-placeholder="register_confirm_password_placeholder" required>
                <span class="toggle-password" onclick="togglePasswordVisibility('ConfirmPassword', this)"><i class="fa fa-eye"></i></span>
            </div>
            <div id="confirmPasswordValidation" class="validation-message" style="font-size: 13px; margin-top: -10px; margin-bottom: 10px;"></div>

            <div style="display:flex; gap:10px; margin-top: 10px;">
                <button type="button" class="wizard-back-btn" onclick="goToStep(1)" style="flex:1; padding: 14px; background: rgba(0,0,0,0.1); color: var(--text); border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem;">Back</button>
                <button type="button" class="wizard-next-btn" onclick="goToStep(3)" style="flex:1; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem;">Next</button>
            </div>
        </div>

        <!-- STEP 3: Verification (Optional OCR ID) -->
        <div class="wizard-step" id="step3" style="display: none;">
            <label><span data-i18n="register_id_images_label">ID Card Image (Front Side)</span><span class="required-star">*</span></label>
            <div class="note" data-i18n="register_id_note">Upload a clear photo of the front of your ID card</div>
            <div class="id-upload">
                <div class="upload-box" id="frontBox">
                    <h4 data-i18n="register_front_side">Front Side</h4>
                    <input type="file" id="IDCardFront" accept="image/*">
                    <label for="IDCardFront" class="file-label" data-i18n="register_upload_btn">📤 Click to Upload</label>
                    <div class="preview" id="frontPreview"><img id="frontImg" alt="Front"></div>
                </div>
            </div>

            <div id="ocrStatus" class="ocr-status">
                <div id="ocrText" data-i18n="register_scanning">Scanning...</div>
                <div class="progress" style="margin-bottom: 0px;"><div class="progress-bar" id="progressBar"></div></div>
            </div>

            <label><span data-i18n="register_id_number_label">ID Card Number</span><span class="required-star">*</span></label>
            <div class="note" data-i18n="register_id_number_note">Will be extracted automatically from front image</div>
            <input type="text" id="IDCardNumber" placeholder="18 digits" data-i18n-placeholder="register_id_number_placeholder" required readonly>
            <button type="button" id="manualBtn" data-i18n="register_manual_btn">✏️ Edit Manually</button>
            
            <div style="display:flex; gap:10px; margin-top: 20px;">
                <button type="button" class="wizard-back-btn" onclick="goToStep(2)" style="flex:1; padding: 14px; background: rgba(0,0,0,0.1); color: var(--text); border: 1px solid rgba(0,0,0,0.1); border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem;">Back</button>
                <button type="submit" id="submitBtn" data-i18n="register_submit" style="flex:1; padding: 14px; background: #34C759; color: #fff; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 1rem;">Register</button>
            </div>
        </div>
    </form>


            <p style="text-align: center; margin-top: 20px;">
                <span data-i18n="register_have_account">Already have an account?</span>
                <a href="login.html" data-i18n="register_login_link">Login</a>
            </p>
        </div>
    </div>

    <script src='https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'></script>

            register_password_mismatch: { en: '❌ Passwords do not match', ar: '❌ كلمتا المرور غير متطابقتين' },
            register_registering: { en: 'Registering...', ar: 'جاري إنشاء الحساب...' },
            register_network_error: { en: '❌ Network error', ar: '❌ خطأ في الشبكة' }
        };

        const API_URL = 'https://darlink-production.up.railway.app/api';
        let frontFile = null;

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            const icon = document.getElementById('themeIcon');
            if (icon) icon.className = newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
        }

        const initialTheme = document.documentElement.getAttribute('data-theme') || 'light';
        const initialIcon = document.getElementById('themeIcon');
        if (initialIcon) initialIcon.className = initialTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';

        function togglePasswordVisibility(inputId, element) {
            const input = document.getElementById(inputId);
            const icon = element.querySelector('i');
            if (input.type === 'password') { input.type = 'text'; icon.className = 'fa fa-eye-slash'; }
            else { input.type = 'password'; icon.className = 'fa fa-eye'; }
        }

        function selectUserType(type) {
            UserType.value = type;
            document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        manualBtn.onclick = function() {
            IDCardNumber.readOnly = false;
            IDCardNumber.focus();
            const lang = window.I18N ? window.I18N.getCurrentLang() : 'en';
            const dict = window.I18N_MESSAGES || {};
            this.textContent = (dict.register_manual_enabled && dict.register_manual_enabled[lang]) || '✅ Editing Enabled';
            this.style.background = '#ffc107';
        };

        function extractID(text) {
            const clean = text.replace(/[\s\-_\.]/g, '');
            const patterns = [ /\b\d{18}\b/, /\b1\d{17}\b/, /(?:^|\D)(\d{18})(?:\D|$)/, /\b\d{2}0+\d{13,15}\b/ ];
            for (let pattern of patterns) {
                const match = clean.match(pattern);
                if (match) return (match[1] || match[0]).replace(/\D/g, '');
            }
            const allNumbers = clean.match(/\d{15,}/g);
            if (allNumbers && allNumbers.length > 0) return allNumbers.reduce((a, b) => a.length > b.length ? a : b);
            return null;
        }

        async function runOCR(file) {
            ocrStatus.style.display = 'block';
            const lang = window.I18N ? window.I18N.getCurrentLang() : 'en';
            const dict = window.I18N_MESSAGES || {};
            ocrText.textContent = (dict.register_scanning && dict.register_scanning[lang]) || 'Scanning...';
            try {
                const { data: { text } } = await Tesseract.recognize(file, 'eng+fra', {
                    logger: info => { if (info.status === 'recognizing text') { progressBar.style.width = Math.round(info.progress * 100) + '%'; ocrText.textContent = `Scanning... ${Math.round(info.progress * 100)}%`; } }
                });
                const idNumber = extractID(text);
                if (idNumber) {
                    IDCardNumber.value = idNumber;
                    message.innerHTML = '<div class="message success">' + ((dict.register_ocr_id_detected && dict.register_ocr_id_detected[lang]) || '✅ ID detected: ') + idNumber + '</div>';
                } else {
                    message.innerHTML = '<div class="message">' + ((dict.register_ocr_could_not_detect && dict.register_ocr_could_not_detect[lang]) || '⚠️ Could not detect ID.') + '</div>';
                    manualBtn.click();
                }
            } catch (error) {
                message.innerHTML = '<div class="message error">' + ((dict.register_ocr_failed && dict.register_ocr_failed[lang]) || '❌ OCR failed.') + '</div>';
                manualBtn.click();
            }
            setTimeout(() => ocrStatus.style.display = 'none', 2000);
        }

        IDCardFront.onchange = async function(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 5*1024*1024) { message.innerHTML = '<div class="message error">' + (window.I18N_MESSAGES.register_file_too_large['en']) + '</div>'; return; }
            frontFile = file;
            frontBox.classList.add('uploaded');
            const reader = new FileReader();
            reader.onload = e => { frontImg.src = e.target.result; frontPreview.style.display = 'block'; };
            reader.readAsDataURL(file);
            await runOCR(file);
        };

                registerForm.onsubmit = async function(e) {
            e.preventDefault();
            const lang = window.I18N ? window.I18N.getCurrentLang() : 'en';
            const dict = window.I18N_MESSAGES || {};
            const first = FirstName.value.trim(), last = LastName.value.trim(), pwd = Password.value, confirmPwd = ConfirmPassword.value;
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(Email.value.trim())) { message.innerHTML = '<div class="message error">❌ Please enter a valid email address</div>'; goToStep(2); return; }
            if (PhoneNumber.value.trim().replace(/\D/g, '').length < 10) { message.innerHTML = '<div class="message error">❌ Please enter a valid phone number</div>'; goToStep(2); return; }
            if (pwd.length < 6) { message.innerHTML = '<div class="message error">❌ Password must contain at least 6 characters</div>'; goToStep(2); return; }
            if (pwd !== confirmPwd) { message.innerHTML = '<div class="message error">' + ((dict.register_password_mismatch && dict.register_password_mismatch[lang]) || '❌ Passwords do not match') + '</div>'; goToStep(2); return; }
            if (!UserType.value) { message.innerHTML = '<div class="message error">' + ((dict.register_select_user_type_error && dict.register_select_user_type_error[lang]) || '❌ Please select user type') + '</div>'; goToStep(1); return; }
            if (!frontFile) { message.innerHTML = '<div class="message error">' + (lang === 'ar' ? '❌ يرجى رفع صورة بطاقة الهوية' : '❌ Please upload your ID Card Image') + '</div>'; goToStep(3); return; }
            if (!IDCardNumber.value || IDCardNumber.value.trim().length < 5) { message.innerHTML = '<div class="message error">' + (lang === 'ar' ? '❌ يرجى إدخال رقم بطاقة الهوية' : '❌ Please provide your ID Card Number') + '</div>'; goToStep(3); return; }

            submitBtn.disabled = true;
            const originalSubBtnTxt = submitBtn.textContent;
            submitBtn.textContent = (dict.register_registering && dict.register_registering[lang]) || 'Registering...';
            submitBtn.style.opacity = '0.7';

            const formData = new FormData();
            formData.append('FullName', (first + ' ' + last).trim());
            formData.append('Email', Email.value.trim());
            formData.append('PhoneNumber', PhoneNumber.value.trim());
            formData.append('IDCardNumber', IDCardNumber.value.trim());
            formData.append('Password', pwd);
            formData.append('UserType', UserType.value);
            if (frontFile) { formData.append('IDCardFront', frontFile); formData.append('IDCardBack', frontFile); }

            try {
                const res = await fetch(API_URL + '/users/register', { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    message.innerHTML = '<div class="message success" style="background:#d4edda; color:#155724; padding:10px; border-radius:8px; margin-bottom:15px; border:1px solid #c3e6cb;">✅ ' + data.message + ' <br>🔄 Logging in...</div>';
                    
                    try {
                        const loginRes = await fetch(API_URL + '/users/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ Email: Email.value.trim(), Password: pwd, UserType: UserType.value })
                        });
                        const loginData = await loginRes.json();
                        if (loginRes.ok) {
                            localStorage.setItem('user', JSON.stringify(loginData.user));
                            location.href = 'index.html';
                        } else {
                            location.href = 'login.html';
                        }
                    } catch(e) {
                        location.href = 'login.html';
                    }
                } else { 
                    message.innerHTML = '<div class="message error">❌ ' + (data.error || '') + '</div>'; 
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalSubBtnTxt;
                    submitBtn.style.opacity = '1';
                }
            } catch (error) {
                message.innerHTML = '<div class="message error">' + ((dict.register_network_error && dict.register_network_error[lang]) || '❌ Network error') + '</div>';
                submitBtn.disabled = false;
                submitBtn.textContent = originalSubBtnTxt;
                submitBtn.style.opacity = '1';
            }
        };

        function goToStep(step) {
            if(step === 2) {
                if(!UserType.value) { document.getElementById('step1TypeError').style.display='block'; return; }
                document.getElementById('step1TypeError').style.display='none';
                const vFirst = /^[a-zA-Z]+$/.test(FirstName.value.trim());
                const vLast = /^[a-zA-Z]+$/.test(LastName.value.trim());
                if(!vFirst || !vLast || !FirstName.value || !LastName.value) {
                    alert('Please provide valid first and last names (letters only).');
                    return;
                }
            }
            if(step === 3) {
                const pwd = document.getElementById('Password').value;
                const cpwd = document.getElementById('ConfirmPassword').value;
                const em = document.getElementById('Email').value.trim();
                const ph = document.getElementById('PhoneNumber').value.trim().replace(/\D/g,'');
                
                if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) { alert('Please enter a valid email address'); return; }
                if(ph.length < 10) { alert('Valid phone number required'); return; }
                if(pwd.length < 6) {
                    alert('Password must contain at least 6 characters'); return;
                }
                if(pwd !== cpwd) { alert('Passwords do not match'); return; }
            }
            
            document.querySelectorAll('.wizard-step').forEach(el => el.style.display = 'none');
            document.getElementById('step' + step).style.display = 'block';
            
            document.getElementById('stepCounter').innerText = step;
            document.getElementById('wizardProgressBar').style.width = (step * 33.33) + '%';
        }

    </script>
