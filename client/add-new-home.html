<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Property · DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Leaflet CSS & JS for Interactive Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="js/i18n-dashboard.js"></script>
    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/wilayas.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; background: var(--bg-gradient); min-height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; }
        .dash-layout { display: flex; min-height: 100vh; }

        /* ===== SIDEBAR ===== */
        .side-nav {
            width: 270px; flex-shrink: 0;
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: 4px 0 24px rgba(0,0,0,0.06);
        }
        .side-nav-logo { padding: 24px 22px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); }
        .side-nav-logo img { height: 42px; border-radius: 10px; }
        .side-nav-logo span { font-size: 1.2rem; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }
        .side-nav-user { padding: 18px 22px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); background: rgba(10,132,255,0.04); }
        .side-user-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; overflow: hidden; }
        .side-user-info .name { font-weight: 700; font-size: 0.95rem; color: var(--text-main); }
        .side-user-info .role { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
        .side-nav-links { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .side-link { display: flex; align-items: center; gap: 13px; padding: 13px 16px; border-radius: 14px; text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 0.95rem; transition: all 0.2s ease; }
        .side-link i { width: 22px; text-align: center; font-size: 1rem; }
        .side-link:hover { background: rgba(10,132,255,0.07); color: var(--primary); text-decoration: none; transform: translateX(3px); }
        .side-link.active { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(10,132,255,0.35); }
        .side-link.active i { color: white; }
        .side-nav-section-label { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 12px 16px 4px; }
        .side-nav-footer { padding: 16px 12px; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 8px; }
        .side-footer-actions { display: flex; gap: 8px; align-items: center; }
        .theme-toggle-side { flex: 1; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-muted); font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .theme-toggle-side:hover { background: rgba(0,0,0,0.05); color: var(--text-main); }
        .lang-side { display: flex; gap: 4px; }
        .lang-side button { padding: 8px 12px; border: 1px solid var(--glass-border); border-radius: 10px; background: transparent; color: var(--text-muted); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .lang-side button:hover, .lang-side button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-logout-side { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; background: rgba(255,59,48,0.08); color: #ff3b30; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
        .btn-logout-side:hover { background: #ff3b30; color: white; }

        .sidebar-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 200; width: 44px; height: 44px; border-radius: 12px; background: var(--primary); color: white; border: none; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 14px rgba(10,132,255,0.4); align-items: center; justify-content: center; }
        .side-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 99; }

        /* MAIN CONTENT */
        .dash-main { margin-left: 270px; flex: 1; padding: 32px 36px; min-height: 100vh; }
        .dash-topbar { margin-bottom: 28px; }
        .dash-page-title h1 { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin: 0 0 6px; }
        .dash-page-title p { color: var(--text-muted); font-size: 1rem; margin: 0; }

        /* FORM CARD */
        .form-card {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--glass-border);
            max-width: 900px;
        }

        .form-card label {
            display: block;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-card label .required {
            color: #FF3B30;
            margin-left: 4px;
        }

        .form-card input[type="text"],
        .form-card input[type="number"],
        .form-card input[type="email"],
        .form-card textarea,
        .form-card select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 1rem;
            background: rgba(0,0,0,0.02);
            color: var(--text-main);
            transition: all 0.2s;
            margin-bottom: 20px;
        }

        .form-card input:focus,
        .form-card textarea:focus,
        .form-card select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(10,132,255,0.1);
            background: var(--glass-bg);
        }

        .form-card textarea {
            min-height: 120px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-card small {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* FEATURES SECTION */
        #selectedFeatures {
            min-height: 50px;
            padding: 12px;
            background: rgba(0,0,0,0.02);
            border-radius: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--glass-border);
        }

        .feature-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            padding: 8px 14px;
            border-radius: 20px;
            margin: 4px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .feature-badge button {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .feature-badge button:hover {
            background: rgba(255,255,255,0.3);
        }

        .feature-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            align-items: stretch;
        }

        .feature-controls select,
        .feature-controls input {
            flex: 1;
            margin-bottom: 0;
        }

        .feature-controls button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .feature-controls .btn-primary {
            background: var(--primary);
            color: white;
        }

        .feature-controls .btn-primary:hover {
            background: #0056CC;
            transform: translateY(-2px);
        }

        .feature-controls .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .feature-controls .btn-secondary:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        .no-features-msg {
            color: var(--text-muted);
            font-style: italic;
            padding: 8px;
            margin: 0;
            font-size: 0.95rem;
        }

        .features-label-text {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 12px 0 8px;
        }

        /* MAP */
        #map {
            height: 350px;
            width: 100%;
            border-radius: 14px;
            margin-bottom: 12px;
            border: 1px solid var(--glass-border);
            z-index: 1;
        }

        /* IMAGE PREVIEW */
        #imagePreview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .image-preview-item {
            position: relative;
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            overflow: hidden;
            aspect-ratio: 1;
        }

        .image-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-preview-item button {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #FF3B30;
            color: white;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .image-preview-item button:hover {
            background: #D32F2F;
            transform: scale(1.1);
        }

        /* SUBMIT BUTTON */
        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }

        .btn-submit:hover {
            background: #0056CC;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(10,132,255,0.3);
        }

        .btn-submit:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        /* MESSAGE BOX */
        .message {
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .message.success {
            background: rgba(52,199,89,0.12);
            color: #1a6b2e;
            border: 1px solid rgba(52,199,89,0.3);
        }

        .message.error {
            background: rgba(255,59,48,0.12);
            color: #c00;
            border: 1px solid rgba(255,59,48,0.3);
        }

        @media (max-width: 900px) {
            .side-nav { transform: translateX(-100%); }
            .side-nav.open { transform: translateX(0); }
            .side-overlay.show { display: block; }
            .dash-main { margin-left: 0; padding: 80px 20px 30px; }
            .sidebar-toggle { display: flex; }
            .form-row { grid-template-columns: 1fr; }
        }

        [data-theme="dark"] .side-nav { background: rgba(28,28,30,0.92); border-right-color: rgba(255,255,255,0.08); }
        [data-theme="dark"] .side-link { color: rgba(255,255,255,0.6); }
        [data-theme="dark"] .side-link:hover { background: rgba(255,255,255,0.07); color: white; }
        [data-theme="dark"] .theme-toggle-side { color: rgba(255,255,255,0.6); }
        [data-theme="dark"] .theme-toggle-side:hover { color: white; background: rgba(255,255,255,0.07); }
        [data-theme="dark"] .form-card input,
        [data-theme="dark"] .form-card textarea,
        [data-theme="dark"] .form-card select { background: rgba(255,255,255,0.05); }
        [data-theme="dark"] #selectedFeatures { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
<div class="side-overlay" id="sideOverlay" onclick="closeSidebar()"></div>

<aside class="side-nav" id="sideNav">
    <div class="side-nav-logo">
        <span class="logo">
            <i class="fa-solid fa-house logo-icon"></i>
            <span class="logo-text" data-i18n="nav_logo_text">DarLink</span>
        </span>
    </div>
    <div class="side-nav-user">
        <div class="side-user-avatar" id="userAvatarSide">O</div>
        <div class="side-user-info">
            <div class="name" id="userNameSide">Loading...</div>
            <div class="role" id="userRoleSide">Property Owner</div>
        </div>
    </div>
    <div class="side-nav-links">
        <div class="side-nav-section-label" id="managementLabel">Management</div>
        <a href="add-new-home.html" class="side-link active"><i class="fa-solid fa-plus"></i> <span id="linkAddProperty">Add New Property</span></a>
        <a href="my-property.html" class="side-link"><i class="fa-solid fa-list"></i> <span id="linkMyProperties">My Properties</span></a>
        <a href="bookings.html" class="side-link"><i class="fa-regular fa-calendar-check"></i> <span id="linkBookings">Bookings</span></a>
        <a href="Statistics.html" class="side-link"><i class="fa-solid fa-chart-line"></i> <span id="linkStatistics">Statistics</span></a>
        <div class="side-nav-section-label" style="margin-top: 8px;" id="accountLabel">Account</div>
        <a href="index.html" class="side-link"><i class="fa-solid fa-house"></i> <span id="linkBackHome">Back to Home</span></a>
        <a href="profile.html" class="side-link"><i class="fa-solid fa-user"></i> <span id="linkProfile">Profile Settings</span></a>
        <a href="AddHome.html" class="side-link"><i class="fa-solid fa-gauge"></i> <span id="linkDashboard">Dashboard</span></a>
    </div>
    <div class="side-nav-footer">
        <div class="side-footer-actions">
            <button class="theme-toggle-side" onclick="toggleTheme()">
                <i class="fa-regular fa-moon" id="themeIcon"></i>
                <span id="themeLabel">Dark Mode</span>
            </button>
            <div class="lang-side">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ar">ع</button>
            </div>
        </div>
        <button class="btn-logout-side" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> <span id="logoutText">Log Out</span></button>
    </div>
</aside>

<main class="dash-main">
    <div class="dash-topbar">
        <div class="dash-page-title">
            <h1><i class="fa-solid fa-plus-circle" style="color: var(--primary);"></i> <span id="pageTitle">Add New Property</span></h1>
            <p id="pageSubtitle">Fill in the details to list your property</p>
        </div>
    </div>

    <div class="form-card">
        <div id="message"></div>

        <form id="addPropertyForm">
            <!-- Title -->
            <label><span id="labelTitle">Title</span> <span class="required">*</span></label>
            <input type="text" id="Title" required>

            <!-- Description -->
            <label><span id="labelDescription">Description</span> <span class="required">*</span></label>
            <textarea id="Description" required></textarea>

            <!-- Address -->
            <label><span id="labelAddress">Address</span> <span class="required">*</span></label>
            <input type="text" id="Address" required>

            <!-- City & Wilaya -->
            <div class="form-row">
                <div>
                    <label><span id="labelCity">City</span> <span class="required">*</span></label>
                    <input type="text" id="City" required>
                </div>
                <div>
                    <label><span id="labelWilaya">Wilaya</span> <span class="required">*</span></label>
                    <select id="Wilaya" required>
                        <option value="" id="optionSelectWilaya">Select Wilaya</option>
                    </select>
                </div>
            </div>

            <!-- Property Type & Rooms -->
            <div class="form-row">
                <div>
                    <label><span id="labelPropertyType">Property Type</span> <span class="required">*</span></label>
                    <select id="PropertyType" required>
                        <option value="" id="optionSelectType">Select type</option>
                        <option value="Apartment" id="optionApartment">Apartment</option>
                        <option value="House" id="optionHouse">House</option>
                        <option value="Room" id="optionRoom">Room</option>
                        <option value="Cottage" id="optionCottage">Cottage</option>
                    </select>
                </div>
                <div>
                    <label><span id="labelRooms">Number of Rooms</span> <span class="required">*</span></label>
                    <input type="number" id="NumofRooms" placeholder="3" min="1" required>
                </div>
            </div>

            <!-- Price -->
            <label>
                <span id="labelPrice">Price Per Night (DZD)</span> <span class="required">*</span>
                <small id="priceNote">(10% profit will be added automatically)</small>
            </label>
            <input type="number" id="PricePerNight" placeholder="5000" min="0" step="100" required>

            <!-- Features Section -->
            <label id="labelFeatures">Features</label>
            
            <!-- Selected features display -->
            <div id="selectedFeatures">
                <p class="no-features-msg" id="noFeaturesMsg">No features selected</p>
            </div>
            
            <!-- Select from existing features -->
            <div class="feature-controls">
                <select id="featureSelect">
                    <option value="" id="optionSelectFeature">Select a feature...</option>
                </select>
                <button type="button" onclick="addFeature()" class="btn-primary" id="btnAddFeature">Add</button>
            </div>
            
            <!-- Add custom feature -->
            <div class="features-label-text" id="customFeatureLabel">Or add a custom feature:</div>
            <div class="feature-controls">
                <input type="text" id="customFeatureInput" placeholder="">
                <button type="button" onclick="addCustomFeature()" class="btn-secondary" id="btnAddCustomFeature">Add</button>
            </div>

            <!-- Map -->
            <label style="margin-top: 8px;"><span id="labelMap">Location on Map (Click to set location)</span> <span class="required">*</span></label>
            <div id="map"></div>
            <div class="form-row" style="margin-bottom: 20px;">
                <div>
                    <input type="number" id="Latitude" placeholder="Latitude" step="0.000001" readonly style="background: rgba(0,0,0,0.03); opacity: 0.8;">
                </div>
                <div>
                    <input type="number" id="Longitude" placeholder="Longitude" step="0.000001" readonly style="background: rgba(0,0,0,0.03); opacity: 0.8;">
                </div>
            </div>

            <!-- Availability Status -->
            <label id="labelAvailability">Availability Status</label>
            <select id="AvailabilityStatus">
                <option value="Active" id="optionActive">Active</option>
                <option value="Inactive" id="optionInactive">Inactive</option>
            </select>

            <!-- Property Images -->
            <label>
                <span id="labelImages">Property Images</span> <span class="required">*</span>
                <small id="imagesNote">(At least 1 image required)</small>
            </label>
            <input type="file" id="PropertyImages" accept="image/*" multiple required>
            <div id="imagePreview"></div>

            <!-- Submit Button -->
            <button type="submit" id="submitBtn" class="btn-submit">
                <i class="fa-solid fa-plus-circle"></i> <span id="submitBtnText">Add Property</span>
            </button>
        </form>
    </div>
</main>

<script>
    // ===== TRANSLATIONS =====
    window.I18N_MESSAGES = {
        // Sidebar
        management: { en: "Management", ar: "الإدارة" },
        add_property: { en: "Add New Property", ar: "إضافة عقار جديد" },
        my_properties: { en: "My Properties", ar: "عقاراتي" },
        bookings: { en: "Bookings", ar: "الحجوزات" },
        statistics: { en: "Statistics", ar: "الإحصائيات" },
        account: { en: "Account", ar: "الحساب" },
        back_to_home: { en: "Back to Home", ar: "العودة للرئيسية" },
        profile_settings: { en: "Profile Settings", ar: "إعدادات الملف الشخصي" },
        dashboard: { en: "Dashboard", ar: "لوحة التحكم" },
        dark_mode: { en: "Dark Mode", ar: "الوضع الداكن" },
        light_mode: { en: "Light Mode", ar: "الوضع الفاتح" },
        log_out: { en: "Log Out", ar: "تسجيل الخروج" },
        property_owner: { en: "Property Owner", ar: "مالك عقار" },
        
        // Page Header
        page_title: { en: "Add New Property", ar: "إضافة عقار جديد" },
        page_subtitle: { en: "Fill in the details to list your property", ar: "املأ التفاصيل لعرض عقارك" },
        
        // Form Labels
        label_title: { en: "Title", ar: "عنوان العقار" },
        label_description: { en: "Description", ar: "الوصف" },
        label_address: { en: "Address", ar: "العنوان" },
        label_city: { en: "City", ar: "المدينة" },
        label_wilaya: { en: "Wilaya", ar: "الولاية" },
        label_property_type: { en: "Property Type", ar: "نوع العقار" },
        label_rooms: { en: "Number of Rooms", ar: "عدد الغرف" },
        label_price: { en: "Price Per Night (DZD)", ar: "سعر الليلة (دج)" },
        price_note: { en: "(10% profit will be added automatically)", ar: "(سيتم إضافة 10% تلقائياً)" },
        label_features: { en: "Features", ar: "المزايا" },
        label_map: { en: "Location on Map (Click to set location)", ar: "الموقع على الخريطة (انقر للتحديد)" },
        label_availability: { en: "Availability Status", ar: "حالة التوفر" },
        label_images: { en: "Property Images", ar: "صور العقار" },
        images_note: { en: "(At least 1 image required)", ar: "(يجب توفر صورة واحدة على الأقل)" },
        
        // Select Options
        select_wilaya: { en: "Select Wilaya", ar: "اختر الولاية" },
        select_type: { en: "Select type", ar: "اختر النوع" },
        type_apartment: { en: "Apartment", ar: "شقة" },
        type_house: { en: "House", ar: "منزل" },
        type_room: { en: "Room", ar: "غرفة" },

    // ===== LANGUAGE FUNCTIONS =====
    function getCurrentLang() {
        return localStorage.getItem('site_lang') || 'en';
    }

    function setLanguage(lang) {
        localStorage.setItem('site_lang', lang);
        document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
        document.documentElement.setAttribute('lang', lang);
        updatePageText();
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
        });
    }

    function t(key) {
        const lang = getCurrentLang();
        return window.I18N_MESSAGES[key] ? window.I18N_MESSAGES[key][lang] : key;
    }

    function updatePageText() {
        // Sidebar
        document.getElementById('managementLabel').textContent = t('management').toUpperCase();
        document.getElementById('linkAddProperty').textContent = t('add_property');
        document.getElementById('linkMyProperties').textContent = t('my_properties');

        document.getElementById('linkStatistics').textContent = t('statistics');

        document.getElementById('userRoleSide').textContent = t('property_owner');

        document.getElementById('pageTitle').textContent = t('page_title');
        document.getElementById('pageSubtitle').textContent = t('page_subtitle');
        
        // Form Labels
        document.getElementById('labelTitle').textContent = t('label_title');
        document.getElementById('labelDescription').textContent = t('label_description');
        document.getElementById('labelAddress').textContent = t('label_address');
        document.getElementById('labelCity').textContent = t('label_city');
        document.getElementById('labelWilaya').textContent = t('label_wilaya');
        document.getElementById('labelPropertyType').textContent = t('label_property_type');
        document.getElementById('labelRooms').textContent = t('label_rooms');
        document.getElementById('labelPrice').textContent = t('label_price');
        document.getElementById('priceNote').textContent = t('price_note');
        document.getElementById('labelFeatures').textContent = t('label_features');
        document.getElementById('labelMap').textContent = t('label_map');
        document.getElementById('labelAvailability').textContent = t('label_availability');
        document.getElementById('labelImages').textContent = t('label_images');
        document.getElementById('imagesNote').textContent = t('images_note');
        
        // Select Options
        document.getElementById('optionSelectWilaya').textContent = t('select_wilaya');
        document.getElementById('optionSelectType').textContent = t('select_type');
        document.getElementById('optionApartment').textContent = t('type_apartment');
        document.getElementById('optionHouse').textContent = t('type_house');
        document.getElementById('optionRoom').textContent = t('type_room');
        document.getElementById('optionCottage').textContent = t('type_cottage');
        document.getElementById('optionActive').textContent = t('status_active');
        document.getElementById('optionInactive').textContent = t('status_inactive');
        
        // Features
        document.getElementById('noFeaturesMsg').textContent = t('no_features');
        document.getElementById('optionSelectFeature').textContent = t('select_feature');
        document.getElementById('btnAddFeature').textContent = t('add_btn');
        document.getElementById('customFeatureLabel').textContent = t('custom_feature_label');
        document.getElementById('btnAddCustomFeature').textContent = t('add_btn');
        
        // Buttons
        document.getElementById('submitBtnText').textContent = t('submit_btn');
        
        // Theme Label
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        document.getElementById('themeLabel').textContent = currentTheme === 'dark' ? t('light_mode') : t('dark_mode');

    // ===== INITIALIZATION =====
    const API_URL = 'http://localhost:5000/api';
    const user = JSON.parse(localStorage.getItem('user') || 'null');
    let selectedFiles = [];
    let selectedFeatures = [];
    let allFeatures = [];

    // Check authentication
    if (!user || user.UserType !== 'Owner') {
        alert(t('login_required'));
        window.location.href = 'login.html';
    }

    // Setup UI
    const fullName = `${user.FirstName || ''} ${user.LastName || ''}`.trim() || 'Owner';
    document.getElementById('userNameSide').textContent = fullName;
    const initials = (user.FirstName?.[0] || 'O') + (user.LastName?.[0] || '');
    document.getElementById('userAvatarSide').textContent = initials.toUpperCase();

    // Initialize language
    const savedLang = getCurrentLang();
    document.documentElement.setAttribute('dir', savedLang === 'ar' ? 'rtl' : 'ltr');
    document.documentElement.setAttribute('lang', savedLang);
    updatePageText();
    
    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-lang') === savedLang);
        btn.addEventListener('click', () => setLanguage(btn.getAttribute('data-lang')));
    });

    // Theme functions
    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('site_theme', newTheme);
        document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
        document.getElementById('themeLabel').textContent = newTheme === 'dark' ? t('light_mode') : t('dark_mode');
    }

    const savedTheme = localStorage.getItem('site_theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    if (savedTheme === 'dark') {
        document.getElementById('themeIcon').className = 'fa-solid fa-sun';
        document.getElementById('themeLabel').textContent = t('light_mode');
    }

    function toggleSidebar() {
        document.getElementById('sideNav').classList.toggle('open');
        document.getElementById('sideOverlay').classList.toggle('show');
    }

    function closeSidebar() {
        document.getElementById('sideNav').classList.remove('open');
        document.getElementById('sideOverlay').classList.remove('show');
    }

    function logout() {
        localStorage.removeItem('user');
        window.location.href = 'index.html';
    }

    // ===== FEATURES MANAGEMENT =====
    async function loadFeatures() {
        try {
            const response = await fetch(`${API_URL}/features`);
            const features = await response.json();
            allFeatures = features;
            
            const select = document.getElementById('featureSelect');
            select.innerHTML = `<option value="">${t('select_feature')}</option>`;
            
            features.forEach(feature => {
                const option = document.createElement('option');
                option.value = feature.FeatureId;
                option.textContent = feature.FeatureName;
                select.appendChild(option);
            });
        } catch (error) {
            console.error('Failed to load features:', error);
        }
    }

    function addFeature() {
        const select = document.getElementById('featureSelect');
        const featureId = parseInt(select.value);
        
        if (!featureId || isNaN(featureId)) {
            alert(t('select_feature_alert'));
            return;
        }
        
        if (selectedFeatures.includes(featureId)) {
            alert(t('feature_exists'));
            return;
        }
        
        selectedFeatures.push(featureId);
        displaySelectedFeatures();
        select.value = "";
    }

    async function addCustomFeature() {
        const input = document.getElementById('customFeatureInput');
        const featureName = input.value.trim();
        
        if (!featureName) {
            alert(t('enter_feature_name'));
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/features`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ FeatureName: featureName })
            });
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || t('feature_add_failed'));
            }
            
            const newFeature = await response.json();
            selectedFeatures.push(newFeature.FeatureId);
            allFeatures.push(newFeature);
            await loadFeatures();
            displaySelectedFeatures();
            input.value = "";
            alert(t('feature_added'));
        } catch (error) {
            console.error('Failed to add custom feature:', error);
            alert(t('feature_add_failed') + ': ' + error.message);
        }
    }

    function displaySelectedFeatures() {
        const container = document.getElementById('selectedFeatures');
        
        if (selectedFeatures.length === 0) {
            container.innerHTML = `<p class="no-features-msg">${t('no_features')}</p>`;
            return;
        }
        
        let html = '';
        selectedFeatures.forEach(featureId => {
            const feature = allFeatures.find(f => f.FeatureId === featureId);
            const featureName = feature ? feature.FeatureName : 'Unknown';
            html += `
                <span class="feature-badge">
                    ${featureName}
                    <button type="button" onclick="removeFeature(${featureId})" title="Remove">×</button>
                </span>
            `;
        });
        container.innerHTML = html;
    }

    function removeFeature(featureId) {
        selectedFeatures = selectedFeatures.filter(id => id !== featureId);
        displaySelectedFeatures();
    }

    // ===== MAP INITIALIZATION =====
    let map;
    let marker;

    function initMap() {
        map = L.map('map').setView([36.7538, 3.0588], 6);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        map.on('click', function(e) {
            const lat = e.latlng.lat;
            const lng = e.latlng.lng;
            document.getElementById('Latitude').value = lat.toFixed(6);
            document.getElementById('Longitude').value = lng.toFixed(6);

            if (marker) {
                marker.setLatLng(e.latlng);
            } else {
                marker = L.marker(e.latlng).addTo(map);
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        initMap();
        if (typeof populateWilayasSelect === 'function') {
            populateWilayasSelect('Wilaya', t('select_wilaya'));
        }
    });

    // ===== IMAGE HANDLING =====
    document.getElementById('PropertyImages').onchange = function(e) {
        const files = Array.from(e.target.files);
        selectedFiles = files;
        const previewDiv = document.getElementById('imagePreview');
        previewDiv.innerHTML = '';

        if (files.length === 0) return;

        files.forEach((file, index) => {
            if (file.size > 5 * 1024 * 1024) {
                alert(`${t('image_too_large')} ${index + 1}`);
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                const imgDiv = document.createElement('div');
                imgDiv.className = 'image-preview-item';
                imgDiv.innerHTML = `
                    <img src="${e.target.result}">
                    <button type="button" onclick="removeImage(${index})">×</button>
                `;
                previewDiv.appendChild(imgDiv);
            };
            reader.readAsDataURL(file);
        });
    };

    window.removeImage = function(index) {
        selectedFiles.splice(index, 1);
        const dt = new DataTransfer();
        selectedFiles.forEach(file => dt.items.add(file));
        document.getElementById('PropertyImages').files = dt.files;
        document.getElementById('PropertyImages').dispatchEvent(new Event('change'));
    };

    // ===== FORM SUBMISSION =====
    document.getElementById('addPropertyForm').onsubmit = async function(e) {
        e.preventDefault();

        const lat = document.getElementById('Latitude').value;
        const lng = document.getElementById('Longitude').value;

        if (!lat || !lng) {
            message.innerHTML = `<div class="message error"><i class="fa-solid fa-exclamation-circle"></i> ${t('set_location')}</div>`;
            return;
        }

        if (selectedFiles.length === 0) {
            message.innerHTML = `<div class="message error"><i class="fa-solid fa-exclamation-circle"></i> ${t('upload_image')}</div>`;
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> ${t('submitting')}`;

        const formData = new FormData();
        formData.append('Title', document.getElementById('Title').value.trim());
        formData.append('Description', document.getElementById('Description').value.trim());
        formData.append('Address', document.getElementById('Address').value.trim());
        formData.append('City', document.getElementById('City').value.trim());
        formData.append('Wilaya', document.getElementById('Wilaya').value.trim());
        formData.append('Latitude', lat);
        formData.append('Longitude', lng);
        formData.append('PropertyType', document.getElementById('PropertyType').value);
        formData.append('PricePerNight', Number(document.getElementById('PricePerNight').value));
        formData.append('AvailabilityStatus', document.getElementById('AvailabilityStatus').value);
        formData.append('NumofRooms', Number(document.getElementById('NumofRooms').value));
        formData.append('OwnerId', user.UserId);
        
        if (selectedFeatures.length > 0) {
            formData.append('FeatureIds', JSON.stringify(selectedFeatures));
        }

        selectedFiles.forEach((file) => {
            formData.append('images', file);
        });

        try {
            const response = await fetch(`${API_URL}/properties`, {
                method: 'POST',
                body: formData
            });

            const data = await response.json();

            if (response.ok) {
                message.innerHTML = `<div class="message success"><i class="fa-solid fa-check-circle"></i> ${t('property_added')}</div>`;
                addPropertyForm.reset();
                selectedFiles = [];
                selectedFeatures = [];
                document.getElementById('imagePreview').innerHTML = '';
                displaySelectedFeatures();
                
                setTimeout(() => {
                    window.location.href = 'my-property.html';
                }, 2000);
            } else {
                message.innerHTML = `<div class="message error"><i class="fa-solid fa-exclamation-circle"></i> ${data.error}</div>`;
            }
        } catch (error) {
            message.innerHTML = `<div class="message error"><i class="fa-solid fa-exclamation-circle"></i> ${t('network_error')}</div>`;
            console.error('Error:', error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = `<i class="fa-solid fa-plus-circle"></i> ${t('submit_btn')}`;
        }
    };

    // Initialize
    loadFeatures();
</script>
