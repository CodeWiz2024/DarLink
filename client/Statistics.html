<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statistics - DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="js/i18n-dashboard.js"></script>`n    <script src="lang.js"></script>
    <script src="js/theme.js"></script>
    <style>
        body { margin: 0; background: var(--bg-gradient); min-height: 100vh; }
        .dash-layout { display: flex; min-height: 100vh; }

        /* ===== SIDEBAR ===== */
        .side-nav {
            width: 270px; flex-shrink: 0;
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(24px);
            -webkit-backdrop-filter: saturate(180%) blur(24px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            position: fixed; top: 0; left: 0; height: 100vh; z-index: 100;
            transition: transform 0.3s ease;
            box-shadow: 4px 0 24px rgba(0,0,0,0.06);
        }
        .side-nav-logo { padding: 24px 22px 20px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); }
        .side-nav-logo img { height: 42px; border-radius: 10px; }
        .side-nav-logo span { font-size: 1.2rem; font-weight: 800; color: var(--primary); letter-spacing: -0.02em; }
        .side-nav-user { padding: 18px 22px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--glass-border); background: rgba(10,132,255,0.04); }
        .side-user-avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.1rem; flex-shrink: 0; }
        .side-user-info .name { font-weight: 700; font-size: 0.95rem; color: var(--text-main); }
        .side-user-info .role { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }
        .side-nav-links { flex: 1; overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 4px; }
        .side-link { display: flex; align-items: center; gap: 13px; padding: 13px 16px; border-radius: 14px; text-decoration: none; color: var(--text-muted); font-weight: 500; font-size: 0.95rem; transition: all 0.2s ease; }
        .side-link i { width: 22px; text-align: center; font-size: 1rem; }
        .side-link:hover { background: rgba(10,132,255,0.07); color: var(--primary); text-decoration: none; transform: translateX(3px); }
        .side-link.active { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(10,132,255,0.35); }
        .side-link.active i { color: white; }
        .side-nav-section-label { font-size: 0.74rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); padding: 12px 16px 4px; }
        .side-nav-footer { padding: 16px 12px; border-top: 1px solid var(--glass-border); display: flex; flex-direction: column; gap: 8px; }
        .side-footer-actions { display: flex; gap: 8px; align-items: center; }
        .theme-toggle-side { flex: 1; display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-muted); font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
        .theme-toggle-side:hover { background: rgba(0,0,0,0.05); color: var(--text-main); }
        .lang-side { display: flex; gap: 4px; }
        .lang-side button { padding: 8px 12px; border: 1px solid var(--glass-border); border-radius: 10px; background: transparent; color: var(--text-muted); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .lang-side button:hover, .lang-side button.active { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-logout-side { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 12px; background: rgba(255,59,48,0.08); color: #ff3b30; font-size: 0.88rem; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; }
        .btn-logout-side:hover { background: #ff3b30; color: white; }

        /* MOBILE */
        .sidebar-toggle { display: none; position: fixed; top: 16px; left: 16px; z-index: 200; width: 44px; height: 44px; border-radius: 12px; background: var(--primary); color: white; border: none; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 14px rgba(10,132,255,0.4); align-items: center; justify-content: center; }
        .side-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 99; }

        /* MAIN */
        .dash-main { margin-left: 270px; flex: 1; padding: 32px 36px; min-height: 100vh; }
        .dash-topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
        .dash-page-title h1 { font-size: 1.7rem; font-weight: 800; color: var(--text-main); margin: 0 0 4px; }
        .dash-page-title p { color: var(--text-muted); font-size: 0.95rem; margin: 0; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 28px; }
        .stat-card-custom {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-lg);
            padding: 28px 22px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            text-align: center;
            transition: transform 0.3s ease;
        }
        .stat-card-custom:hover { transform: translateY(-4px); }
        .stat-number { font-size: 3rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; line-height: 1; }
        .stat-label { color: var(--text-muted); font-size: 0.9rem; font-weight: 500; }
        .chart-box {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            padding: 28px;
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--glass-border);
        }
        .chart-box h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; color: var(--text-main); }
        .type-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--glass-border); font-size: 1rem; }
        .type-row:last-child { border-bottom: none; }
        .type-name { font-weight: 600; color: var(--text-main); }
        .type-count { background: var(--primary); color: white; padding: 4px 14px; border-radius: 20px; font-weight: 700; font-size: 0.88rem; }

        @media (max-width: 900px) {
            .side-nav { transform: translateX(-100%); }
            .side-nav.open { transform: translateX(0); }
            .side-overlay.show { display: block; }
            .dash-main { margin-left: 0; padding: 80px 20px 30px; }
            .sidebar-toggle { display: flex; }
        }
        [data-theme="dark"] .side-nav { background: rgba(28,28,30,0.92); border-right-color: rgba(255,255,255,0.08); }
        [data-theme="dark"] .side-link { color: rgba(255,255,255,0.6); }
        [data-theme="dark"] .side-link:hover { background: rgba(255,255,255,0.07); color: white; }
        [data-theme="dark"] .theme-toggle-side { color: rgba(255,255,255,0.6); }
        [data-theme="dark"] .theme-toggle-side:hover { color: white; background: rgba(255,255,255,0.07); }
    </style>
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
<div class="side-overlay" id="sideOverlay" onclick="closeSidebar()"></div>

<aside class="side-nav" id="sideNav">
    <div class="side-nav-logo">
        <span class="logo">
            <i class="fa-solid fa-house logo-icon"></i>
            <span class="logo-text" data-i18n="nav_logo_text">DarLink</span>
        </span>
    </div>
    <div class="side-nav-user">
        <div class="side-user-avatar" id="userAvatarSide">U</div>
        <div class="side-user-info">
            <div class="name" id="userNameSide">Loading...</div>
            <div class="role">Property Owner</div>
        </div>
    </div>
    <div class="side-nav-links">
        <div class="side-nav-section-label" data-i18n="nav-management">Management</div>
        <a href="add-new-home.html" class="side-link"><i class="fa-solid fa-plus"></i> <span data-i18n="link-add-property">Add New Property</span></a>
        <a href="my-property.html" class="side-link"><i class="fa-solid fa-list"></i> <span data-i18n="link-my-properties">My Properties</span></a>
        <a href="bookings.html" class="side-link"><i class="fa-regular fa-calendar-check"></i> <span data-i18n="link-bookings">Bookings</span></a>
        <a href="Statistics.html" class="side-link active"><i class="fa-solid fa-chart-line"></i> <span data-i18n="link-statistics">Statistics</span></a>
        <div class="side-nav-section-label" style="margin-top: 8px;" data-i18n="nav-account">Account</div>
        <a href="index.html" class="side-link"><i class="fa-solid fa-house"></i> <span data-i18n="link-home">Back to Home</span></a>
        <a href="profile.html" class="side-link"><i class="fa-solid fa-user"></i> <span data-i18n="link-profile">Profile Settings</span></a>
        <a href="AddHome.html" class="side-link"><i class="fa-solid fa-gauge"></i> <span data-i18n="link-dashboard">Dashboard</span></a>
    </div>
    <div class="side-nav-footer">
        <div class="side-footer-actions">
            <button class="theme-toggle-side" onclick="toggleTheme()">
                <i class="fa-regular fa-moon" id="themeIcon"></i>
                <span id="themeLabel" data-i18n="theme-dark">Dark Mode</span>
            </button>
            <div class="lang-side">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ar">ع</button>
            </div>
        </div>
        <button class="btn-logout-side" onclick="logout()"><i class="fa-solid fa-right-from-bracket"></i> <span data-i18n="link-logout">Log Out</span></button>
    </div>
</aside>

<main class="dash-main">
    <div class="dash-topbar">
        <div class="dash-page-title">
            <h1><i class="fa-solid fa-chart-line" style="color: var(--primary);"></i> <span data-i18n="dash-title-stats">Statistics</span></h1>
            <p data-i18n="dash-subtitle-stats">Overview of your properties performance</p>
        </div>
    </div>

    <div class="stats-grid">
        <div class="stat-card-custom">
            <div class="stat-number" id="totalProperties">0</div>
            <div class="stat-label"><i class="fa-solid fa-house" style="color: var(--primary); margin-bottom: 4px; display: block;"></i><span data-i18n="stat-total-props">Total Properties</span></div>
        </div>
        <div class="stat-card-custom">
            <div class="stat-number" style="color: #34C759;" id="activeProperties">0</div>
            <div class="stat-label"><i class="fa-solid fa-circle-check" style="color: #34C759; margin-bottom: 4px; display: block;"></i><span data-i18n="stat-active-props">Active</span></div>
        </div>
        <div class="stat-card-custom">
            <div class="stat-number" style="color: #FF3B30;" id="inactiveProperties">0</div>
            <div class="stat-label"><i class="fa-solid fa-circle-xmark" style="color: #FF3B30; margin-bottom: 4px; display: block;"></i><span data-i18n="stat-inactive-props">Inactive</span></div>
        </div>
        <div class="stat-card-custom">
            <div class="stat-number" style="color: #FF9500;" id="totalBookings">0</div>
            <div class="stat-label"><i class="fa-regular fa-calendar-check" style="color: #FF9500; margin-bottom: 4px; display: block;"></i><span data-i18n="stat-total-bookings">Total Bookings</span></div>
        </div>
    </div>

    <div class="chart-box">
        <h2><i class="fa-solid fa-chart-pie" style="color: var(--primary); margin-right: 8px;"></i> <span data-i18n="stat-props-type">Properties by Type</span></h2>
        <div id="propertyTypes"></div>
    </div>
</main>

<script>
    const SERVER_URL = window.location.hostname === 'localhost' ? 'http://localhost:5000' : `http://${window.location.hostname}:5000`;
    const API_URL = `${SERVER_URL}/api`;
    const user = JSON.parse(localStorage.getItem('user') || 'null');

    if (!user || user.UserType !== 'Owner') {
        alert('Please login as an owner');
        window.location.href = 'login.html';
    } else {
        const firstName = user.FirstName || user.FullName || 'Owner';
        document.getElementById('userNameSide').textContent = `${firstName} ${user.LastName || ''}`.trim();
        const avatar = document.getElementById('userAvatarSide');
        if (user.ProfilePicturePath) {
            avatar.innerHTML = `<img src="${user.ProfilePicturePath}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
        } else {
            avatar.textContent = firstName.charAt(0).toUpperCase();
        }
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('site_theme', newTheme);
        document.getElementById('themeIcon').className = newTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-regular fa-moon';
        document.getElementById('themeLabel').textContent = newTheme === 'dark' ? 'Light Mode' : 'Dark Mode';
    }
    if (localStorage.getItem('site_theme') === 'dark') document.getElementById('themeLabel').textContent = 'Light Mode';

    function toggleSidebar() { document.getElementById('sideNav').classList.toggle('open'); document.getElementById('sideOverlay').classList.toggle('show'); }
    function closeSidebar() { document.getElementById('sideNav').classList.remove('open'); document.getElementById('sideOverlay').classList.remove('show'); }
    function logout() { localStorage.removeItem('user'); window.location.href = 'index.html'; }

    async function loadStatistics() {
        try {
            const response = await fetch(`${API_URL}/properties/owner/${user.UserId}`);
            const properties = await response.json();

            document.getElementById('totalProperties').textContent = properties.length;
            document.getElementById('activeProperties').textContent = properties.filter(p => p.AvailabilityStatus === 'Active').length;
            document.getElementById('inactiveProperties').textContent = properties.filter(p => p.AvailabilityStatus === 'Inactive').length;

            let bookingCount = 0;
            for (const property of properties) {
                try {
                    const res = await fetch(`${API_URL}/bookings/property/${property.PropertyId}`);
                    const bookings = await res.json();
                    bookingCount += bookings.length;
                } catch(e) {}
            }
            document.getElementById('totalBookings').textContent = bookingCount;

            const types = {};
            properties.forEach(p => { types[p.PropertyType] = (types[p.PropertyType] || 0) + 1; });

            document.getElementById('propertyTypes').innerHTML = Object.entries(types).map(([type, count]) => `
                <div class="type-row">
                    <span class="type-name"> ${type}</span>
                    <span class="type-count">${count} ${count === 1 ? 'property' : 'properties'}</span>
                </div>
            `).join('') || '<p style="color: var(--text-muted); text-align:center; padding:20px;" data-i18n="stat-no-props">No properties yet</p>';

        } catch (error) { console.error('Error:', error); }
    }

    loadStatistics();
</script>
</body>
</html>
