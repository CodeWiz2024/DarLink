<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Messages · DarLink</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { margin: 0; background: var(--bg-gradient); min-height: 100vh; }

        .dash-main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 32px 20px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-back:hover {
            background: #0056CC;
            transform: translateY(-2px);
        }

        .messages-container {
            background: var(--glass-bg);
            backdrop-filter: saturate(180%) blur(20px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            box-shadow: var(--card-shadow);
            margin-top: 20px;
        }

        .message-item {
            padding: 20px;
            border-bottom: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .message-item:last-child { border-bottom: none; }
        .message-item:hover {
            background: rgba(10,132,255,0.05);
            transform: translateX(4px);
        }

        .msg-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .msg-info { flex: 1; }
        .msg-name {
            font-weight: 700;
            font-size: 1.05rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .msg-property {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .unread-badge {
            background: #FF3B30;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        .empty-state i {
            font-size: 4rem;
            color: var(--text-muted);
            opacity: 0.3;
            margin-bottom: 16px;
        }
        .empty-state p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }
        .loading-state i {
            font-size: 3rem;
            color: var(--primary);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="dash-main">
        <div class="page-header">
            <h1><i class="fa-solid fa-messages" style="color: var(--primary);"></i> Property Messages</h1>
            <a href="my-property.html" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> Back to Properties
            </a>
        </div>

        <div id="loading" class="loading-state">
            <i class="fa-solid fa-spinner"></i>
            <p>Loading messages...</p>
        </div>

        <div id="list" class="messages-container" style="display: none;"></div>
    </div>

    <script>
        const API_URL = 'https://darlink-production.up.railway.app/api';
        const user = JSON.parse(localStorage.getItem('user'));
        const propertyId = new URLSearchParams(window.location.search).get('propertyId');

        if (!user) {
            alert('Please login first');
            window.location.href = 'login.html';
        }

        async function load() {
            try {
                const res = await fetch(`${API_URL}/conversations/${user.UserId}`);
                
                if (!res.ok) {
                    throw new Error('Failed to load conversations');
                }
                
                const convs = await res.json();
                const filtered = propertyId ? convs.filter(c => c.PropertyId == propertyId) : convs;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('list').style.display = 'block';

                if (filtered.length === 0) {
                    document.getElementById('list').innerHTML = `
                        <div class="empty-state">
                            <i class="fa-solid fa-inbox"></i>
                            <p>No messages yet</p>
                        </div>
                    `;
                    return;
                }

                document.getElementById('list').innerHTML = filtered.map(c => {
                    const initials = c.OtherUserName.split(' ').map(n => n[0]).join('').toUpperCase();
                    return `
                        <div class="message-item" onclick="window.location.href='chat.html?renterId=${c.RenterId}&ownerName=${encodeURIComponent(c.OtherUserName)}&propertyId=${c.PropertyId}'">
                            <div class="msg-avatar">${initials}</div>
                            <div class="msg-info">
                                <div class="msg-name">
                                    ${c.OtherUserName}
                                    ${c.UnreadCount > 0 ? `<span class="unread-badge">${c.UnreadCount}</span>` : ''}
                                </div>
                                <div class="msg-property"><i class="fa-solid fa-house"></i> ${c.PropertyTitle || 'Property'}</div>
                            </div>
                            <i class="fa-solid fa-chevron-right" style="color: var(--text-muted);"></i>
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading messages:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('list').style.display = 'block';
                document.getElementById('list').innerHTML = `
                    <div class="empty-state">
                        <i class="fa-solid fa-exclamation-triangle" style="color: #FF3B30;"></i>
                        <p style="color: #FF3B30;">Error loading messages</p>
                    </div>
                `;
            }
        }
        
        load();
    </script>
</body>
</html>
