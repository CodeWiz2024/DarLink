<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .success-container {
            max-width: 600px;
            margin: 60px auto;
            text-align: center;
            padding: 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
        }
        .success-icon {
            font-size: 5rem;
            color: #28a745;
            margin-bottom: 20px;
            animation: scaleIn 0.5s ease-out;
        }
        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .success-title {
            font-size: 2rem;
            color: #28a745;
            margin-bottom: 10px;
        }
        .booking-details {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: left;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #dee2e6;
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <i class="fa-solid fa-circle-check success-icon"></i>
        <h1 class="success-title">Payment Successful!</h1>
        <p>Your booking has been confirmed</p>

        <div id="bookingDetails" class="booking-details">
            <div class="detail-row">
                <span>Booking ID:</span>
                <strong id="bookingId">Loading...</strong>
            </div>
            <div class="detail-row">
                <span>Total Paid:</span>
                <strong id="totalAmount">Loading...</strong>
            </div>
            <div class="detail-row">
                <span>Payment Status:</span>
                <strong style="color: #28a745;">? Confirmed</strong>
            </div>
        </div>

        <p style="color: #666; margin: 20px 0;">
            A confirmation email has been sent to your email address.
        </p>

        <div>
            <a href="my-bookings.html" class="btn">
                <i class="fa-regular fa-calendar"></i> View My Bookings
            </a>
            <a href="index.html" class="btn" style="background: #6c757d;">🏠 Home Page</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bookingId = urlParams.get('bookingId');

        if (bookingId) {
            document.getElementById('bookingId').textContent = '#' + bookingId;

            // Fetch booking details
            fetch(`${API_URL}/payment/booking-status/${bookingId}`)
                .then(res => res.json())
                .then(data => {
                    document.getElementById('totalAmount').textContent = 
                        Number(data.TotalPrice).toLocaleString() + ' DZD';
                })
                .catch(err => {
                    console.error('Error loading booking:', err);
                });
        }
    </script>
</body>
</html>
