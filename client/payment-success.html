<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful!</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .success-container { 
            background: white; 
            border-radius: 20px; 
            padding: 48px; 
            max-width: 600px; 
            text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon { 
            font-size: 6rem; 
            margin-bottom: 24px;
            animation: bounce 1s ease;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }
        h1 { 
            color: #34C759; 
            margin-bottom: 16px; 
            font-size: 2rem;
        }
        .subtitle { 
            color: #666; 
            margin-bottom: 32px; 
            font-size: 1.1rem;
        }
        .details { 
            background: #f8f9fa; 
            padding: 24px; 
            border-radius: 12px; 
            margin: 24px 0; 
            text-align: left; 
        }
        .details h3 {
            color: #333;
            margin-bottom: 16px;
            font-size: 1.2rem;
            text-align: center;
        }
        .detail-row { 
            display: flex;
            justify-content: space-between;
            padding: 12px 0; 
            border-bottom: 1px solid #ddd; 
        }
        .detail-row:last-child { 
            border-bottom: none; 
        }
        .detail-label {
            font-weight: 600;
            color: #555;
        }
        .detail-value {
            color: #333;
            font-weight: 500;
        }
        .btn-container {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn { 
            flex: 1;
            display: inline-block; 
            padding: 16px 32px; 
            color: white; 
            text-decoration: none; 
            border-radius: 10px; 
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #007AFF;
        }
        .btn-primary:hover { 
            background: #0056b3; 
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,122,255,0.4);
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            background: #545b62;
            transform: translateY(-2px);
        }
        #loading {
            color: #666;
            font-style: italic;
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: confetti-fall 3s linear;
        }
        @keyframes confetti-fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✅</div>
        <h1>Payment Successful!</h1>
        <p class="subtitle">Your property has been upgraded successfully</p>
        
        <div class="details">
            <h3>📋 Payment Details</h3>
            <div id="details">
                <div class="detail-row">
                    <span class="detail-label">Status:</span>
                    <span class="detail-value" id="loading">Loading...</span>
                </div>
            </div>
        </div>
        
        <div class="btn-container">
            <a href="my-property.html" class="btn btn-primary">View <span data-i18n="link-my-properties">My Properties</span></a>
            <a href="AddHome.html" class="btn btn-secondary"><span data-i18n="link-dashboard">Dashboard</span></a>
        </div>
    </div>

    <script>
        const API_URL = 'https://darlink-production.up.railway.app/api';
        const urlParams = new URLSearchParams(window.location.search);
        const checkoutId = urlParams.get('checkout_id');

        // Create confetti effect
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.background = ['#ff0000', '#00ff00', '#0000ff', '#ffff00', '#ff00ff'][Math.floor(Math.random() * 5)];
                    confetti.style.animationDelay = Math.random() * 3 + 's';
                    document.body.appendChild(confetti);
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        async function loadPaymentDetails() {
            if (!checkoutId) {
                document.getElementById('details').innerHTML = `
                    <div class="detail-row">
                        <span class="detail-value" style="color: #dc3545; text-align: center; width: 100%;">
                            No payment information found
                        </span>
                    </div>
                `;
                return;
            }

            try {
                const response = await fetch(`${API_URL}/payment/status/${checkoutId}`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('details').innerHTML = `
                        <div class="detail-row">
                            <span class="detail-label">Package:</span>
                            <span class="detail-value">${data.package}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Amount Paid:</span>
                            <span class="detail-value">${data.amount.toLocaleString()} DZD</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Status:</span>
                            <span class="detail-value" style="color: #34C759;">✅ ${data.status}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Valid Until:</span>
                            <span class="detail-value">${data.expiryDate ? new Date(data.expiryDate).toLocaleDateString() : 'N/A'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Transaction ID:</span>
                            <span class="detail-value" style="font-size: 0.85rem; word-break: break-all;">${checkoutId}</span>
                        </div>
                    `;

                    // Trigger confetti
                    createConfetti();
                } else {
                    document.getElementById('details').innerHTML = `
                        <div class="detail-row">
                            <span class="detail-value" style="color: #dc3545;">
                                Could not load payment details
                            </span>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Error loading payment details:', error);
                document.getElementById('details').innerHTML = `
                    <div class="detail-row">
                        <span class="detail-value" style="color: #dc3545;">
                            Error loading payment details
                        </span>
                    </div>
                `;
            }
        }

        // Load payment details on page load
        loadPaymentDetails();
    </script>
</body>
</html>
